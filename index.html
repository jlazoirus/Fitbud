/* ---- Registro de consumo en la DB (tabla day_log) ---- */
// Sube el estado del día (comidas marcadas, extras, entreno) a Supabase.
async function pushDay(ds){
  if(!supa||!ds||!uid())return;
  try{ await supa.from("day_log").upsert({user_id:uid(),log_date:ds,state:S.days[ds]||{},updated_at:new Date().toISOString()},{onConflict:"user_id,log_date"}); }catch(e){}
}
// Baja el estado de un día desde Supabase (última versión sincronizada).
async function pullDay(ds){
  if(!supa||!ds||!uid())return false;
  try{
    const r=await supa.from("day_log").select("state").eq("user_id",uid()).eq("log_date",ds).maybeSingle();
    if(!r.error&&r.data&&r.data.state&&typeof r.data.state==="object"){S.days[ds]=r.data.state;save();return true;}
  }catch(e){}
  return false;
}
// Baja TODOS los días del usuario (para racha y estadísticas correctas al entrar).
async function pullAllDays(){
  if(!supa||!uid())return;
  try{
    const r=await supa.from("day_log").select("log_date,state").eq("user_id",uid()).gte("log_date",START).lte("log_date",END);
    if(!r.error&&Array.isArray(r.data)){r.data.forEach(row=>{if(row.state&&typeof row.state==="object")S.days[row.log_date]=row.state;});save();}
  }catch(e){}
}
// Guarda local + sube a la DB (usar tras cualquier cambio del día).
function commitDay(ds){save();pushDay(ds);}
// Trae el día desde la DB y re-renderiza si seguimos viéndolo.
function syncDay(ds){if(supa)pullDay(ds).then(ok=>{if(ok&&(view==="hoy"||view==="nutricion")&&current===ds)render();});}

/* ---- Registro de peso + % grasa en la DB (tabla weight_log) ---- */
// kg es NOT NULL: sin peso no hay fila (el % grasa acompaña al peso).
async function pushWeight(week,kg,bf){
  if(!supa||!uid())return;
  try{
    const result=kg==null
      ?await supa.from("weight_log").delete().eq("user_id",uid()).eq("cycle_start",START).eq("week",week)
      :await supa.from("weight_log").upsert({user_id:uid(),cycle_start:START,week:week,kg:kg,bf_pct:(bf==null?null:bf),updated_at:new Date().toISOString()},{onConflict:"user_id,cycle_start,week"});
    if(result.error&&cycleNumber()===1){
      if(kg==null)await supa.from("weight_log").delete().eq("user_id",uid()).eq("week",week);
      else await supa.from("weight_log").upsert({user_id:uid(),week:week,kg:kg,bf_pct:(bf==null?null:bf),updated_at:new Date().toISOString()},{onConflict:"user_id,week"});
    }
  }catch(e){}
}
async function pullWeights(){
  if(!supa||!uid())return false;
  try{
    let r=await supa.from("weight_log").select("week,kg,bf_pct").eq("user_id",uid()).eq("cycle_start",START);
    if(r.error&&cycleNumber()===1)r=await supa.from("weight_log").select("week,kg,bf_pct").eq("user_id",uid());
    if(!r.error&&Array.isArray(r.data)){const w={};r.data.forEach(x=>{w[x.week]={kg:Number(x.kg),bf:(x.bf_pct==null?null:Number(x.bf_pct))};});S.weights=w;save();return true;}
  }catch(e){}
  return false;
}
function syncWeights(){if(supa)pullWeights().then(ok=>{if(ok&&view==="progreso")renderProgress();});}

function ingById(id){return DB.ingredients.find(x=>x.id===id);}
function macrosFromLines(lines){let t={kcal:0,p:0,c:0,f:0};lines.forEach(l=>{const i=ingById(+l.ingredient_id);if(!i||l.grams==null)return;const g=(+l.grams)/100;t.kcal+=i.kcal*g;t.p+=i.protein_g*g;t.c+=i.carbs_g*g;t.f+=i.fat_g*g;});return{kcal:Math.round(t.kcal),p:Math.round(t.p),c:Math.round(t.c),f:Math.round(t.f)};}
function dishMacros(dishId){return macrosFromLines(DB.dishIng.filter(x=>x.dish_id===dishId));}

/* ============================================================
   REQ-07: Administración de usuarios (solo admin).
   Usa /api/admin (service role en el servidor). El cliente solo manda su JWT.
   ============================================================ */
let adminUsersCache=[];
function prettyDateTime(iso){try{const d=new Date(iso);if(isNaN(d))return "—";return d.getDate()+" "+MON[d.getMonth()]+" "+String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0");}catch(e){return "—";}}
async function adminApi(action,payload){
  const token=session&&session.access_token;
  if(!token)throw new Error("Sesión requerida.");
  const res=await fetch("/api/admin",{method:"POST",headers:{"content-type":"application/json","authorization":"Bearer "+token},body:JSON.stringify(Object.assign({action},payload||{}))});
  if(res.status===404)throw new Error("El endpoint /api/admin no está disponible (despliega en Vercel).");
  const data=await res.json().catch(()=>({}));
  if(!res.ok)throw new Error(data.error||("Error "+res.status));
  return data;
}
async function renderAdminUsers(){
  $("#app").innerHTML=`${screenHeader("Usuarios","Administración","perfil")}
    <div class="row between wrap" style="margin-bottom:12px">
      <button class="btn btn-sm" onclick="setView('perfil')">‹ Volver a Perfil</button>
      <button class="btn btn-sm" onclick="renderAdminUsers()">Actualizar</button>
    </div>
    <div id="adminList" class="muted small">Cargando usuarios…</div>`;
  try{
    const out=await adminApi("list");
    adminUsersCache=out.users||[];
    const list=$("#adminList");if(!list)return;
    const active=adminUsersCache.filter(u=>u.active).length;
    const admins=adminUsersCache.filter(u=>u.is_admin&&u.active).length;
    list.innerHTML=`<div class="summary" style="grid-template-columns:repeat(3,1fr);margin-bottom:14px">
        <div class="scard"><div class="n">${adminUsersCache.length}</div><div class="l">usuarios</div></div>
        <div class="scard"><div class="n">${active}</div><div class="l">activos</div></div>
        <div class="scard"><div class="n">${admins}</div><div class="l">admins activos</div></div>
      </div>
      <div class="row" style="align-items:flex-end;margin-bottom:12px">
        <div class="field" style="flex:1;margin:0"><label>Buscar</label><input id="adminSearch" type="search" placeholder="correo" oninput="filterAdminUsers()"></div>
        <div class="field" style="width:130px;margin:0"><label>Estado</label><select id="adminStatus" onchange="filterAdminUsers()"><option value="all">Todos</option><option value="active">Activos</option><option value="inactive">Inactivos</option></select></div>
      </div>
      <div id="adminCards"></div>`;
    filterAdminUsers();
  }catch(e){
    const list=$("#adminList");if(list)list.innerHTML=`<div class="ai-box">⚠️ ${esc(e.message)}<div class="muted small" style="margin-top:8px">Requiere SUPABASE_SERVICE_ROLE_KEY en Vercel y la migración supabase/admin.sql aplicada.</div></div>`;
  }
}
function filterAdminUsers(){
  const search=($("#adminSearch")&&$("#adminSearch").value||"").trim().toLowerCase();
  const status=($("#adminStatus")&&$("#adminStatus").value)||"all";
  const users=adminUsersCache.filter(u=>(!search||(u.email||"").toLowerCase().includes(search))&&(status==="all"||(status==="active")===u.active));
  const cards=$("#adminCards");if(cards)cards.innerHTML=adminUsersHtml(users);
}
function adminUsersHtml(users){
  if(!users.length)return '<div class="muted small">No hay usuarios que coincidan.</div>';
  return users.map(u=>{
    const me=u.id===uid();
    return `<div class="meal">
      <div class="meal-head"><div>
        <div class="name">${esc(u.email||u.id)} ${u.is_admin?'<span class="pill" style="background:var(--accent-dim);color:var(--purple-200)">admin</span>':''}${u.active?'':' <span class="pill" style="background:var(--bad);color:#fff">inactivo</span>'}${me?' <span class="pill">tú</span>':''}</div>
        <div class="nums muted">creado ${prettyDateTime(u.created_at)} · último acceso ${u.last_sign_in_at?prettyDateTime(u.last_sign_in_at):"nunca"}</div>
      </div></div>
      <div class="meal-actions">
        <button class="btn btn-sm" ${me?'disabled style="opacity:.4"':''} onclick="adminToggleActive('${u.id}',${u.active?'false':'true'})">${u.active?'Desactivar':'Activar'}</button>
        <button class="btn btn-sm" onclick="adminSetPassword('${u.id}')">Cambiar contraseña</button>
        <button class="btn btn-sm" onclick="adminResetLink('${u.id}')">Enviar reset</button>
      </div>
    </div>`;
  }).join("");
}
async function adminToggleActive(id,active){
  const user=adminUsersCache.find(u=>u.id===id);
  if(!active&&!confirm(`¿Desactivar ${user&&user.email?user.email:"este usuario"}? Se cerrará su acceso y no podrá escribir ni usar IA.`))return;
  try{await adminApi("setActive",{userId:id,active});toast(active?"Usuario activado":"Usuario desactivado");renderAdminUsers();}
  catch(e){toast(e.message);}
}
function adminSetPassword(id){
  const user=adminUsersCache.find(u=>u.id===id);window._adminPasswordUser=user||{id};
  modal(`<h3>Cambiar contraseña</h3>
    <p class="muted small">${esc((user&&user.email)||id)}</p>
    <div class="field"><label>Nueva contraseña</label><input id="adminPwd" type="password" autocomplete="new-password" minlength="8"></div>
    <div class="field"><label>Confirmar contraseña</label><input id="adminPwdConfirm" type="password" autocomplete="new-password" minlength="8"></div>
    <button class="btn btn-accent" style="width:100%" onclick="saveAdminPassword()">Actualizar contraseña</button>
    <div id="adminPwdOut" class="muted small" style="margin-top:8px"></div>`);
}
async function saveAdminPassword(){
  const user=window._adminPasswordUser,pwd=$("#adminPwd").value,confirmPwd=$("#adminPwdConfirm").value,out=$("#adminPwdOut");
  if(pwd.length<8){out.textContent="Usa al menos 8 caracteres.";return;}
  if(pwd!==confirmPwd){out.textContent="Las contraseñas no coinciden.";return;}
  out.textContent="Actualizando…";
  try{await adminApi("setPassword",{userId:user.id,password:pwd});closeModal();toast("Contraseña actualizada");}
  catch(e){toast(e.message);}
}
async function adminResetLink(id){
  const user=adminUsersCache.find(u=>u.id===id);
  if(!user||!user.email){toast("Ese usuario no tiene correo");return;}
  if(!confirm("¿Enviar un enlace de recuperación a "+user.email+"?"))return;
  try{await adminApi("resetPassword",{userId:id,redirectTo:location.origin+location.pathname});toast("Correo de recuperación enviado");}
  catch(e){toast(e.message);}
}

    $("#app").innerHTML=`${screenHeader("Alimentos",null,"foods")}<div class="dash"><b>Conecta tu base de datos</b><div class="muted small" style="margin:8px 0 12px">Aquí viven los ingredientes, platos y dietas con sus macros calculados. Conéctala en Ajustes (Supabase).</div><button class="btn btn-accent" style="width:100%" onclick="setView('settings')">Ir a Ajustes</button></div>`;return;
  }

function foodsDishes(){
  const bySlot={};DB.dishes.forEach(d=>{(bySlot[d.slot||"otros"]=bySlot[d.slot||"otros"]||[]).push(d);});
  const order=["desayuno","almuerzo","batido","cena","snack","otros"];
  let html=`<button class="btn btn-accent" style="width:100%;margin-bottom:10px" onclick="editDish(null)">＋ Nuevo plato</button>`;
  order.forEach(slot=>{if(!bySlot[slot])return;
    const inner=bySlot[slot].map(d=>{const m=dishMacros(d.id);
      return `<div class="meal"><div class="meal-head"><div>
        <div class="name">${esc(d.name)}${d.menu?` <span class="pill">Menú ${d.menu}</span>`:""}</div>
        <div class="nums"><b>${m.kcal}</b> kcal · P <b>${m.p}</b> · C <b>${m.c}</b> · G <b>${m.f}</b> g</div>
      </div></div><div class="meal-actions"><button class="btn btn-sm" onclick="editDish(${d.id})">Ver / editar receta</button></div></div>`;
    }).join("");
    html+=section("food.dish."+slot,slot,inner,`${bySlot[slot].length}`);
  });
  return html;
}
function foodsIngredients(){
  const byCat={};DB.ingredients.forEach(i=>{(byCat[i.category||"Otros"]=byCat[i.category||"Otros"]||[]).push(i);});
  let html=`<button class="btn btn-accent" style="width:100%;margin-bottom:10px" onclick="editIngredient(null)">＋ Nuevo ingrediente</button>`;
  Object.keys(byCat).sort().forEach(cat=>{
    const inner=byCat[cat].map(i=>`<div class="meal" onclick="editIngredient(${i.id})"><div class="meal-head"><div>
      <div class="name">${esc(i.name)}</div>
      <div class="nums muted">por 100 g — <b>${i.kcal}</b> kcal · P <b>${i.protein_g}</b> · C <b>${i.carbs_g}</b> · G <b>${i.fat_g}</b></div>
    </div></div></div>`).join("");
    html+=section("food.ing."+cat,esc(cat),inner,`${byCat[cat].length}`);
  });
  return html;
}
function foodsDiets(){
  const dayNames=["Dom","Lun","Mar","Mié","Jue","Vie","Sáb"];
  let html="";
  DB.diets.forEach(dt=>{
    const items=DB.dietDishes.filter(x=>x.diet_id===dt.id).sort((a,b)=>(((a.weekday+6)%7)-((b.weekday+6)%7)));
    let sum={kcal:0,p:0},n=0;
    const rows=items.map(it=>{const dish=DB.dishes.find(x=>x.id===it.dish_id);if(!dish)return"";const m=dishMacros(dish.id);sum.kcal+=m.kcal;sum.p+=m.p;n++;
      return `<div class="wk-day"><div class="wk-left"><div class="d">${dayNames[it.weekday]} <span class="muted small">${esc(it.slot||"")}</span></div><div class="m">${esc(dish.name)}</div></div><div class="center"><div style="font-weight:600">${m.kcal}</div><div class="muted small">P${m.p}</div></div></div>`;
    }).join("");
    html+=`<div class="section-h">${esc(dt.name)}</div><div class="muted small" style="margin:-4px 2px 8px">${esc(dt.description||"")}${n?` · almuerzo promedio ${Math.round(sum.kcal/n)} kcal / P ${Math.round(sum.p/n)} g`:""}</div>${rows}`;
  });
  return html||'<div class="muted small">Sin dietas.</div>';
}

/* ---- editor de ingrediente ---- */
function editIngredient(id){
  const it=id?ingById(id):{name:"",category:"",kcal:"",protein_g:"",carbs_g:"",fat_g:""};
  window._ing={id};
  modal(`<h3>${id?"Editar":"Nuevo"} ingrediente <span class="muted small">(valores por 100 g)</span></h3>
    <div class="field"><label>Nombre</label><input id="ig_name" value="${esc(it.name)}"></div>
    <div class="field"><label>Categoría</label><input id="ig_cat" value="${esc(it.category||"")}" placeholder="Proteína, Cereal, Verdura…"></div>
    <div class="grid4">
      <div class="field"><label>kcal</label><input id="ig_kcal" type="number" inputmode="decimal" value="${it.kcal}"></div>
      <div class="field"><label>Prot</label><input id="ig_p" type="number" inputmode="decimal" value="${it.protein_g}"></div>
      <div class="field"><label>Carb</label><input id="ig_c" type="number" inputmode="decimal" value="${it.carbs_g}"></div>
      <div class="field"><label>Grasa</label><input id="ig_f" type="number" inputmode="decimal" value="${it.fat_g}"></div>
    </div>
    <button class="btn btn-accent" style="width:100%;margin-top:8px" onclick="saveIngredient()">Guardar</button>
    ${id?`<button class="btn" style="width:100%;margin-top:8px" onclick="deleteIngredient(${id})">Eliminar</button>`:""}`);
}
async function saveIngredient(){
  const row={name:$("#ig_name").value.trim(),category:$("#ig_cat").value.trim()||null,kcal:+$("#ig_kcal").value||0,protein_g:+$("#ig_p").value||0,carbs_g:+$("#ig_c").value||0,fat_g:+$("#ig_f").value||0};
  if(!row.name){toast("Pon un nombre");return;}
  const id=window._ing.id;
  const res=id?await supa.from("ingredients").update(row).eq("id",id):await supa.from("ingredients").insert(row);
  if(res.error){toast("Error: "+res.error.message);return;}
  closeModal();await dbLoad();render();toast("Guardado");
}
async function deleteIngredient(id){
  if(!confirm("¿Eliminar ingrediente? No se puede si está usado en una receta."))return;
  const res=await supa.from("ingredients").delete().eq("id",id);
  if(res.error){toast("No se pudo: "+res.error.message);return;}
  closeModal();await dbLoad();render();toast("Eliminado");
}

/* ---- editor de plato (con receta) ---- */
function editDish(id){
  const dish=id?DB.dishes.find(d=>d.id===id):{name:"",slot:"almuerzo",menu:""};
  const lines=id?DB.dishIng.filter(x=>x.dish_id===id).map(l=>({ingredient_id:l.ingredient_id,grams:l.grams})):[];
  window._dish={id,name:dish.name||"",slot:dish.slot||"almuerzo",menu:dish.menu||"",lines};
  dishModal();
}
function dishSync(){const n=document.getElementById("ds_name");if(n)window._dish.name=n.value;}
function dishModal(){
  const d=window._dish;const m=macrosFromLines(d.lines);
  const slots=["desayuno","almuerzo","batido","cena","snack"];
  const linesHtml=d.lines.map((l,idx)=>`<div class="row" style="margin-bottom:6px">
    <select onchange="dishLineSet(${idx},'ingredient_id',this.value)" style="flex:1;background:var(--card2);border:1px solid var(--line);border-radius:8px;color:var(--txt);padding:8px">${DB.ingredients.map(i=>`<option value="${i.id}" ${i.id===+l.ingredient_id?"selected":""}>${esc(i.name)}</option>`).join("")}</select>
    <input type="number" inputmode="decimal" value="${l.grams}" onchange="dishLineSet(${idx},'grams',this.value)" style="width:64px;background:var(--card2);border:1px solid var(--line);border-radius:8px;color:var(--txt);padding:8px;text-align:center">
    <span class="muted small">g</span>
    <button class="btn btn-sm" onclick="dishLineDel(${idx})">✕</button>
  </div>`).join("");
  modal(`<h3>${d.id?"Editar":"Nuevo"} plato</h3>
    <div class="field"><label>Nombre</label><input id="ds_name" value="${esc(d.name)}"></div>
    <div class="row">
      <div class="field" style="flex:1"><label>Slot</label><select id="ds_slot" onchange="window._dish.slot=this.value">${slots.map(s=>`<option ${s===d.slot?"selected":""}>${s}</option>`).join("")}</select></div>
      <div class="field" style="flex:1"><label>Menú</label><select id="ds_menu" onchange="window._dish.menu=this.value"><option value="">—</option>${["A","B","C","D"].map(x=>`<option ${x===d.menu?"selected":""}>${x}</option>`).join("")}</select></div>
    </div>
    <div class="section-h" style="margin-left:0">Ingredientes (g)</div>
    ${linesHtml||'<div class="muted small">Sin ingredientes aún.</div>'}
    <button class="btn btn-sm" style="margin-top:6px" onclick="dishLineAdd()">＋ Agregar ingrediente</button>
    <div class="ai-box" style="margin-top:12px"><b>Macros calculados:</b> ${m.kcal} kcal · P ${m.p} · C ${m.c} · G ${m.f} g</div>
    <button class="btn btn-accent" style="width:100%;margin-top:12px" onclick="saveDish()">Guardar plato</button>
    ${d.id?`<button class="btn" style="width:100%;margin-top:8px" onclick="deleteDish(${d.id})">Eliminar plato</button>`:""}`);
}
function dishLineSet(idx,field,val){window._dish.lines[idx][field]=val;dishSync();dishModal();}
function dishLineDel(idx){dishSync();window._dish.lines.splice(idx,1);dishModal();}
function dishLineAdd(){if(!DB.ingredients.length){toast("Agrega ingredientes primero");return;}dishSync();window._dish.lines.push({ingredient_id:DB.ingredients[0].id,grams:100});dishModal();}
async function saveDish(){
  const d=window._dish;dishSync();d.name=(d.name||"").trim();
  if(!d.name){toast("Pon un nombre al plato");return;}
  let dishId=d.id;
  if(dishId){const r=await supa.from("dishes").update({name:d.name,slot:d.slot,menu:d.menu||null}).eq("id",dishId);if(r.error){toast("Error: "+r.error.message);return;}}
  else{const r=await supa.from("dishes").insert({name:d.name,slot:d.slot,menu:d.menu||null}).select();if(r.error){toast("Error: "+r.error.message);return;}dishId=r.data[0].id;}
  await supa.from("dish_ingredients").delete().eq("dish_id",dishId);
  const rows=d.lines.filter(l=>l.ingredient_id&&l.grams).map(l=>({dish_id:dishId,ingredient_id:+l.ingredient_id,grams:+l.grams}));
  if(rows.length){const r=await supa.from("dish_ingredients").insert(rows);if(r.error){toast("Error en ingredientes: "+r.error.message);return;}}
  closeModal();await dbLoad();render();toast("Plato guardado");
}
async function deleteDish(id){
  if(!confirm("¿Eliminar este plato?"))return;
  const r=await supa.from("dishes").delete().eq("id",id);
  if(r.error){toast("No se pudo: "+r.error.message);return;}
  closeModal();await dbLoad();render();toast("Plato eliminado");
}

/* ---------- util ---------- */
function esc(s){return String(s==null?"":s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));}

/* ---------- init ---------- */
function registerServiceWorker(){
  if(!CONFIG.pwa.registerServiceWorker||!("serviceWorker" in navigator))return;
  const host=location.hostname;
  const secure=location.protocol==="https:"||host==="localhost"||host==="127.0.0.1"||host==="::1";
  if(!secure)return;
  window.addEventListener("load",()=>{
    navigator.serviceWorker.register("./service-worker.js").catch(e=>console.warn("No se pudo registrar el service worker",e));
  });
}
// Carga la base de datos si hay conexión, para que los macros del día salgan de la DB.
function ensureDB(){if(supa&&!DB.loaded&&!DB.error)return dbLoad().then(render);return Promise.resolve();}
// Escucha cambios de sesión (login en otra pestaña, refresh de token, logout).
function setupAuthListener(){
  if(!supa||window._authSub)return;
  window._authSub=supa.auth.onAuthStateChange((event,sess)=>{
    session=sess||null;
    if(event==="PASSWORD_RECOVERY"){passwordRecovery=true;authReady=true;render();}
    else if(event==="SIGNED_OUT")clearSignedOutState();
    else if(event==="SIGNED_IN"){if(!profile||profile.id!==uid())onAuth();}
  });
}
async function boot(){
  // Producción: las credenciales de Supabase llegan de /api/config (Vercel).
  // Cárgalas ANTES de pintar, para no mostrar la pantalla de "conectar Supabase"
  // en vez del login. Si ya hay override local, no hace falta esperar.
  const hasLocalCreds=!!(S.settings&&S.settings.supaUrl&&S.settings.supaKey);
  if(!hasLocalCreds)await loadRemoteConfig();
  supaInit();
  setupAuthListener();
  await refreshAuth();         // resuelve sesión (authReady=true)
  if(session)await onAuth(); else render();
}
registerServiceWorker();
// Captura el evento de instalación (Android/Chrome) y oculta la sugerencia si ya se instaló.
window.addEventListener("beforeinstallprompt",e=>{e.preventDefault();deferredInstallPrompt=e;updateInstallPrompt();});
window.addEventListener("appinstalled",()=>{UI.installDismissed=true;uiSave();removeInstallPrompt();});
render();                      // splash mientras resolvemos la sesión
boot();                        // carga config (Vercel) → conecta Supabase → resuelve sesión
</script>
</body>
</html>
