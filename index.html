async function finishPasswordRecovery(){
  const pwd=$("#recovery_pwd").value,confirmPwd=$("#recovery_confirm").value,out=$("#recoveryOut");
  if(pwd.length<8){out.textContent="Usa al menos 8 caracteres.";return;}
  if(pwd!==confirmPwd){out.textContent="Las contraseñas no coinciden.";return;}
  out.textContent="Actualizando…";
  const result=await supa.auth.updateUser({password:pwd});
  if(result.error){out.textContent="⚠️ "+result.error.message;return;}
  if(history&&history.replaceState)history.replaceState({},document.title,location.pathname);
  passwordRecovery=false;

function openReplace(ds,id,reason){
  const day=buildDay(ds);const base=day.meals.find(m=>m.id===id);
  const ms=mealState(ds,id);const currentVal=mealValue(base,ms);
  // Opciones desde la base de datos, filtradas por el slot de la comida.
  const options=(DB.loaded?DB.dishes.filter(d=>(d.slot||"")===id):[]).map(d=>({name:d.name,dishName:d.name}));
  const optsHtml=options.map((o,i)=>{
    const d=o.dishName?dishByName(o.dishName):null;const m=d?dishMacros(d.id):null;
    const deltaKcal=m&&currentVal.kcal?m.kcal-currentVal.kcal:null;
    const deltaStr=deltaKcal!=null?` <span class="muted">(${deltaKcal>0?"+":""}${deltaKcal} kcal)</span>`:"";
    const meta=m?`${m.kcal} kcal · P ${m.p} · C ${m.c} · G ${m.f} g${deltaStr}`:"";
    return `<button class="opt" onclick="applyReplace('${ds}','${id}',${i},'${reason||""}')">${esc(o.name)}<div class="o-meta">${meta}</div></button>`;
  }).join("");
  const reasonLabel={no_cook:"Sin cocina",eat_out:"Comer fuera",missing_ingredient:"Sin ingrediente"}[reason]||"Reemplazar";
  const reasonHint={no_cook:"Elige una opción que no requiera cocinar.",eat_out:"Elige el equivalente más cercano para comer afuera.",missing_ingredient:"Elige otro plato compatible con tus metas."}[reason]||"Elige un plato de la base con macros calculados por ingredientes o crea una comida personalizada.";
  const scopeHtml=reason?`<div class="row" style="margin:10px 0 4px;gap:8px">
    <label class="muted small"><input type="radio" name="replScope" value="day" checked> Solo hoy</label>
    <label class="muted small"><input type="radio" name="replScope" value="week"> Esta semana</label>
  </div>`:"";
  window._replaceOpts={ds,id,options};
  modal(`<h3>${reasonLabel} — ${esc(base.slot)}</h3>
    <p class="muted small">${reasonHint}${currentVal.kcal?` Actual: ${currentVal.kcal} kcal.`:""}</p>
    ${scopeHtml}
    ${optsHtml||'<p class="muted small">No hay platos en la base para este espacio. Puedes crear una comida personalizada.</p>'}
    <button class="btn btn-accent" style="width:100%;margin-top:6px" onclick="openEditor('meal','${ds}','${id}')">✎ Personalizada / editar valores</button>`);
}
function applyReplace(ds,id,i,reason){
  const{options}=window._replaceOpts;const o=options[i];const ms=mealState(ds,id);
  const prev=ms.ovr?ms.ovr.name:null;
  ms.ovr={name:o.name,dishName:o.dishName||null};
  if(reason)ms.ovr.contingencyReason=reason;
  addContingencyEntry(ds,{type:"meal_replace",id,reason:reason||null,chosen:o.name,prev});
  const scope=(document.querySelector("input[name='replScope']:checked")||{}).value||"day";
  if(scope==="week"&&reason)propagateMealOverride(ds,id,{...ms.ovr});
  commitDay(ds);closeModal();render();toast("Comida actualizada");
}

/* ---- Contingencia: helpers ---- */
function addContingencyEntry(ds,entry){
  const st=dayState(ds);if(!st.contingencyLog)st.contingencyLog=[];
  st.contingencyLog.push(Object.assign({at:new Date().toISOString()},entry));
}
function revertMeal(ds,id){
  const ms=mealState(ds,id);const prev=ms.ovr?ms.ovr.name:null;
  delete ms.ovr;addContingencyEntry(ds,{type:"meal_revert",id,prev});
  commitDay(ds);render();toast("Comida restaurada al plan original");
}
function propagateMealOverride(ds,id,ovr){
  const w=weekOf(ds,planPrefsForDate(ds))||weekOf(ds)||(WEEKS&&WEEKS[0]);if(!w)return;
  weekDays(w).filter(d=>d>ds).forEach(d=>{
    const day=buildDay(d);if(!day.meals.find(m=>m.id===id))return;
    const ms=mealState(d,id);if(!ms.done){ms.ovr=Object.assign({},ovr);commitDay(d);}
  });
}
function openMealContingency(ds,id){
  const day=buildDay(ds);const base=day.meals.find(m=>m.id===id);if(!base)return;

}
/* ---- Contingencia: entrenamiento ---- */
function openWorkoutContingency(ds,reason){
  if(trainingSafetyHold()){toast("El entrenamiento está pausado por seguridad");return;}
  const execution=normalizedWorkoutExecution(ds);
  if(execution||dayState(ds).workoutDone){toast("La sesión registrada conserva el entrenamiento ejecutado");return;}
  const ew=effectiveWorkout(ds);const allOpts=workoutOptions(ds);
  const titles={tiempo:"Solo tengo poco tiempo",casa:"Hoy entreno en casa",equipo:"Sin acceso al equipo"};
  const hints={tiempo:"Elige la sesión más eficiente o descansa activamente.",casa:"Elige una opción que puedas hacer en casa.",equipo:"Opciones sin equipamiento especializado."};
  let filtered=allOpts;
  if(reason==="equipo"||reason==="casa"){
    const bwIds=allOpts.filter(o=>o.id&&(o.id.startsWith("bw")||o.kind==="Descanso"||(exerciseArray(o.exerciseIds).every(sid=>{const ex=exerciseBySlug(sid);return!ex||!ex.equipment||ex.equipment.length===0||ex.equipment.includes("ninguno")||ex.equipment.includes("bodyweight");}))));
    if(bwIds.length)filtered=bwIds;
  }
  const optsHtml=filtered.map(o=>{
    const cur=o.id===ew.id;
    return `<button class="opt" onclick="applyWorkoutContingency('${ds}','${o.id}','${reason}')" style="${cur?'border-color:var(--accent)':''}">${esc(o.name)}${cur?' ✓':''}<div class="o-meta">${esc(o.detail)}</div></button>`;
  }).join("");
  modal(`<h3>${titles[reason]||"Adaptar entrenamiento"}</h3>
    <p class="muted small">${hints[reason]||""} Planificado hoy: <b>${esc(ew.planned.name)}</b>.</p>
    ${optsHtml}`);
}
function applyWorkoutContingency(ds,id,reason){
  if(trainingSafetyHold()){toast("El entrenamiento está pausado por seguridad");return;}
  const planned=plannedWorkoutId(ds);
  const d=dayState(ds);const prev=d.workoutOverride||planned;
  if(id&&id!==planned)d.workoutOverride=id;else delete d.workoutOverride;
  addContingencyEntry(ds,{type:"workout_change",reason,chosen:id,prev});
  commitDay(ds);closeModal();render();toast("Entrenamiento actualizado");
}
function openMissedSession(ds){
  if(dayState(ds).workoutDone||normalizedWorkoutExecution(ds)){toast("Este día ya tiene una sesión registrada");return;}
  const ew=effectiveWorkout(ds);
  if(ew.workout.id==="descanso"){toast("Este día ya es un descanso planificado");return;}
  modal(`<h3>Me perdí la sesión</h3>
    <p class="muted small">Sesión de hoy: <b>${esc(ew.planned.name)}</b>. ¿Qué prefieres hacer?</p>
    <button class="opt" onclick="applyMissedSession('${ds}','continue')">✓ Seguir con el plan<div class="o-meta">No duplicas carga; continúas normalmente desde mañana.</div></button>
    <button class="opt" onclick="applyMissedSession('${ds}','reschedule')">↩ Recuperarla en otro momento<div class="o-meta">Registras la intención; tú decides cuándo hacerla.</div></button>
    <button class="opt" onclick="applyMissedSession('${ds}','rest')">☾ Convertir en descanso<div class="o-meta">Marcas el día como descanso planificado; no cuenta como sesión perdida.</div></button>
    <button class="btn" style="width:100%;margin-top:8px" onclick="closeModal()">Cancelar</button>`);
}
function applyMissedSession(ds,action){
  const ew=effectiveWorkout(ds);
  addContingencyEntry(ds,{type:"missed_session",action,session:ew.planned.name});
  if(action==="rest"){const d=dayState(ds);d.workoutOverride="descanso";commitDay(ds);closeModal();render();toast("Día marcado como descanso planificado");}
  else{commitDay(ds);closeModal();render();toast(action==="reschedule"?"Registrado: recuperar en otro momento":"Registrado: seguir con el plan desde mañana");}
}

// Arma el system prompt de Claude desde las preferencias del perfil.
const DIET_LABELS={vegetariano:"vegetariano",vegano:"vegano",sin_huevo:"sin huevo",sin_lacteos:"sin lácteos",sin_gluten:"sin gluten",omnivoro:"omnívoro"};
function buildSysPrompt(){
  const p=migrateProfilePrefs((profile&&profile.prefs)||{});
  const safety=trainingSafetyHold()
    ?"La evaluación tiene una señal de alerta: no propongas rutinas, progresiones ni formas de entrenar; indica detener actividad y buscar evaluación profesional."

  const base=`Da estimaciones realistas de porciones reales, con kcal y macros. Habla como el coach del usuario y no menciones tecnología, proveedores, modelos, prompts ni tokens. No diagnostiques, no prescribas tratamientos, no cambies medicación y no sustituyas a un profesional de salud. ${safety}`;
  const context={
    schema_version:p.profileSchemaVersion,
    time_zone:p.timeZone,
    body:{weight_kg:+p.weightKg||null,body_fat_pct:+p.bodyFatPct||null},
    nutrition:{
      diet:(p.diet||[]).map(d=>DIET_LABELS[d]||d),
      goal:p.goal||null,
      daily_targets:{kcal:+p.calorieTarget||null,protein_g:+p.proteinTarget||null,carbs_g:+p.carbTarget||null,fat_g:+p.fatTarget||null},
      meals_per_day:p.mealCount,
      meal_times:p.mealTimes,
      eating_window:{start:p.eatingWindowStart,end:p.eatingWindowEnd},
      main_meal:p.mainMealIndex,
      cooking_minutes:p.cookingMinutes,
      budget:p.foodBudget,
      repetition:p.repeatPreference,
      preferred_cuisines:p.preferredCuisines,
      preferred_preparations:p.preferredPreparations,
      preferred_ingredients:p.preferredIngredients||null,
      notes:p.foodNotes||null,
      hard_restrictions:p.allergies||null,
      disliked_ingredients:p.dislikedIngredients||null,
    },
    training:{
      primary_sport:p.primarySport,
      strength_mode:p.strengthMode,
      available_days:p.trainingDays,
      location_by_day:p.trainingLocations,
      session_minutes:p.sessionMinutes,
      equipment:p.equipment,
      experience:p.trainingExperience,
      priority:p.trainingPriority,
      preferred_time:p.preferredTrainingTime,
      injuries:p.injuries||null,

  return `Perfil estructurado del usuario (JSON): ${JSON.stringify(context)}. ${base} Las restricciones duras son obligatorias; los ingredientes no preferidos son preferencias blandas. Respeta siempre el perfil y no inventes recursos que el usuario no tiene.`;
}
function coachRequestId(){
  if(window.crypto&&typeof window.crypto.randomUUID==="function")return window.crypto.randomUUID();
  const bytes=new Uint8Array(16);
  if(window.crypto&&window.crypto.getRandomValues)window.crypto.getRandomValues(bytes);
  else for(let i=0;i<bytes.length;i++)bytes[i]=Math.floor(Math.random()*256);
  bytes[6]=(bytes[6]&15)|64;bytes[8]=(bytes[8]&63)|128;
  const hex=Array.from(bytes,b=>b.toString(16).padStart(2,"0")).join("");
  return `${hex.slice(0,8)}-${hex.slice(8,12)}-${hex.slice(12,16)}-${hex.slice(16,20)}-${hex.slice(20)}`;
}
const coachActionsInFlight=new Set();

function coachHardRestrictions(){

  return [...new Set(terms.map(x=>x.toLowerCase()))];
}

function coachQuota(action,requestId,partKey,fallbackText,validation,scope){
  const context={...coachCompatibilityContext(action),scope:scope||null};
  const serialized=JSON.stringify(context);
  return {
    action,requestId,partKey,
    contextKey:"ctx-"+hashText(serialized)+"-"+hashText(serialized.split("").reverse().join("")),
    fallbackText:String(fallbackText||""),
    validation:validation||{},
  };
}
async function coachProxyFetch(payload){
  let lastError=null;
  for(let attempt=0;attempt<2;attempt++){
    try{
      const res=await fetch("/api/claude",{
        method:"POST",headers:{"content-type":"application/json","authorization":"Bearer "+session.access_token},
        body:JSON.stringify(payload)
      });
      const data=await res.json().catch(()=>({}));
      if(res.status===409&&attempt===0){await new Promise(resolve=>setTimeout(resolve,350));continue;}
      if(res.status===404)throw new Error("El proxy /api/claude no está disponible. Despliega en Vercel o usa una configuración local de desarrollo.");
      if(!res.ok)throw new Error(data.error||("Error "+res.status));
      return data;
    }catch(e){
      lastError=e;
      if(attempt===0&&/fetch|network|conexi|proceso/i.test(String(e&&e.message||e))){
        await new Promise(resolve=>setTimeout(resolve,250));
        continue;
      }
      throw e;
    }
  }
  throw lastError||new Error("No se pudo contactar al coach.");
}
async function callClaude(userText,maxTokens,quota){
  if(!isActive())throw new Error("Tu cuenta está desactivada.");
  if(!hasRequiredConsents()||!hasCurrentScreening())throw new Error("Revisa privacidad y seguridad antes de usar tu coach.");
  const cfg=effectiveSettings();
  // 1) Override local: si guardaste una API key en este navegador, llamada directa
  //    (útil para desarrollo local sin las funciones serverless).
  if(cfg.apiKey){
    const res=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"x-api-key":cfg.apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true","content-type":"application/json"},
      body:JSON.stringify({model:cfg.model||DEFAULT_MODEL,max_tokens:maxTokens||512,system:buildSysPrompt(),messages:[{role:"user",content:userText}]})
    });
    if(!res.ok){const e=await res.text();throw new Error("API "+res.status+": "+e.slice(0,200));}
    const data=await res.json();
    return (data.content&&data.content[0]&&data.content[0].text)||"";
  }
  // 2) Producción (Vercel): proxy /api/claude. La API key vive solo en el servidor.
  //    El proxy exige sesión: enviamos el token de Supabase (Bearer) para que valide.
  const token=session&&session.access_token;
  if(!token)throw new Error("Inicia sesión para usar tu coach.");
  if(!quota||!quota.action||!quota.requestId)throw new Error("La acción del coach no tiene una reserva válida.");
  const data=await coachProxyFetch({
    userText,system:buildSysPrompt(),maxTokens:maxTokens||512,model:cfg.model||DEFAULT_MODEL,quota
  });
  return data.text||"";
}
function parseJSON(txt){
  let t=txt.trim().replace(/^```(json)?/i,"").replace(/```$/,"").trim();
  const a=t.indexOf("{"),b=t.lastIndexOf("}");
  if(a>=0&&b>=0)t=t.slice(a,b+1);

function compatibleIngredient(candidates,fallback){
  const restricted=coachHardRestrictions();
  return candidates.find(name=>!restricted.some(term=>name.toLowerCase().includes(term)))||fallback;
}
function splitDailyTarget(total,count,index){
  const base=Math.floor(Number(total||0)/count);
  return index===count-1?Math.round(Number(total||0)-base*(count-1)):base;
}
// Distribución ponderada: la comida principal recibe el 30 % y el resto se distribuye uniformemente.
function weightedMealSplit(total,count,index,mainIndex){
  if(count<=1||!Number.isInteger(mainIndex)||mainIndex<0||mainIndex>=count)
    return splitDailyTarget(total,count,index);
  const main=Math.round(Number(total||0)*0.3);
  const rest=Number(total||0)-main;
  const otherCount=count-1;
  if(index===mainIndex)return main;
  const otherIndex=index<mainIndex?index:index-1;
  const base=Math.floor(rest/otherCount);
  return otherIndex===otherCount-1?Math.round(rest-base*(otherCount-1)):base;
}
function deterministicDayPayload(ds){

  const proteinName=compatibleIngredient(
    ["Proteína vegetal en polvo","Seitán","Tofu firme","Lentejas cocidas"],
    "Fuente de proteína compatible"
  );
  const carbName=compatibleIngredient(["Arroz cocido","Quinua cocida","Papa","Avena"],"Fuente de carbohidratos compatible");
  const fatName=compatibleIngredient(["Aceite de oliva","Palta","Chía"],"Fuente de grasas compatible");
  const comidas=day.meals.map((meal,index)=>{
    const p=weightedMealSplit(target.p,count,index,mainIndex);
    const c=weightedMealSplit(target.c,count,index,mainIndex);
    const f=weightedMealSplit(target.f,count,index,mainIndex);
    return {
      slot_id:meal.id,

      ingredientes:[
        {nombre:proteinName,gramos:Math.max(10,Math.round(p/0.8))},

        {nombre:fatName,gramos:Math.max(3,Math.round(f))},
        {nombre:"Verduras variadas compatibles",gramos:100},
      ],
      kcal:weightedMealSplit(target.kcal,count,index,mainIndex),
      proteina_g:p,carbohidratos_g:c,grasa_g:f,
    };
  });
  return {explicacion:"Alternativa práctica construida con tus metas y restricciones vigentes.",comidas};
}
function deterministicSuggestionPayload(remK,remP){
  const budget=Math.max(100,Number(remK)||0);
  const protein=Math.max(10,Math.min(Number(remP)||10,Math.round(budget/8)));
  const names=["Bowl práctico compatible","Plato rápido compatible","Opción simple para completar el día"];
  return {opciones:names.map((nombre,index)=>{
    const factor=[.9,.72,.55][index];
    const kcal=Math.max(80,Math.round(budget*factor));
    const p=Math.max(10,Math.round(protein*factor));
    const f=Math.max(4,Math.round(kcal*.25/9));
    const c=Math.max(5,Math.round((kcal-p*4-f*9)/4));
    return {nombre,kcal,proteina_g:p,carbohidratos_g:c,grasa_g:f};
  })};
}

function buildShoppingList(daysData){
  const totals=new Map();
  (daysData||[]).forEach(d=>{
    (d.comidas||[]).forEach(c=>{
      (c.ingredientes||[]).forEach(g=>{
        const key=(g.nombre||"").trim().toLowerCase();
        if(!key)return;
        const prev=totals.get(key)||{nombre:g.nombre,gramos:0};
        totals.set(key,{nombre:prev.nombre,gramos:prev.gramos+Math.round(Number(g.gramos||0))});
      });
    });
  });
  return [...totals.values()].sort((a,b)=>b.gramos-a.gramos);
}

function trainingEquipmentSupports(requirement,prefs){

function exerciseConflictsWithProfile(exercise,prefs){
  const blocked=String([prefs.injuries,prefs.limitations,prefs.avoidMovements].filter(Boolean).join(" ")).toLowerCase();
  if(!blocked)return false;
  const words=new Set(blocked.split(/[^a-záéíóúñ]+/i).filter(word=>word.length>=5&&!["evitar","dolor","lesion","lesión","movimiento"].includes(word)));
  if(!words.size)return false;
  const safety=[
    exercise.name,exercise.movement_pattern,
    ...exerciseArray(exercise.aliases),...exerciseArray(exercise.contraindications),
    ...exerciseArray(exercise.safety_signals),
  ].join(" ").toLowerCase();
  return [...words].some(word=>safety.includes(word));
}
function allowedExercisesForSession(spec,prefs,catalog){
  const strength=spec.type==="strength";
  const cardioRoleIds=!strength&&WORKOUT_EXERCISE_IDS[prefs.primarySport]
    ?new Set(WORKOUT_EXERCISE_IDS[prefs.primarySport][spec.role]||[]):null;
  return catalog.filter(exercise=>{
    if(exerciseConflictsWithProfile(exercise,prefs))return false;
    const places=exerciseArray(exercise.places);
    if(places.length&&!places.includes(spec.location))return false;
    if(strength){
      const disciplines=prefs.strengthMode==="bodyweight"
        ?new Set(["bodyweight","strength"])
        :new Set(["gym","strength","bodyweight"]);
      if(!disciplines.has(exercise.discipline))return false;
      return exerciseArray(exercise.equipment).every(item=>trainingEquipmentSupports(item,prefs));
    }
    return exercise.discipline===prefs.primarySport&&(!cardioRoleIds||cardioRoleIds.has(exercise.slug));
  });
}
function trainingExpectedWeeks(prefs){
  const p=migrateProfilePrefs(prefs||((profile&&profile.prefs)||{}));
  const training=trainingPrefsFromPrefs(p);
  const calendar=planCalendarForPrefs(p);
  const schedule=workoutSchedule(training.days,training.dayIds,training.priority,training.locations,training.primary);
  const strengthRoles=new Set(["fullA","fullB","torsoA","torsoB","piernaA","piernaB"]);
  const catalog=activeTrainingCatalog();
  return calendar.weeks.map((week,index)=>{
    const sessions=[];
    for(let offset=0;offset<7;offset++){
      const date=addDays(week.start,offset);
      const weekday=parseYmd(date).getDay();
      if(!training.dayIds.includes(weekday))continue;
      const role=schedule[weekday];
      const type=strengthRoles.has(role)?"strength":training.primary;
      const spec={date,weekday,location:training.locations[weekday],role,type};
      spec.allowedExerciseIds=allowedExercisesForSession(spec,p,catalog).map(exercise=>exercise.slug);
      sessions.push(spec);
    }
    return {week:index+1,phase:TRAINING_PLAN.phaseForWeek(index+1,training.duration),sessions};
  });

async function regenerateTrainingDraftSession(date){
  const draft=window._trainingDraft;if(!draft)return;
  const weekIndex=draft.expectedWeeks.findIndex(week=>week.sessions.some(session=>session.date===date));
  if(weekIndex<0)return;

  const expected={...expectedWeek,sessions:expectedWeek.sessions.filter(session=>session.date===date)};
  const actionKey=`training_replacement_${date}`;
  const requestId=beginCoachAction(actionKey);if(!requestId)return;
  const out=$("#trainingPlanOut");if(out)out.innerHTML=`<div class="ai-box">Preparando otra sesión para ${prettyDate(date)}…</div>`;
  try{
    let result;

      result=await generateTrainingWeek(expected,draft.prefs,{action:"training_replacement",requestId,partKey:`session-${date}`,fallbackOnly:!aiAvailable()});
      if(!result.ok)throw new Error(result.issues[0]);
    }catch(error){
      result=await generateTrainingWeek(expected,draft.prefs,{fallbackOnly:true});
    }

      :week);
    const plan={...draft.plan,weeks,createdAt:new Date().toISOString()};
    await persistTrainingDraft(plan,draft.prefs,draft.expectedWeeks,result.fallback?[prettyDate(date)]:[]);
    $("#trainingPlanOut").innerHTML=trainingDraftReviewHtml();
  }catch(error){if(out)out.innerHTML=`<div class="ai-box">⚠️ ${esc(coachErrorMessage(error))}</div>`;}

/* ============================================================
   REQ-08 — Generador de días de dieta con Claude.
   Usa contexto real del usuario (prefs, metas, platos de la DB, historial),
   valida la respuesta y deja revisar antes de aplicar. Solo autenticados
   (callClaude exige sesión).
   ============================================================ */
// Nombres de comidas de los últimos N días (para evitar repetir).
function recentMealNames(ds,n){
  const names=[];
  for(let i=1;i<=n;i++){
    const prev=addDays(ds,-i); const st=S.days&&S.days[prev]; if(!st)continue;
    const day=buildDay(prev);
    day.meals.forEach(b=>{const ms=st.meals&&st.meals[b.id];const v=mealValue(b,ms);if(v&&v.name)names.push(v.name);});
    (st.extras||[]).forEach(e=>{if(e.name)names.push(e.name);});
  }
  return names;
}
// Valida la respuesta de Claude contra metas, restricciones y repetición.
function validateGeneratedDay(j,day,target){
  const issues=[], warns=[];
  if(!j||!Array.isArray(j.comidas)||!j.comidas.length){return{ok:false,issues:["La respuesta no trae comidas."]};}
  const slotIds=day.meals.map(m=>m.id);
  const prefs=migrateProfilePrefs((profile&&profile.prefs)||{});
  const noEgg=Array.isArray(prefs.diet)&&(prefs.diet.includes("sin_huevo")||prefs.diet.includes("vegano"));
  const recent=recentMealNames(day.ds,5).map(s=>s.toLowerCase());
  const knownIng=new Set((DB.ingredients||[]).map(i=>i.name.toLowerCase()));
  let tot={kcal:0,p:0,c:0,f:0}; const comidas=[];
  j.comidas.forEach((c,idx)=>{
    const slot_id=c.slot_id||c.slot||slotIds[idx]||("slot"+idx);
    const nombre=coachCopy((c.nombre||c.name||"").trim());
    const ings=Array.isArray(c.ingredientes)?c.ingredientes.map(x=>({nombre:coachCopy((x.nombre||x.name||"").trim()),gramos:+(x.gramos!=null?x.gramos:x.grams)})):[];
    if(!nombre)issues.push(`Comida ${idx+1} sin nombre.`);
    if(!ings.length)issues.push(`"${nombre||("Comida "+(idx+1))}" sin ingredientes.`);
    ings.forEach(g=>{if(!(g.gramos>0))issues.push(`"${nombre}": gramos inválidos en "${g.nombre}".`);});
    const macro={kcal:+c.kcal||0,p:+c.proteina_g||+c.p||0,c:+c.carbohidratos_g||+c.c||0,f:+c.grasa_g||+c.f||0};
    tot.kcal+=macro.kcal;tot.p+=macro.p;tot.c+=macro.c;tot.f+=macro.f;
    // huevo / restricción
    const hay=(nombre+" "+ings.map(g=>g.nombre).join(" ")).toLowerCase();
    if(noEgg&&/\bhuevo|clara de huevo|yema\b/.test(hay))issues.push(`"${nombre}" contiene huevo (restricción del perfil).`);
    if(prefs.allergies){prefs.allergies.toLowerCase().split(/[,;]/).map(s=>s.trim()).filter(Boolean).forEach(a=>{if(hay.includes(a))issues.push(`"${nombre}" incluye "${a}" (restricción obligatoria).`);});}
    if(prefs.dislikedIngredients){prefs.dislikedIngredients.toLowerCase().split(/[,;]/).map(s=>s.trim()).filter(Boolean).forEach(a=>{if(hay.includes(a))warns.push(`"${nombre}" incluye "${a}", que marcaste como no preferido.`);});}
    // ingredientes nuevos (no en la DB)
    const nuevos=ings.filter(g=>g.nombre&&!knownIng.has(g.nombre.toLowerCase())).map(g=>g.nombre);
    if(nuevos.length&&DB.loaded)warns.push(`"${nombre}": ingredientes nuevos (${nuevos.join(", ")}).`);
    if(recent.includes(nombre.toLowerCase()))warns.push(`"${nombre}" se repite respecto a días recientes.`);
    comidas.push({slot_id,nombre,ingredientes:ings,kcal:Math.round(macro.kcal),proteina_g:Math.round(macro.p),carbohidratos_g:Math.round(macro.c),grasa_g:Math.round(macro.f)});
  });
  // tolerancia del día: kcal ±15%, proteína no menos del 85% de la meta
  const off=(v,t,tol)=>t>0&&Math.abs(v-t)>t*tol;
  if(off(tot.kcal,target.kcal,0.15))issues.push(`kcal del día ${Math.round(tot.kcal)} fuera de ±15% de ${target.kcal}.`);
  if(tot.p<target.p*0.85)issues.push(`Proteína ${Math.round(tot.p)} g por debajo del 85% de la meta (${target.p} g).`);
  if(off(tot.c,target.c,0.3))warns.push(`Carbohidratos ${Math.round(tot.c)} g lejos de la meta (${target.c} g).`);
  return{ok:issues.length===0,issues,warns,comidas,totals:{kcal:Math.round(tot.kcal),p:Math.round(tot.p),c:Math.round(tot.c),f:Math.round(tot.f)},explicacion:coachCopy((j.explicacion||j.explicación||"").trim())};
}

// --- modelo de peso: S.weights[n] puede ser número (legado, solo kg) u objeto {kg,bf}.
function wEntry(n){const v=S.weights[n];if(v==null)return null;return typeof v==="object"?v:{kg:+v,bf:null};}
function wkg(n){const e=wEntry(n);return e&&e.kg!=null?+e.kg:null;}
function wbf(n){const e=wEntry(n);return e&&e.bf!=null?+e.bf:null;}
function setWeightEntry(n,patch){
  const e=wEntry(n); const cur=e?{kg:e.kg,bf:e.bf}:{kg:null,bf:null};
  if("kg" in patch) cur.kg=(patch.kg===""||patch.kg==null)?null:+patch.kg;
  if("bf" in patch) cur.bf=(patch.bf===""||patch.bf==null)?null:+patch.bf;
  if(cur.kg==null&&cur.bf==null) delete S.weights[n];
  else S.weights[n]={kg:cur.kg,bf:cur.bf};
  pushWeight(n, cur.kg==null?null:cur.kg, cur.bf);
  save();renderProgress();
}
function setWeight(n,v){setWeightEntry(n,{kg:v});}
function setBodyFat(n,v){setWeightEntry(n,{bf:v});}
// Composición corporal derivada para una semana con peso y % grasa.
function composition(n){const kg=wkg(n),bf=wbf(n);if(kg==null||bf==null)return null;const fat=kg*bf/100;return{kg,bf,fat,lean:kg-fat};}
// Última semana (mayor índice) con datos de peso.
function lastWeighedWeek(){const ks=Object.keys(WEIGHT_RANGES).map(Number).filter(n=>wkg(n)!=null);return ks.length?Math.max(...ks):null;}
function weightChart(){
  const pts=Object.keys(WEIGHT_RANGES).map(n=>({x:+n,y:wkg(n)})).filter(p=>p.y!=null);
  if(pts.length<1)return `<div class="chart muted small center">Ingresa tu peso semanal para ver el gráfico de evolución.</div>`;
  const W=520,H=160,pad=28;const span=Math.max(1,PLAN_DURATION_WEEKS-1);const xs=p=>pad+(p.x-1)/span*(W-pad*2);
  const allY=pts.map(p=>p.y).concat([74,82]);const minY=Math.min(...allY)-0.5,maxY=Math.max(...allY)+0.5;
  const ys=y=>H-pad-(y-minY)/(maxY-minY)*(H-pad*2);
  const line=pts.map((p,i)=>(i?"L":"M")+xs(p).toFixed(1)+" "+ys(p.y).toFixed(1)).join(" ");
  const dots=pts.map(p=>`<circle cx="${xs(p).toFixed(1)}" cy="${ys(p.y).toFixed(1)}" r="3.5" fill="var(--accent)"/>`).join("");
  // Overlay de % grasa corporal (eje propio, en terracota) si hay datos.
  const bfpts=Object.keys(WEIGHT_RANGES).map(n=>({x:+n,y:wbf(n)})).filter(p=>p.y!=null);
  let bfLayer="";
  if(bfpts.length>=1){
    const bfAll=bfpts.map(p=>p.y);const bMin=Math.min(...bfAll)-1,bMax=Math.max(...bfAll)+1;
    const bys=y=>H-pad-(y-bMin)/((bMax-bMin)||1)*(H-pad*2);
    const bline=bfpts.map((p,i)=>(i?"L":"M")+xs(p).toFixed(1)+" "+bys(p.y).toFixed(1)).join(" ");
    const bdots=bfpts.map(p=>`<circle cx="${xs(p).toFixed(1)}" cy="${bys(p.y).toFixed(1)}" r="3" fill="var(--terra-400)"/>`).join("");
    bfLayer=`<path d="${bline}" fill="none" stroke="var(--terra-400)" stroke-width="1.6" stroke-dasharray="2 2"/>${bdots}
      <text x="${pad}" y="12" fill="var(--terra-300)" font-size="10">% grasa</text>`;
  }
  return `<div class="chart"><svg viewBox="0 0 ${W} ${H}" width="100%">
    <line x1="${pad}" y1="${ys(82)}" x2="${W-pad}" y2="${ys(82)}" stroke="var(--line)" stroke-dasharray="3 3"/>
    <line x1="${pad}" y1="${ys(74.5)}" x2="${W-pad}" y2="${ys(74.5)}" stroke="var(--good)" stroke-dasharray="3 3"/>
    <text x="${W-pad}" y="${ys(74.5)-4}" fill="var(--good)" font-size="10" text-anchor="end">meta ~74.5</text>
    <path d="${line}" fill="none" stroke="var(--accent)" stroke-width="2"/>${dots}
    ${bfLayer}
  </svg></div>`;
}

        cycleNumber:prefs.planCycleNumber,
      });
      if(version)await backfillDayVersions();

    }

async function compressProgressPhoto(file){
  const url=URL.createObjectURL(file);
  try{
    const image=await new Promise((resolve,reject)=>{const img=new Image();img.onload=()=>resolve(img);img.onerror=reject;img.src=url;});
    const maxSide=1600,scale=Math.min(1,maxSide/Math.max(image.naturalWidth,image.naturalHeight));
    const canvas=document.createElement("canvas");
    canvas.width=Math.max(1,Math.round(image.naturalWidth*scale));
    canvas.height=Math.max(1,Math.round(image.naturalHeight*scale));
    canvas.getContext("2d").drawImage(image,0,0,canvas.width,canvas.height);
    return await new Promise((resolve,reject)=>canvas.toBlob(blob=>blob?resolve(blob):reject(new Error("No se pudo procesar la foto.")),"image/jpeg",.84));
  }finally{URL.revokeObjectURL(url);}
}

}

async function pullPlanVersions(){
  PLAN_VERSIONS=[];
  if(!supa||!uid())return false;
  try{
    const result=await supa.from("plan_versions").select("id,user_id,cycle_number,version_number,version_key,source,status,valid_from,valid_to,reason,prompt,model,snapshot_hash,snapshot,activated_at,superseded_at,created_at,updated_at").eq("user_id",uid()).order("cycle_number",{ascending:false}).order("version_number",{ascending:false});
    if(result.error)throw result.error;
    PLAN_VERSIONS=Array.isArray(result.data)?result.data:[];
    PLAN_VERSIONS_LOADED=true;
    PLAN_VERSIONS_ERROR=null;
    return true;
  }catch(e){
    PLAN_VERSIONS=[];
    PLAN_VERSIONS_LOADED=false;
    PLAN_VERSIONS_ERROR=(e&&e.message)||String(e);
    return false;
  }
}

function planVersionVersionNumber(cycleNo){
  return PLAN_VERSIONS.reduce((max,row)=>{
    if(Number(row.cycle_number)===Number(cycleNo))return Math.max(max,Number(row.version_number)||0);
    return max;
  },0)+1;
}

function planVersionActiveForCycle(cycleNo){
  return PLAN_VERSIONS.find(row=>Number(row.cycle_number)===Number(cycleNo)&&row.status==="active")||null;
}

function planVersionSnapshotMatches(row,digest){
  return !!row&&String(row.snapshot_hash||"")===String(digest||"");
}

function resolvePlanVersionIdForDate(ds){
  const row=planVersionForDate(ds);
  return row&&row.id?row.id:null;
}

async function ensurePlanVersion(meta){
  if(!supa||!uid())return null;
  if(!PLAN_VERSIONS_LOADED)await pullPlanVersions();
  const prefs=migrateProfilePrefs((meta&&meta.prefs)||(meta&&meta.profilePrefs)||(profile&&profile.prefs)||{});
  const cycleNo=Math.max(1,Number.parseInt((meta&&meta.cycleNumber)!=null?meta.cycleNumber:prefs.planCycleNumber,10)||cycleNumber());
  const validFrom=validYmd(meta&&meta.validFrom)?meta.validFrom:(validYmd(prefs.planStartDate)?prefs.planStartDate:todayStr());
  const validTo=validYmd(meta&&meta.validTo)?meta.validTo:(validYmd(prefs.planEndDate)?prefs.planEndDate:null);
  const status=(meta&&meta.status)||"active";
  const current=planVersionForDate(validFrom)||planVersionActiveForCycle(cycleNo);
  const explicitTrainingPlan=!!(meta&&Object.prototype.hasOwnProperty.call(meta,"trainingPlan"));
  if(current&&current.status==="active"&&!explicitTrainingPlan&&current.snapshot&&current.snapshot.prefs
    &&stableJson(current.snapshot.prefs)===stableJson(planSnapshotFields(prefs))){
    return current;
  }
  const snapshot=planSnapshotDigest(prefs,meta||{});
  if(planVersionSnapshotMatches(current,snapshot.digest)&&current.status==="active"){
    return current;
  }
  const now=new Date().toISOString();
  const versionKey=`${cycleNo}:${validFrom}:${snapshot.digest}`;
  const nextVersionNumber=planVersionVersionNumber(cycleNo);
  if(current&&current.status==="active"&&current.version_key!==versionKey){
    try{
      const sup=await supa.from("plan_versions").update({
        status:"superseded",
        valid_to:validYmd(current.valid_from)&&validFrom>current.valid_from?addDays(validFrom,-1):validFrom,
        superseded_at:now,
        updated_at:now,
      }).eq("id",current.id).eq("user_id",uid()).eq("status","active");
      if(sup.error)throw sup.error;
    }catch(e){
      if(!String((e&&e.message)||e).match(/plan_versions|relation|column|constraint/i))console.warn("No se pudo cerrar la versión anterior del plan.",e);
    }
  }
  try{
    const row={
      user_id:uid(),
      cycle_number:cycleNo,
      version_number:nextVersionNumber,
      version_key:versionKey,
      source:(meta&&meta.source)||"manual",
      status,
      valid_from:validFrom,
      valid_to:validTo,
      reason:(meta&&meta.reason)||null,
      prompt:(meta&&meta.prompt)||null,
      model:(meta&&meta.model)||null,
      snapshot_hash:snapshot.digest,
      snapshot:snapshot.payload,
      activated_at:status==="active"?now:null,
      superseded_at:status==="superseded"?now:null,
      updated_at:now,
    };
    const result=await supa.from("plan_versions").upsert(row,{onConflict:"user_id,version_key"}).select("id,user_id,cycle_number,version_number,version_key,source,status,valid_from,valid_to,reason,prompt,model,snapshot_hash,snapshot,activated_at,superseded_at,created_at,updated_at").maybeSingle();
    if(result.error)throw result.error;
    await pullPlanVersions();
    return planVersionForDate(validFrom)||result.data||null;
  }catch(e){
    if(String((e&&e.message)||e).match(/plan_versions|relation|column|constraint/i)){
      PLAN_VERSIONS_ERROR=(e&&e.message)||String(e);
      console.warn("No se pudo registrar la versión del plan; se mantiene la compatibilidad local.",e);
      return null;
    }
    throw e;
  }
}

async function activateTrainingPlanDraft(versionId){
  if(!supa||!uid())throw new Error("Inicia sesión para activar el plan.");
  if(!PLAN_VERSIONS_LOADED)await pullPlanVersions();
  const draft=PLAN_VERSIONS.find(row=>String(row.id)===String(versionId)&&row.status==="draft");
  if(!draft||!draft.snapshot||!draft.snapshot.trainingPlan)throw new Error("El borrador ya no está disponible.");
  const validFrom=draft.valid_from;
  const currentActive=planVersionActiveForCycle(draft.cycle_number);
  const now=new Date().toISOString();
  try{
    if(currentActive&&String(currentActive.id)!==String(draft.id)){
      const closed=await supa.from("plan_versions").update({
        status:"superseded",
        valid_to:validYmd(currentActive.valid_from)&&validFrom>currentActive.valid_from?addDays(validFrom,-1):validFrom,
        superseded_at:now,
        updated_at:now,
      }).eq("id",currentActive.id).eq("user_id",uid()).eq("status","active");
      if(closed.error)throw closed.error;
    }
    const activated=await supa.from("plan_versions").update({
      status:"active",
      activated_at:now,
      superseded_at:null,
      updated_at:now,
    }).eq("id",draft.id).eq("user_id",uid()).eq("status","draft").select("id").single();
    if(activated.error)throw activated.error;
  }catch(error){
    if(currentActive){
      await supa.from("plan_versions").update({
        status:"active",
        valid_to:currentActive.valid_to||END,
        superseded_at:null,
        updated_at:new Date().toISOString(),
      }).eq("id",currentActive.id).eq("user_id",uid()).eq("status","superseded");
    }
    throw new Error("No se pudo activar el plan sin reemplazar la versión vigente.");
  }
  await pullPlanVersions();
  const active=PLAN_VERSIONS.find(row=>String(row.id)===String(draft.id))||draft;
  const updates=[];
  Object.keys(S.days||{}).filter(ds=>ds>=validFrom&&ds<=END).forEach(ds=>{
    const state=dayState(ds);
    if(workoutHasRecordedActivity(state))return;
    delete state.workoutOverride;
    state.planVersionId=active.id;
    updates.push(pushDay(ds));
  });
  save();
  if(updates.length)await Promise.all(updates);
  return active;
}

async function backfillDayVersions(){
  if(!supa||!uid()||!PLAN_VERSIONS_LOADED)return false;
  try{
    const result=await supa.from("day_log").select("log_date,plan_version_id").eq("user_id",uid()).gte("log_date",START).lte("log_date",END);
    if(result.error)throw result.error;
    const rows=Array.isArray(result.data)?result.data:[];
    const updates=rows.filter(row=>!row.plan_version_id).map(row=>{
      const planVersionId=resolvePlanVersionIdForDate(row.log_date);
      if(!planVersionId)return null;
      return supa.from("day_log").update({plan_version_id:planVersionId,updated_at:new Date().toISOString()}).eq("user_id",uid()).eq("log_date",row.log_date);
    }).filter(Boolean);
    if(updates.length)await Promise.all(updates);
    return true;
  }catch(e){
    if(!String((e&&e.message)||e).match(/plan_version_id|plan_versions|relation|column/i))console.warn("No se pudo reconciliar la versión del plan en el historial diario.",e);
    return false;
  }
}

async function pushDay(ds){

  const state={...(S.days[ds]||{})};
  const planVersionId=state.planVersionId||resolvePlanVersionIdForDate(ds);
  if(planVersionId)state.planVersionId=planVersionId;

    }
  }catch(e){}
}
// Baja el estado de un día desde Supabase (última versión sincronizada).
async function pullDay(ds){
  if(!supa||!ds||!uid())return false;
  try{
    let r=await supa.from("day_log").select("state,plan_version_id").eq("user_id",uid()).eq("log_date",ds).maybeSingle();
    if(r.error&&String((r.error&&r.error.message)||r.error).match(/plan_version_id|column/i))r=await supa.from("day_log").select("state").eq("user_id",uid()).eq("log_date",ds).maybeSingle();
    if(!r.error&&r.data&&r.data.state&&typeof r.data.state==="object"){
      const state={...r.data.state};
      const planVersionId=r.data.plan_version_id||state.planVersionId||resolvePlanVersionIdForDate(ds)||null;
      if(planVersionId&&!state.planVersionId)state.planVersionId=planVersionId;
      S.days[ds]=state;save();
      if(!r.data.plan_version_id&&planVersionId)backfillDayVersions();
      return true;
    }
  }catch(e){}
  return false;
}

async function pullAllDays(){
  if(!supa||!uid())return;
  try{
    let r=await supa.from("day_log").select("log_date,state,plan_version_id").eq("user_id",uid()).gte("log_date",START).lte("log_date",END);
    if(r.error&&String((r.error&&r.error.message)||r.error).match(/plan_version_id|column/i))r=await supa.from("day_log").select("log_date,state").eq("user_id",uid()).gte("log_date",START).lte("log_date",END);

          if(planVersionId&&!state.planVersionId)state.planVersionId=planVersionId;
          S.days[row.log_date]=state;
        }
      });
      save();
      await backfillDayVersions();
    }
  }catch(e){}
}

async function prepareAdminTestUser(enterAfter){
  const email=$("#adminTestEmail").value.trim().toLowerCase();
  const password=$("#adminTestPwd").value;
  const confirmPassword=$("#adminTestPwdConfirm").value;
  const out=$("#adminTestOut");
  if(!email||!email.includes("@")){out.textContent="Escribe un correo válido.";return;}
  if(password.length<8){out.textContent="Usa una contraseña de al menos 8 caracteres.";return;}
  if(password!==confirmPassword){out.textContent="Las contraseñas no coinciden.";return;}
  if(!confirm(`¿Reiniciar ${email} como usuario nuevo? Se borrarán todos sus datos de prueba.`))return;
  const buttons=[$("#adminTestPrepareBtn"),$("#adminTestEnterBtn")].filter(Boolean);
  buttons.forEach(button=>button.disabled=true);
  out.textContent="Preparando cuenta…";
  try{
    const result=await adminApi("prepareTestUser",{email,password});
    if(!enterAfter){
      out.innerHTML=`<b>Cuenta ${result.created?"creada":"reiniciada"}.</b><br>Ya puede entrar con el correo y contraseña indicados y comenzará desde onboarding.`;
      buttons.forEach(button=>button.disabled=false);
      return;
    }
    closeModal();
    await signOutUser();
    const signed=await signIn(email,password);
    if(signed.error)throw signed.error;
    const sessionResult=await supa.auth.getSession();
    session=(sessionResult.data&&sessionResult.data.session)||null;
    if(!session)throw new Error("La cuenta se preparó, pero no se pudo iniciar sesión automáticamente.");
    await onAuth();
    toast("Usuario de prueba listo");
  }catch(e){
    if(enterAfter)toast(e.message);
    else if(out)out.textContent="⚠️ "+e.message;
    buttons.forEach(button=>button.disabled=false);
  }
}

function exerciseTextList(value){

function validateExerciseRecord(exercise){
  const issues=[];
  const requiredText=["slug","name","discipline","level","movement_pattern","start_position","breathing","regression","progression","media_key","static_key","source_name","license_name"];
  requiredText.forEach(key=>{if(!String(exercise&&exercise[key]||"").trim())issues.push(key);});
  ["steps","common_errors","safety_signals","contraindications"].forEach(key=>{if(!exerciseArray(exercise&&exercise[key]).length)issues.push(key);});
  if(exercise&&exercise.source_url&&/^https?:\/\//i.test(exercise.source_url))issues.push("media externa");
  return issues;
}

function filterExerciseCards(){
  const q=($("#exf_q")&&$("#exf_q").value||"").trim().toLowerCase();
  const discipline=($("#exf_discipline")&&$("#exf_discipline").value)||"";
  const place=($("#exf_place")&&$("#exf_place").value)||"";
  const level=($("#exf_level")&&$("#exf_level").value)||"";
  const equipment=($("#exf_equipment")&&$("#exf_equipment").value||"").trim().toLowerCase();
  const limitation=($("#exf_limitation")&&$("#exf_limitation").value||"").trim().toLowerCase();
  document.querySelectorAll("#exerciseAdminList .exercise-card").forEach(card=>{
    const ex=exerciseBySlug(card.dataset.exercise,true);
    if(!ex)return;
    const searchable=[ex.name,...exerciseArray(ex.aliases)].join(" ").toLowerCase();
    const equipmentText=exerciseArray(ex.equipment).join(" ").toLowerCase();
    const contraindications=exerciseArray(ex.contraindications).join(" ").toLowerCase();
    const visible=(!q||searchable.includes(q))
      &&(!discipline||ex.discipline===discipline)
      &&(!place||exerciseArray(ex.places).includes(place))
      &&(!level||ex.level===level)
      &&(!equipment||equipmentText.includes(equipment))
      &&(!limitation||!contraindications.includes(limitation));
    card.style.display=visible?"":"none";
  });
}

const CHECKIN_MAX_KCAL_ADJUST=200;  // límite absoluto por semana

function getWeeklyCheckins(){
  return Array.isArray(profile&&profile.prefs&&profile.prefs.weeklyCheckins)
    ?profile.prefs.weeklyCheckins:[];
}

// Devuelve {key, num, start, end} si hay check-in pendiente para la semana anterior, o null.
function weeklyCheckinDue(){
  if(!profile||!session||!isActive())return null;
  const prefs=migrateProfilePrefs((profile&&profile.prefs)||{});
  const calendar=planCalendarForPrefs(prefs);
  const today=todayStr();
  const currentWeek=calendar.weeks.find(w=>today>=w.start&&today<=w.end);
  if(!currentWeek||!currentWeek.num||currentWeek.num<2)return null;
  const dueNum=currentWeek.num-1;
  const dueWeek=calendar.weeks.find(w=>w.num===dueNum);
  if(!dueWeek)return null;
  const key=cycleNumber()+"-w"+dueNum;
  if(getWeeklyCheckins().find(c=>c.wk===key))return null;
  return{key,num:dueNum,start:dueWeek.start,end:dueWeek.end};
}

function weeklyCheckinBanner(){
  const due=weeklyCheckinDue();if(!due)return"";
  return`<div class="ci-banner">

    <div style="font-size:15px;font-weight:600;font-family:var(--font-display)">${prettyDate(due.start).split(",")[0]} – ${prettyDate(due.end).split(",")[0]}</div>

    </div>

// Calcula sesiones planificadas/realizadas en la semana y peso previo.
function weeklyCheckinStats(weekStart,weekEnd,weekNum){
  const days=[];let d=weekStart;
  while(d<=weekEnd&&d<=todayStr()){days.push(d);d=addDays(d,1);}
  let planned=0,done=0;
  days.forEach(ds=>{
    const wid=plannedWorkoutId(ds);
    if(wid&&wid!=="descanso")planned++;
    const st=S.days[ds]||{};
    if(workoutHasRecordedActivity(st)||st.workoutDone)done++;
  });
  const prevWeekNum=weekNum>1?weekNum-1:null;
  return{
    sessionsPlanned:planned,sessionsDone:done,
    prevWeight:prevWeekNum?wkg(prevWeekNum):null,
    currentWeight:wkg(weekNum),
  };
}

// Motor determinista: analiza las respuestas y propone un ajuste dentro de límites documentados.
// Límites: ±200 kcal/día máximo por semana · mínimo absoluto 1200 kcal/día.
// Señal de alerta (dolor) → bloquea recomendaciones de entrenamiento.
function analyzeCheckinAnswers(answers,prefs){
  const details=[];
  let calorieAdjust=0,intensityAdj=null,safetyFlag=false;
  const goal=prefs.goal||"deficit";
  const kcal=+prefs.calorieTarget||2000;

  // 1. Señales de alerta de seguridad
  if(answers.injuries&&answers.injuries.trim()){
    safetyFlag=true;
    details.push("Mencionas dolor o molestias: consulta con un profesional antes de ajustar el entrenamiento.");
  }

  // 2. Análisis de peso (si hay datos de semana anterior y actual)
  const w=answers.weight,pw=answers.prevWeight;
  if(w&&pw){
    const delta=w-pw;
    if(goal==="surplus"){
      if(delta<0.15){calorieAdjust+=100;details.push("Ganancia de peso menor a lo esperado: añadir calorías.");}
      else if(delta>0.6){calorieAdjust-=100;details.push("Ganancia rápida: reducir un poco para cuidar la composición.");}
    }else if(goal==="maintain"){
      if(delta>0.4){calorieAdjust-=100;details.push("Peso subiendo en mantenimiento: ajustar calorías.");}
      else if(delta<-0.4){calorieAdjust+=100;details.push("Peso bajando más de lo esperado: añadir calorías.");}
    }else{// deficit
      if(delta>0.3){calorieAdjust-=100;details.push("El peso subió esta semana: ajustar calorías.");}
      else if(delta<-0.8){calorieAdjust+=100;details.push("Pérdida muy rápida: añadir calorías para proteger músculo.");}
    }
  }

  // 3. Hambre y energía
  if(answers.hunger>=4&&answers.energy<=2){
    if(calorieAdjust===0){calorieAdjust+=100;details.push("Hambre alta y energía baja: añadir calorías.");}
    else details.push("Hambre alta y energía baja: revisa la distribución de comidas.");
  }else if(answers.hunger>=4&&calorieAdjust<=0){
    calorieAdjust+=Math.min(100,Math.abs(calorieAdjust)+50);
    details.push("Sensación de hambre elevada durante la semana.");
  }else if(answers.energy<=2&&answers.sleep<=2){
    details.push("Energía y sueño bajos: prioriza el descanso y revisa la distribución de macros.");
  }

  // 4. Adherencia nutricional baja → no cambiar calorías, pedir consistencia
  if((answers.nutrition||3)<=2&&calorieAdjust===0){
    details.push("Adherencia al plan baja: la prioridad de la próxima semana es la consistencia.");
  }

  // 5. Recuperación y dificultad de entrenamiento (solo sin señal de alerta)
  if(!safetyFlag){
    if((answers.difficulty||3)>=5||(answers.soreness||3)<=1){
      intensityAdj="reduce";
      details.push("Alta fatiga o recuperación lenta: reduce la intensidad o añade un descanso activo.");
    }else if((answers.difficulty||3)<=2&&(answers.soreness||3)>=4){
      intensityAdj="increase";
      details.push("Carga percibida baja y buena recuperación: puedes subir el desafío progresivamente.");
    }
  }

  // 6. Aplicar límites de seguridad documentados
  calorieAdjust=Math.max(-CHECKIN_MAX_KCAL_ADJUST,Math.min(CHECKIN_MAX_KCAL_ADJUST,calorieAdjust));
  if(kcal+calorieAdjust<CHECKIN_MIN_KCAL)calorieAdjust=CHECKIN_MIN_KCAL-kcal;

  const keep=calorieAdjust===0&&!intensityAdj&&!safetyFlag;
  const reason=details.length?details.join(" "):(keep?"Tu progreso esta semana está dentro de lo esperado.":"Ajuste sugerido según tu seguimiento.");
  return{keep,calorieAdjust,intensityAdj,reason,safetyFlag,details};
}

// Lee el formulario, corre el análisis y muestra la propuesta en el mismo modal.
function submitWeeklyCheckin(){
  const due=window._ciDue;if(!due)return;
  const prefs=migrateProfilePrefs((profile&&profile.prefs)||{});
  const stats=weeklyCheckinStats(due.start,due.end,due.num);
  const answers={
    weight:+$("#ci_kg").value||null,
    bodyFat:+$("#ci_bf").value||null,
    hunger:readCiScale("hunger"),
    energy:readCiScale("energy"),
    sleep:readCiScale("sleep"),
    stress:readCiScale("stress"),
    soreness:readCiScale("soreness"),
    difficulty:readCiScale("difficulty"),
    nutrition:readCiScale("nutrition"),
    sessionsDone:+$("#ci_done").value||0,
    sessionsPlanned:stats.sessionsPlanned,
    injuries:($("#ci_injuries").value||"").trim(),
    prevWeight:stats.prevWeight,
  };
  const proposal=analyzeCheckinAnswers(answers,prefs);
  // Calcular nuevos macros: proteína fija, carbs y grasas escalan proporcionalmente.
  const kcal=+prefs.calorieTarget||2000;
  const newKcal=kcal+proposal.calorieAdjust;
  const protKcal=(+prefs.proteinTarget||0)*4;
  const oldRem=Math.max(0,kcal-protKcal);
  const newRem=Math.max(0,newKcal-protKcal);
  const ratio=oldRem>0?newRem/oldRem:1;
  const newCarb=Math.round((+prefs.carbTarget||0)*ratio);
  const newFat=Math.round((+prefs.fatTarget||0)*ratio);
  const prot=+prefs.proteinTarget||0;
  window._ciData={due,answers,proposal,newKcal,newCarb,newFat,prot};

  const ds=n=>n>0?"+"+n:""+n;
  const safeNote=proposal.safetyFlag
    ?`<div class="alert" style="margin-top:10px">⚠️ Tienes una señal de alerta. Consulta con un profesional antes de aumentar la intensidad.</div>`:"";
  const keepBlock=proposal.keep
    ?`<div class="ai-box" style="margin-top:10px">✓ Tu plan está bien calibrado. Sigue igual la próxima semana.</div>`:"";
  const calorieBlock=proposal.calorieAdjust!==0
    ?`<div class="ci-delta">
        <div class="ci-dlab">Calorías diarias</div>
        <div class="ci-drow"><span>${kcal} kcal → <b>${newKcal} kcal</b></span>
          <span class="${proposal.calorieAdjust>0?"ci-dpos":"ci-dneg"}">${ds(proposal.calorieAdjust)} kcal/día</span></div>
        <div class="ci-drow muted small"><span>Prot ${prot} g (sin cambio) · Carb ${Math.round(+prefs.carbTarget||0)} → ${newCarb} g · Grasa ${Math.round(+prefs.fatTarget||0)} → ${newFat} g</span></div>
      </div>`:"";
  const intensityNote=proposal.intensityAdj
    ?`<div class="ai-box" style="margin-top:10px;border-color:${proposal.intensityAdj==="reduce"?"var(--warn)":"var(--border-acc)"}">${proposal.intensityAdj==="reduce"
      ?"Recomendación: esta semana prioriza el descanso y reduce la carga. Puedes usar las opciones de adaptación en Entreno."
      :"Recomendación: tu cuerpo responde bien. Añade carga progresiva en tus series principales."}</div>`:"";

  const el=document.querySelector(".sheet");
  if(el)el.innerHTML=`<div class="closebar"><button onclick="closeModal()">✕</button></div>
    <h3>Ajuste · Semana ${due.num+1}</h3>
    <p class="muted small">${esc(proposal.reason)}</p>
    ${safeNote}${keepBlock}${calorieBlock}${intensityNote}
    <div class="muted small" style="margin-top:12px">Ajuste máximo: ±${CHECKIN_MAX_KCAL_ADJUST} kcal/día. Aplica desde mañana y no modifica días ya registrados.</div>
    <div class="row" style="gap:8px;margin-top:16px;flex-wrap:wrap">
      ${!proposal.keep?`<button class="btn btn-accent" style="flex:1" onclick="applyWeeklyCheckinProposal('${due.key}')">Aplicar ajuste</button>`:""}
      <button class="btn${proposal.keep?" btn-accent":""}" style="${proposal.keep?"flex:1":""}" onclick="declineWeeklyCheckinProposal('${due.key}')">${proposal.keep?"Entendido":"Mantener el plan actual"}</button>
    </div>`;
}

// Aplica el ajuste de macros al perfil y guarda el check-in.
async function applyWeeklyCheckinProposal(weekKey){
  const d=window._ciData;if(!d)return;
  const prefs=migrateProfilePrefs({...((profile&&profile.prefs)||{})});
  if(d.proposal.calorieAdjust!==0){
    prefs.calorieTarget=d.newKcal;
    prefs.carbTarget=d.newCarb;
    prefs.fatTarget=d.newFat;
  }
  const checkin={wk:weekKey,num:d.due.num,start:d.due.start,end:d.due.end,
    at:new Date().toISOString(),answers:d.answers,proposal:d.proposal,accepted:true,skipped:false};
  if(!Array.isArray(prefs.weeklyCheckins))prefs.weeklyCheckins=[];
  prefs.weeklyCheckins.push(checkin);
  window._ciData=null;
  const result=await saveProfilePrefs(prefs,{source:"checkin",reason:"check-in semanal "+weekKey});
  closeModal();
  if(result&&result.error){toast("No se pudo guardar el ajuste");return;}
  render();toast("Ajuste aplicado para la próxima semana");
}

// Guarda el check-in sin aplicar cambios de macros.
async function declineWeeklyCheckinProposal(weekKey){
  const d=window._ciData;
  const prefs=migrateProfilePrefs({...((profile&&profile.prefs)||{})});
  const checkin={wk:weekKey,num:d?d.due.num:0,start:d?d.due.start:"",end:d?d.due.end:"",
    at:new Date().toISOString(),answers:d?d.answers:{},proposal:d?d.proposal:{},accepted:false,skipped:false};
  if(!Array.isArray(prefs.weeklyCheckins))prefs.weeklyCheckins=[];
  prefs.weeklyCheckins.push(checkin);
  window._ciData=null;
  await saveProfilePrefs(prefs,{source:"checkin",reason:"check-in mantenido "+weekKey});
  closeModal();render();toast("Plan sin cambios para la próxima semana");
}

// Registra el check-in como omitido (no vuelve a aparecer esta semana).
async function skipWeeklyCheckin(weekKey){
  const prefs=migrateProfilePrefs({...((profile&&profile.prefs)||{})});
  if(!Array.isArray(prefs.weeklyCheckins))prefs.weeklyCheckins=[];
  if(!prefs.weeklyCheckins.find(c=>c.wk===weekKey)){
    const due=weeklyCheckinDue()||{num:0,start:"",end:""};
    prefs.weeklyCheckins.push({wk:weekKey,num:due.num,start:due.start,end:due.end,
      at:new Date().toISOString(),answers:{},proposal:{},accepted:false,skipped:true});
  }
  await saveProfilePrefs(prefs,{source:"checkin",reason:"check-in omitido "+weekKey});
  closeModal();render();toast("Check-in omitido para esta semana");
}

// Historial de check-ins completados para mostrar en Progreso.
function weeklyCheckinHistory(){
  const checkins=getWeeklyCheckins().filter(c=>!c.skipped&&c.answers&&Object.keys(c.answers).length>0);
  if(!checkins.length)return"";
  const rows=[...checkins].reverse().slice(0,5).map(c=>{
    const adj=c.proposal&&c.proposal.calorieAdjust;
    const adjStr=adj?(adj>0?"+"+adj+" kcal":adj+" kcal"):"sin cambio";
    const status=c.accepted
      ?`<span class="badge b-PESAS">Aplicado · ${adjStr}</span>`
      :`<span class="badge b-Libre">Mantenido</span>`;
    return`<div class="wk-day" style="cursor:default">
      <div class="wk-left">
        <div class="d">Semana ${c.num}</div>
        <div class="m">${prettyDate(c.start).split(",")[0]} – ${prettyDate(c.end).split(",")[0]}</div>
      </div>
      ${status}
    </div>`;
  }).join("");
  return`<div class="section-h" style="margin:18px 4px 8px">Check-ins realizados</div>${rows}`;
}

/* ---------- util ---------- */
function esc(s){return String(s==null?"":s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));}

/* ---------- init ---------- */
function registerServiceWorker(){
  if(!CONFIG.pwa.registerServiceWorker||!("serviceWorker" in navigator))return;
  const host=location.hostname;
  const secure=location.protocol==="https:"||host==="localhost"||host==="127.0.0.1"||host==="::1";
  if(!secure)return;
  window.addEventListener("load",()=>{
    navigator.serviceWorker.register("./service-worker.js").catch(e=>console.warn("No se pudo registrar el service worker",e));
  });
}
// Carga la base de datos si hay conexión, para que los macros del día salgan de la DB.
function ensureDB(){if(supa&&!DB.loaded&&!DB.error)return dbLoad().then(render);return Promise.resolve();}
// Escucha cambios de sesión (login en otra pestaña, refresh de token, logout).
function setupAuthListener(){
  if(!supa||window._authSub)return;
  window._authSub=supa.auth.onAuthStateChange((event,sess)=>{
    session=sess||null;
    if(event==="PASSWORD_RECOVERY"){passwordRecovery=true;authReady=true;render();}
    else if(event==="SIGNED_OUT")clearSignedOutState();
    else if(event==="SIGNED_IN"){if(!profile||profile.id!==uid())onAuth();}
  });
}
async function boot(){
  // Producción: las credenciales de Supabase llegan de /api/config (Vercel).
  // Cárgalas ANTES de pintar, para no mostrar la pantalla de "conectar Supabase"
  // en vez del login. Si ya hay override local, no hace falta esperar.
  const hasLocalCreds=!!(S.settings&&S.settings.supaUrl&&S.settings.supaKey);
  if(!hasLocalCreds)await loadRemoteConfig();
  supaInit();
  setupAuthListener();
  await refreshAuth();         // resuelve sesión (authReady=true)
  if(session)await onAuth(); else render();
}
registerServiceWorker();
setInterval(workoutTimerTick,1000);
// Captura el evento de instalación (Android/Chrome) y oculta la sugerencia si ya se instaló.
window.addEventListener("beforeinstallprompt",e=>{e.preventDefault();deferredInstallPrompt=e;updateInstallPrompt();});
window.addEventListener("appinstalled",()=>{UI.installDismissed=true;uiSave();removeInstallPrompt();});
render();                      // splash mientras resolvemos la sesión
boot();                        // carga config (Vercel) → conecta Supabase → resuelve sesión
</script>
