<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="description" content="Tracker PWA del plan nutricional y de entrenamiento Fitbud.">
<meta name="theme-color" content="#0f172a">
<meta name="color-scheme" content="dark">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Fitbud">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="assets/icon-192.png" sizes="192x192">
<link rel="apple-touch-icon" href="assets/icon-192.png">
<title>Fitbud — Tracker plan 10 semanas</title>
<style>
  :root{
    --bg:#0f172a; --card:#1e293b; --card2:#273449; --line:#334155;
    --txt:#f1f5f9; --muted:#94a3b8; --accent:#38bdf8;
    --good:#22c55e; --warn:#f59e0b; --bad:#ef4444;
    --pesas:#3b82f6; --bajo:#14b8a6; --refeed:#f59e0b; --dietbreak:#a855f7; --libre:#64748b;
  }
  *{box-sizing:border-box}
  body{font-family:system-ui,-apple-system,"Segoe UI",sans-serif;background:var(--bg);color:var(--txt);margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  #app{max-width:560px;margin:0 auto;padding:12px 12px 90px}
  h1,h2,h3{margin:0}
  button{font-family:inherit;cursor:pointer;border:none;border-radius:10px;color:var(--txt)}
  .btn{background:var(--card2);padding:9px 12px;font-size:14px;border:1px solid var(--line)}
  .btn:active{transform:scale(.97)}
  .btn-accent{background:var(--accent);color:#06121c;font-weight:600;border:none}
  .btn-sm{padding:6px 9px;font-size:13px}
  .row{display:flex;gap:8px;align-items:center}
  .between{justify-content:space-between}
  .wrap{flex-wrap:wrap}
  .muted{color:var(--muted)}
  .small{font-size:12px}
  .center{text-align:center}

  /* Header */
  header{padding:6px 2px 12px}
  .daynav{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:10px}
  .daynav button{background:var(--card);border:1px solid var(--line);width:42px;height:42px;border-radius:12px;font-size:18px}
  .dtitle{flex:1;text-align:center}
  .dtitle .date{font-size:17px;font-weight:600;text-transform:capitalize}
  .badge{display:inline-block;padding:3px 10px;border-radius:999px;font-size:12px;font-weight:700;letter-spacing:.3px}
  .b-PESAS{background:var(--pesas)} .b-BAJO{background:var(--bajo)} .b-REFEED{background:var(--refeed);color:#3a2600}
  .b-DIETBREAK{background:var(--dietbreak)} .b-Libre{background:var(--libre)}
  .weeknote{font-size:12px;color:var(--muted);margin-top:2px}
  .alert{background:rgba(245,158,11,.12);border:1px solid var(--refeed);color:#fcd34d;border-radius:10px;padding:8px 10px;font-size:13px;margin-bottom:10px}
  .alert.violet{background:rgba(168,85,247,.12);border-color:var(--dietbreak);color:#e9d5ff}

  /* Macro dashboard */
  .dash{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px;margin-bottom:12px}
  .kcal-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px}
  .kcal-big{font-size:24px;font-weight:700}
  .bar{height:9px;background:#0b1220;border-radius:999px;overflow:hidden}
  .bar > i{display:block;height:100%;border-radius:999px;transition:width .25s}
  .fill-kcal{background:var(--accent)}
  .macros{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:10px}
  .macro{background:var(--card2);border-radius:10px;padding:8px}
  .macro .lab{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px}
  .macro .val{font-size:14px;font-weight:600;margin:2px 0 6px}
  .macro.prot{grid-column:1 / -1;border:1px solid var(--line)}
  .macro.prot .lab{font-size:12px}
  .macro.prot .val{font-size:17px}
  .fill-good{background:var(--good)} .fill-warn{background:var(--warn)} .fill-bad{background:var(--bad)}
  .fill-prot{background:#a78bfa} .fill-carb{background:#fbbf24} .fill-fat{background:#fb7185}

  /* Meal cards */
  .section-h{font-size:13px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin:14px 2px 8px}
  .meal{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:10px 12px;margin-bottom:8px}
  .meal.done{border-color:var(--good);background:linear-gradient(0deg,rgba(34,197,94,.08),rgba(34,197,94,.08)),var(--card)}
  .meal .slot{font-size:11px;color:var(--accent);text-transform:uppercase;letter-spacing:.5px;font-weight:700}
  .meal .name{font-size:15px;margin:2px 0 4px;line-height:1.25}
  .meal .nums{font-size:12px;color:var(--muted)}
  .meal .nums b{color:var(--txt);font-weight:600}
  .meal-actions{display:flex;gap:6px;margin-top:8px}
  .chk{width:30px;height:30px;border-radius:8px;border:2px solid var(--line);background:transparent;flex:0 0 auto;font-size:16px;display:flex;align-items:center;justify-content:center}
  .chk.on{background:var(--good);border-color:var(--good);color:#04210f}
  .meal-head{display:flex;gap:10px}
  .meal-head .chk{margin-top:2px}
  .meal-head > div{flex:1}

  .workout{background:linear-gradient(135deg,rgba(59,130,246,.12),rgba(168,85,247,.1)),var(--card);border:1px solid var(--line);border-radius:12px;padding:12px}
  .workout .detail{font-size:13px;color:var(--cbd);color:var(--muted);margin-top:4px;line-height:1.4}

  /* Tabs */
  .tabs{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--line);display:flex;z-index:50}
  .tabs button{flex:1;background:transparent;border:none;color:var(--muted);padding:10px 4px 14px;font-size:11px;display:flex;flex-direction:column;align-items:center;gap:3px;border-radius:0}
  .tabs button .ic{font-size:19px}
  .tabs button.active{color:var(--accent)}

  /* Week view */
  .wk-day{display:flex;justify-content:space-between;align-items:center;background:var(--card);border:1px solid var(--line);border-radius:10px;padding:10px 12px;margin-bottom:6px}
  .wk-day.today{border-color:var(--accent)}
  .wk-left .d{font-weight:600;text-transform:capitalize}
  .wk-left .m{font-size:12px;color:var(--muted);margin-top:2px}
  .dot{width:9px;height:9px;border-radius:999px;display:inline-block;margin-left:6px}

  /* Modal */
  .overlay{position:fixed;inset:0;background:rgba(2,6,16,.7);display:flex;align-items:flex-end;justify-content:center;z-index:100;padding:0}
  .sheet{background:var(--card);width:100%;max-width:560px;border-radius:18px 18px 0 0;border:1px solid var(--line);padding:16px;max-height:88vh;overflow:auto}
  .sheet h3{font-size:16px;margin-bottom:4px}
  .field{margin:10px 0}
  .field label{display:block;font-size:12px;color:var(--muted);margin-bottom:4px}
  .field input,.field select,.field textarea{width:100%;background:var(--card2);border:1px solid var(--line);border-radius:10px;color:var(--txt);padding:10px;font-size:15px;font-family:inherit}
  .grid4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px}
  .opt{width:100%;text-align:left;background:var(--card2);border:1px solid var(--line);padding:11px;margin-bottom:7px;font-size:14px;line-height:1.3}
  .opt .o-meta{font-size:12px;color:var(--muted);margin-top:3px}
  .closebar{display:flex;justify-content:flex-end;margin-bottom:4px}
  .closebar button{background:var(--card2);width:34px;height:34px;border-radius:999px;font-size:16px}
  .ai-box{background:rgba(56,189,248,.08);border:1px solid rgba(56,189,248,.4);border-radius:10px;padding:10px;font-size:14px;margin-top:8px;white-space:pre-wrap}
  .mic{background:var(--card2);border:1px solid var(--line);width:46px;height:46px;border-radius:12px;font-size:20px}
  .mic.live{background:var(--bad);border-color:var(--bad);animation:pulse 1s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
  .pill{display:inline-block;background:var(--card2);border:1px solid var(--line);border-radius:999px;padding:4px 10px;font-size:12px;margin:0 4px 4px 0}

  /* Weight */
  table.wt{width:100%;border-collapse:collapse;font-size:13px}
  table.wt th,table.wt td{padding:7px 6px;border-bottom:1px solid var(--line);text-align:center}
  table.wt th{color:var(--muted);font-weight:600;font-size:12px}
  table.wt input{width:70px;background:var(--card2);border:1px solid var(--line);border-radius:8px;color:var(--txt);padding:6px;text-align:center;font-size:14px}
  .chart{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:10px;margin:12px 0}

  .summary{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .scard{background:var(--card2);border-radius:10px;padding:10px;text-align:center}
  .scard .n{font-size:20px;font-weight:700}
  .scard .l{font-size:11px;color:var(--muted);margin-top:2px}
  .toast{position:fixed;bottom:78px;left:50%;transform:translateX(-50%);background:var(--card2);border:1px solid var(--line);padding:9px 14px;border-radius:999px;font-size:13px;z-index:200;opacity:0;transition:opacity .2s}
  .toast.show{opacity:1}
</style>

<script>
"use strict";
/* ============================================================
   Fitbud — tracker del plan de 10 semanas (un solo archivo)
   Fases 1-8: datos, vista HOY, navegación, reemplazos,
   macros en vivo, IA (Claude API), voz y extras.
   ============================================================ */

/* ---------- CONFIGURACIÓN RUNTIME (config.js + overrides locales) ---------- */
const DEFAULT_MODEL = "claude-haiku-4-5-20251001";
const RAW_CONFIG = window.FITBUD_CONFIG || {};
const CONFIG = {
  anthropic:{
    apiKey:String((RAW_CONFIG.anthropic&&RAW_CONFIG.anthropic.apiKey)||RAW_CONFIG.anthropicApiKey||"").trim(),
    model:String((RAW_CONFIG.anthropic&&RAW_CONFIG.anthropic.model)||RAW_CONFIG.anthropicModel||DEFAULT_MODEL).trim()||DEFAULT_MODEL,
  },
  supabase:{
    url:String((RAW_CONFIG.supabase&&RAW_CONFIG.supabase.url)||RAW_CONFIG.supabaseUrl||"").trim(),
    publishableKey:String((RAW_CONFIG.supabase&&(RAW_CONFIG.supabase.publishableKey||RAW_CONFIG.supabase.key))||RAW_CONFIG.supabasePublishableKey||RAW_CONFIG.supabaseKey||"").trim(),
  },
  pwa:{
    registerServiceWorker:!(RAW_CONFIG.pwa&&RAW_CONFIG.pwa.registerServiceWorker===false)&&RAW_CONFIG.registerServiceWorker!==false,
  },
};

// Config remota servida por /api/config (variables de entorno en Vercel).
// Mantiene las credenciales fuera de GitHub. La API key de Claude NO viaja
// aquí: vive solo en el servidor y se usa vía el proxy /api/claude.
let REMOTE={supabase:{url:"",publishableKey:""},anthropic:{model:"",proxy:false}};
async function loadRemoteConfig(){
  try{
    const r=await fetch("/api/config",{cache:"no-store"});
    if(r.ok){const j=await r.json();if(j&&typeof j==="object")REMOTE={supabase:j.supabase||{},anthropic:j.anthropic||{}};}
  }catch(e){/* sin funciones serverless (p.ej. GitHub Pages): se ignora */}
}
function effectiveSettings(){
  const local=S.settings||{};
  return {
    apiKey:local.apiKey||CONFIG.anthropic.apiKey,
    model:local.model||(REMOTE.anthropic&&REMOTE.anthropic.model)||CONFIG.anthropic.model||DEFAULT_MODEL,
    supaUrl:local.supaUrl||(REMOTE.supabase&&REMOTE.supabase.url)||CONFIG.supabase.url,
    supaKey:local.supaKey||(REMOTE.supabase&&REMOTE.supabase.publishableKey)||CONFIG.supabase.publishableKey,
  };
}
// IA disponible si hay key local/config (llamada directa) o el proxy de Vercel
function aiAvailable(){return !!effectiveSettings().apiKey||!!(REMOTE.anthropic&&REMOTE.anthropic.proxy);}
function settingSource(name){
  const local=S.settings||{};
  if(name==="apiKey")return local.apiKey?"local":(CONFIG.anthropic.apiKey?"config":((REMOTE.anthropic&&REMOTE.anthropic.proxy)?"vercel":""));
  if(name==="model")return local.model?"local":((REMOTE.anthropic&&REMOTE.anthropic.model)?"vercel":(CONFIG.anthropic.model?"config":""));
  if(name==="supabase")return (local.supaUrl||local.supaKey)?"local":((REMOTE.supabase&&(REMOTE.supabase.url||REMOTE.supabase.publishableKey))?"vercel":((CONFIG.supabase.url||CONFIG.supabase.publishableKey)?"config":""));
  return "";
}
function maskedSecret(v){return v?("•".repeat(Math.max(0,v.length-4))+v.slice(-4)):"";}

/* ---------- Fase 1: CAPA DE DATOS ---------- */

const REFEED_DATES = new Set(["2026-06-27","2026-07-11","2026-08-08","2026-08-22"]);

["A","B","C","D"].forEach(L=>{for(let wd=0;wd<7;wd++){ALL_LUNCHES.push({menu:L,wd,name:MENUS[L][wd],dishName:LUNCH_DISHES[L][wd]});}});

// metas y macros por slot según tipo de día
const DAY_TARGET = {

  BAJO:{kcal:1800,p:180,c:150,f:50},

const SLOTS = {
  PESAS:[
    {id:"desayuno",slot:"Desayuno",kcal:450,p:45,c:50,f:10},
    {id:"almuerzo",slot:"Almuerzo",kcal:650,p:45,c:75,f:22},

  ],
  BAJO:[
    {id:"desayuno",slot:"Desayuno",kcal:420,p:45,c:40,f:10},
    {id:"almuerzo",slot:"Almuerzo",kcal:580,p:45,c:55,f:18},
    {id:"batido",  slot:"Batido peri-entreno",kcal:280,p:50,c:30,f:6},
    {id:"cena",    slot:"Cena",kcal:420,p:40,c:25,f:16},

/* ---- helpers de fecha ---- */
function ymd(d){return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}
function parseYmd(s){const[y,m,d]=s.split("-").map(Number);return new Date(y,m-1,d);}
function addDays(s,n){const d=parseYmd(s);d.setDate(d.getDate()+n);return ymd(d);}
function todayStr(){return ymd(new Date());}
const DOW=["Domingo","Lunes","Martes","Miércoles","Jueves","Viernes","Sábado"];
const MON=["ene","feb","mar","abr","may","jun","jul","ago","sep","oct","nov","dic"];
function prettyDate(s){const d=parseYmd(s);return DOW[d.getDay()]+", "+d.getDate()+" "+MON[d.getMonth()];}

function weekOf(ds){for(const w of WEEKS){if(ds>=w.start&&ds<=w.end)return w;}return null;}
function dayType(ds){
  const w=weekOf(ds); const wd=parseYmd(ds).getDay();
  if(w&&w.dietBreak)return "DIETBREAK";
  if(REFEED_DATES.has(ds))return "REFEED";
  if([1,2,4,5].includes(wd))return "PESAS";
  return "BAJO";
}

// Construye el día completo (datos base del plan)
function buildDay(ds){
  const w=weekOf(ds); const wd=parseYmd(ds).getDay();
  const type=dayType(ds);
  const idx=Math.round((parseYmd(ds)-parseYmd(START))/86400000); // offset para rotación
  const slots=SLOTS[type].map(s=>({...s}));
  const lunchMenu = (w&&w.menu!=="Libre") ? w.menu : "A";
  const meals=slots.map(s=>{
    // kcal/p/c/f del slot son FALLBACK; mealValue() prioriza los macros de la DB vía dishName
    const m={id:s.id,slot:s.slot,kcal:s.kcal,p:s.p,c:s.c,f:s.f,name:"",dishName:null};
    if(s.id==="desayuno"){
      m.name = type==="REFEED" ? "Avena 80g + 1.5 scoop + plátano entero + miel 1 cda" : BREAKFASTS[idx%4];
      m.dishName = type==="REFEED" ? DISH_NAMES.refeedDesayuno : BREAKFAST_DISHES[idx%4];
    }else if(s.id==="almuerzo"){
      if(w&&w.menu==="Libre"){ m.name="Almuerzo libre (elige una opción del plan)"; m.dishName=null; }
      else {
        const dbLunch=dietLunchDish(lunchMenu,wd); // desde diet_dishes (DB) si está cargada
        if(dbLunch){ m.name=dbLunch.name; m.dishName=dbLunch.name; }
        else { m.name=MENUS[lunchMenu][wd]; m.dishName=LUNCH_DISHES[lunchMenu][wd]; }
      }
      if(type==="REFEED") m.name+=" — doble porción de arroz/pasta/tortillas";
      if(type==="DIETBREAK") m.name+=" (+50% carbo)";
      if(type==="BAJO") m.name+=" — carbo a la mitad, +verdura";
    }else if(s.id==="batido"){
      m.name = type==="PESAS" ? "2 scoops de proteína + plátano" : "2 scoops de proteína (solos)";
      m.dishName = type==="PESAS" ? DISH_NAMES.batidoPesas : DISH_NAMES.batidoBajo;
    }else if(s.id==="cena"){
      m.name = type==="REFEED" ? "Arroz/pasta 100g seco + tofu/queso + verduras" : DINNERS[idx%4];
      m.dishName = type==="REFEED" ? DISH_NAMES.refeedCena : DINNER_DISHES[idx%4];
    }else if(s.id==="snack"){
      m.name = type==="REFEED" ? "Pan 2 tajadas + mermelada + 1 scoop en agua" : "Snack: pan con palta / fruta + yogur";
      m.dishName = type==="REFEED" ? DISH_NAMES.refeedSnack : DISH_NAMES.dietbreakSnack;
    }else if(s.id==="snack_extra"){
      m.name = "Snack extra: fruta + yogur griego";
      m.dishName = DISH_NAMES.snackExtra;
    }
    return m;
  });
  return {ds,wd,type,week:w,target:DAY_TARGET[type],meals,workout:WORKOUTS[wd]};
}

/* ---------- ESTADO / PERSISTENCIA (localStorage) ---------- */
const KEY="fitbud_v1";
let S=load();
function load(){try{const o=JSON.parse(localStorage.getItem(KEY));return o&&typeof o==="object"?o:{};}catch(e){return{};}}
function save(){localStorage.setItem(KEY,JSON.stringify(S));}
if(!S.days)S.days={}; if(!S.weights)S.weights={}; if(!S.settings)S.settings={};
function dayState(ds){if(!S.days[ds])S.days[ds]={meals:{},extras:[],workoutDone:false};const d=S.days[ds];if(!d.meals)d.meals={};if(!d.extras)d.extras=[];return d;}
function mealState(ds,id){const d=dayState(ds);if(!d.meals[id])d.meals[id]={done:false};return d.meals[id];}
// valor efectivo de una comida (con override si existe)
function dishByName(name){return (DB.byName&&name)?DB.byName[name]:null;}
function dishById(id){return DB.dishes.find(x=>x.id===id)||null;}
// Almuerzo autoritativo desde la DB (diet_dishes): refleja reasignaciones/renombres
function dietLunchDish(menuCode,wd){
  if(!DB.loaded)return null;
  const dt=DB.diets.find(d=>d.code===menuCode); if(!dt)return null;
  const dd=DB.dietDishes.find(x=>x.diet_id===dt.id&&x.weekday===wd&&(x.slot==null||x.slot==="almuerzo"));
  return dd?dishById(dd.dish_id):null;
}
// Resuelve los macros de una comida del plan:
// 1) override manual con macros (editar valores / personalizada)
// 2) macros calculados desde la base de datos por nombre de plato
// 3) fallback a los valores del plan hardcodeados (DB no conectada)
function mealValue(base,ms){
  const o=ms&&ms.ovr;
  const name=o&&o.name!=null?o.name:base.name;
  if(o&&o.kcal!=null&&o.dishName==null){
    return{name,kcal:+o.kcal||0,p:+o.p||0,c:+o.c||0,f:+o.f||0,src:"custom"};
  }
  const dn=o&&o.dishName!=null?o.dishName:base.dishName;
  if(dn&&DB.loaded){const d=dishByName(dn);if(d){const m=dishMacros(d.id);return{name,kcal:m.kcal,p:m.p,c:m.c,f:m.f,src:"db"};}}
  return{name,kcal:base.kcal,p:base.p,c:base.c,f:base.f,src:"plan"};
}

// totales CONSUMIDOS (solo comidas marcadas como hechas)
function dayTotals(ds){
  const day=buildDay(ds); const st=dayState(ds);
  let t={kcal:0,p:0,c:0,f:0}, doneMeals=0, totMeals=day.meals.length+st.extras.length;
  day.meals.forEach(b=>{const ms=st.meals[b.id];if(ms&&ms.done){const v=mealValue(b,ms);t.kcal+=v.kcal;t.p+=v.p;t.c+=v.c;t.f+=v.f;doneMeals++;}});
  st.extras.forEach(e=>{if(e.done){t.kcal+=+e.kcal||0;t.p+=+e.p||0;t.c+=+e.c||0;t.f+=+e.f||0;doneMeals++;}});
  return {t,doneMeals,totMeals,target:day.target};
}

let current = clampDate(todayStr());

function clampDate(ds){if(ds<START)return START;if(ds>END)return END;return ds;}
function inRange(ds){return ds>=START&&ds<=END;}

/* ---------- Fase 5: color de proteína según ritmo ---------- */
function paceClass(consumed,target,isToday){
  const pct=target?consumed/target:0;
  if(pct>=1)return"fill-good";
  if(!isToday)return pct>=0.7?"fill-warn":"fill-bad";
  const now=new Date();const h=now.getHours()+now.getMinutes()/60;
  const expected=Math.min(1,Math.max(0,(h-7)/(21-7)));
  if(pct>=expected-0.1)return"fill-good";
  if(pct>=expected-0.3)return"fill-warn";
  return"fill-bad";
}
function pctW(v,t){return Math.min(100,t?Math.round(v/t*100):0);}
function dbStatusNote(){
  if(DB.loaded)return "✓ Macros calculados desde tu base de datos.";
  if(supa&&!DB.error)return "Cargando macros desde la base de datos…";
  if(supa&&DB.error)return "⚠️ No se pudo leer la base; mostrando valores del plan.";
  return "Mostrando valores del plan. Conecta la base de datos en Ajustes para macros por ingrediente.";
}

/* ---------- Fase 3: VISTA SEMANA ---------- */
function renderWeek(){

function modal(html){
  let o=$("#overlay");
  if(!o){o=document.createElement("div");o.id="overlay";o.className="overlay";o.addEventListener("click",e=>{if(e.target===o)closeModal();});document.body.appendChild(o);}

}
function closeModal(){const o=$("#overlay");if(o)o.remove();stopMic();}

function openReplace(ds,id){
  const day=buildDay(ds);const base=day.meals.find(m=>m.id===id);
  let options=[];
  if(id==="desayuno")options=BREAKFASTS.map((n,i)=>({name:n,dishName:BREAKFAST_DISHES[i]}));
  else if(id==="cena")options=DINNERS.map((n,i)=>({name:n,dishName:DINNER_DISHES[i]}));
  else if(id==="almuerzo")options=ALL_LUNCHES.map(l=>({name:l.name,dishName:l.dishName,tag:"Menú "+l.menu}));
  else options=[];
  const optsHtml=options.map((o,i)=>{
    const d=o.dishName?dishByName(o.dishName):null;const m=d?dishMacros(d.id):null;
    const meta=m?`${m.kcal} kcal · P ${m.p} · C ${m.c} · G ${m.f} g`:"macros del plan";
    return `<button class="opt" onclick="applyReplace('${ds}','${id}',${i})">${esc(o.name)}<div class="o-meta">${o.tag?o.tag+" · ":""}${meta}</div></button>`;
  }).join("");
  window._replaceOpts={ds,id,options};
  modal(`<h3>Reemplazar — ${base.slot}</h3>
    <p class="muted small">Elige otra opción del plan (sus macros se calculan desde la base de datos) o crea una personalizada.</p>
    ${optsHtml||'<p class="muted small">Sin opciones de plan para este slot.</p>'}
    <button class="btn btn-accent" style="width:100%;margin-top:6px" onclick="openEditor('meal','${ds}','${id}')">✎ Personalizada / editar valores</button>`);
}
function applyReplace(ds,id,i){const{options}=window._replaceOpts;const o=options[i];const ms=mealState(ds,id);ms.ovr={name:o.name,dishName:o.dishName||null};commitDay(ds);closeModal();renderDay();toast("Comida reemplazada");}

/* editor genérico: comida del plan (override) o extra */
function openEditor(kind,ds,id){
  ds=ds||current;
  let pre={name:"",kcal:"",p:"",c:"",f:""};
  let title="Agregar comida / snack";
  if(kind==="meal"){const day=buildDay(ds);const base=day.meals.find(m=>m.id===id);const ms=mealState(ds,id);const v=mealValue(base,ms);pre={name:v.name,kcal:v.kcal,p:v.p,c:v.c,f:v.f};title="Editar — "+base.slot;}
  window._editor={kind,ds,id,extraIdx:null};

const SYS_PROMPT="El usuario es vegetariano, no come huevo, toma proteína en polvo y busca alta proteína (~180 g/día) en déficit agresivo. Da estimaciones realistas de porciones reales, con kcal y macros.";
async function callClaude(userText,maxTokens){
  const cfg=effectiveSettings();
  // 1) Override local: si guardaste una API key en este navegador, llamada directa
  //    (útil para desarrollo local sin las funciones serverless).
  if(cfg.apiKey){
    const res=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"x-api-key":cfg.apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true","content-type":"application/json"},
      body:JSON.stringify({model:cfg.model||DEFAULT_MODEL,max_tokens:maxTokens||512,system:SYS_PROMPT,messages:[{role:"user",content:userText}]})
    });
    if(!res.ok){const e=await res.text();throw new Error("API "+res.status+": "+e.slice(0,200));}
    const data=await res.json();
    return (data.content&&data.content[0]&&data.content[0].text)||"";
  }
  // 2) Producción (Vercel): proxy /api/claude. La API key vive solo en el servidor.
  const res=await fetch("/api/claude",{
    method:"POST",headers:{"content-type":"application/json"},
    body:JSON.stringify({userText,system:SYS_PROMPT,maxTokens:maxTokens||512,model:cfg.model||DEFAULT_MODEL})
  });
  if(res.status===404)throw new Error("El proxy /api/claude no está disponible. Despliega en Vercel (con ANTHROPIC_API_KEY) o pon una API key local en Ajustes.");
  const data=await res.json().catch(()=>({}));
  if(!res.ok)throw new Error(data.error||("Error "+res.status));
  return data.text||"";
}
function parseJSON(txt){
  let t=txt.trim().replace(/^```(json)?/i,"").replace(/```$/,"").trim();
  const a=t.indexOf("{"),b=t.lastIndexOf("}");
  if(a>=0&&b>=0)t=t.slice(a,b+1);
  return JSON.parse(t);
}

function setWeight(n,v){if(v===""){delete S.weights[n];pushWeight(n,null);}else{S.weights[n]=+v;pushWeight(n,+v);}save();renderWeight();}
function weightChart(){
  const pts=Object.keys(WEIGHT_RANGES).map(n=>({x:+n,y:S.weights[n]})).filter(p=>p.y!=null);
  if(pts.length<1)return `<div class="chart muted small center">Ingresa tu peso semanal para ver el gráfico de evolución.</div>`;
  const W=520,H=160,pad=28;const xs=p=>pad+(p.x-1)/9*(W-pad*2);
  const allY=pts.map(p=>p.y).concat([74,82]);const minY=Math.min(...allY)-0.5,maxY=Math.max(...allY)+0.5;
  const ys=y=>H-pad-(y-minY)/(maxY-minY)*(H-pad*2);
  const line=pts.map((p,i)=>(i?"L":"M")+xs(p).toFixed(1)+" "+ys(p.y).toFixed(1)).join(" ");
  const dots=pts.map(p=>`<circle cx="${xs(p).toFixed(1)}" cy="${ys(p.y).toFixed(1)}" r="3.5" fill="var(--accent)"/>`).join("");
  return `<div class="chart"><svg viewBox="0 0 ${W} ${H}" width="100%">
    <line x1="${pad}" y1="${ys(82)}" x2="${W-pad}" y2="${ys(82)}" stroke="var(--line)" stroke-dasharray="3 3"/>
    <line x1="${pad}" y1="${ys(74.5)}" x2="${W-pad}" y2="${ys(74.5)}" stroke="var(--good)" stroke-dasharray="3 3"/>
    <text x="${W-pad}" y="${ys(74.5)-4}" fill="var(--good)" font-size="10" text-anchor="end">meta ~74.5</text>
    <path d="${line}" fill="none" stroke="var(--accent)" stroke-width="2"/>${dots}
  </svg></div>`;
}

/* ============================================================
   BASE DE DATOS DE ALIMENTOS (Supabase)
   ingredientes (por 100g) -> platos (recetas) -> dietas
   Los macros de cada plato se calculan sumando ingredientes.
   ============================================================ */
let supa=null;
let DB={ingredients:[],dishes:[],dishIng:[],diets:[],dietDishes:[],byName:null,loaded:false,error:null};
let foodTab="platos";

// Acepta URL completa, link del dashboard, "xxx.supabase.co" o solo el Project ID
function supaUrlFrom(v){
  v=(v||"").trim().replace(/\/+$/,"");
  if(!v)return"";
  const dash=v.match(/dashboard\/project\/([a-z0-9]+)/i);
  if(dash)return"https://"+dash[1]+".supabase.co";
  if(/^https?:\/\//i.test(v))return v;
  return"https://"+v.replace(/\.supabase\.co$/i,"")+".supabase.co";
}
function supaInit(){
  supa=null;
  const cfg=effectiveSettings();
  const url=supaUrlFrom(cfg.supaUrl);
  if(url&&cfg.supaKey&&window.supabase&&window.supabase.createClient){
    try{supa=window.supabase.createClient(url,cfg.supaKey);}catch(e){supa=null;}
  }
  return supa;
}
async function dbLoad(){
  if(!supa){DB.error="no-config";return;}
  try{
    const [a,b,c,d,e]=await Promise.all([
      supa.from("ingredients").select("*"),
      supa.from("dishes").select("*"),
      supa.from("dish_ingredients").select("*"),
      supa.from("diets").select("*"),
      supa.from("diet_dishes").select("*"),
    ]);
    for(const r of [a,b,c,d,e]) if(r.error) throw r.error;
    DB.ingredients=a.data||[];DB.dishes=b.data||[];DB.dishIng=c.data||[];DB.diets=d.data||[];DB.dietDishes=e.data||[];
    DB.byName={};DB.dishes.forEach(x=>{DB.byName[x.name]=x;});
    DB.ingredients.sort((x,y)=>(x.category||"").localeCompare(y.category||"")||x.name.localeCompare(y.name));
    DB.dishes.sort((x,y)=>(x.slot||"").localeCompare(y.slot||"")||x.name.localeCompare(y.name));
    DB.diets.sort((x,y)=>(x.code||"").localeCompare(y.code||""));
    DB.loaded=true;DB.error=null;
  }catch(e){DB.loaded=false;DB.error=(e&&e.message)||String(e);}
}

/* ---- Registro de consumo en la DB (tabla day_log) ---- */
// Sube el estado del día (comidas marcadas, extras, entreno) a Supabase.
async function pushDay(ds){
  if(!supa||!ds)return;
  try{ await supa.from("day_log").upsert({log_date:ds,state:S.days[ds]||{},updated_at:new Date().toISOString()},{onConflict:"log_date"}); }catch(e){}
}
// Baja el estado de un día desde Supabase (última versión sincronizada).
async function pullDay(ds){
  if(!supa||!ds)return false;
  try{
    const r=await supa.from("day_log").select("state").eq("log_date",ds).maybeSingle();
    if(!r.error&&r.data&&r.data.state&&typeof r.data.state==="object"){S.days[ds]=r.data.state;save();return true;}
  }catch(e){}
  return false;
}
// Guarda local + sube a la DB (usar tras cualquier cambio del día).
function commitDay(ds){save();pushDay(ds);}
// Trae el día desde la DB y re-renderiza si seguimos viéndolo.
function syncDay(ds){if(supa)pullDay(ds).then(ok=>{if(ok&&view==="day"&&current===ds)renderDay();});}

/* ---- Registro de peso en la DB (tabla weight_log) ---- */
async function pushWeight(week,kg){
  if(!supa)return;
  try{
    if(kg==null) await supa.from("weight_log").delete().eq("week",week);
    else await supa.from("weight_log").upsert({week:week,kg:kg,updated_at:new Date().toISOString()},{onConflict:"week"});
  }catch(e){}
}
async function pullWeights(){
  if(!supa)return false;
  try{
    const r=await supa.from("weight_log").select("week,kg");
    if(!r.error&&Array.isArray(r.data)){const w={};r.data.forEach(x=>{w[x.week]=Number(x.kg);});S.weights=w;save();return true;}
  }catch(e){}
  return false;
}
function syncWeights(){if(supa)pullWeights().then(ok=>{if(ok&&view==="weight")renderWeight();});}

function ingById(id){return DB.ingredients.find(x=>x.id===id);}
function macrosFromLines(lines){let t={kcal:0,p:0,c:0,f:0};lines.forEach(l=>{const i=ingById(+l.ingredient_id);if(!i||l.grams==null)return;const g=(+l.grams)/100;t.kcal+=i.kcal*g;t.p+=i.protein_g*g;t.c+=i.carbs_g*g;t.f+=i.fat_g*g;});return{kcal:Math.round(t.kcal),p:Math.round(t.p),c:Math.round(t.c),f:Math.round(t.f)};}
function dishMacros(dishId){return macrosFromLines(DB.dishIng.filter(x=>x.dish_id===dishId));}

  }
  if(!DB.loaded&&!DB.error){$("#app").innerHTML=`<header><h2>🥗 Alimentos</h2></header><div class="dash muted">Cargando base de datos…</div>`;dbLoad().then(render);return;}
  if(DB.error){$("#app").innerHTML=`<header><h2>🥗 Alimentos</h2></header><div class="dash"><div class="ai-box">⚠️ ${esc(DB.error)}</div><button class="btn" style="width:100%;margin-top:10px" onclick="DB.error=null;render();dbLoad().then(render)">Reintentar</button><button class="btn" style="width:100%;margin-top:8px" onclick="setView('settings')">Revisar conexión</button></div>`;return;}
  const subtabs=[["platos","Platos"],["ingredientes","Ingredientes"],["dietas","Dietas"]];
  const body=foodTab==="ingredientes"?foodsIngredients():foodTab==="dietas"?foodsDiets():foodsDishes();
  $("#app").innerHTML=`<header><h2>🥗 Alimentos <span class="muted small">· ${DB.dishes.length} platos · ${DB.ingredients.length} ingredientes</span></h2>
    <div class="row wrap" style="margin-top:10px">${subtabs.map(([v,l])=>`<button class="btn btn-sm ${foodTab===v?'btn-accent':''}" onclick="setFoodTab('${v}')">${l}</button>`).join("")}</div></header>
    ${body}`;
}
function setFoodTab(t){foodTab=t;render();window.scrollTo(0,0);}

function foodsDishes(){
  const bySlot={};DB.dishes.forEach(d=>{(bySlot[d.slot||"otros"]=bySlot[d.slot||"otros"]||[]).push(d);});
  const order=["desayuno","almuerzo","batido","cena","snack","otros"];
  let html=`<button class="btn btn-accent" style="width:100%;margin-bottom:10px" onclick="editDish(null)">＋ Nuevo plato</button>`;
  order.forEach(slot=>{if(!bySlot[slot])return;html+=`<div class="section-h">${slot}</div>`;
    bySlot[slot].forEach(d=>{const m=dishMacros(d.id);
      html+=`<div class="meal"><div class="meal-head"><div>
        <div class="name">${esc(d.name)}${d.menu?` <span class="pill">Menú ${d.menu}</span>`:""}</div>
        <div class="nums"><b>${m.kcal}</b> kcal · P <b>${m.p}</b> · C <b>${m.c}</b> · G <b>${m.f}</b> g</div>
      </div></div><div class="meal-actions"><button class="btn btn-sm" onclick="editDish(${d.id})">Ver / editar receta</button></div></div>`;
    });
  });
  return html;
}
function foodsIngredients(){
  const byCat={};DB.ingredients.forEach(i=>{(byCat[i.category||"Otros"]=byCat[i.category||"Otros"]||[]).push(i);});
  let html=`<button class="btn btn-accent" style="width:100%;margin-bottom:10px" onclick="editIngredient(null)">＋ Nuevo ingrediente</button>`;
  Object.keys(byCat).sort().forEach(cat=>{html+=`<div class="section-h">${esc(cat)}</div>`;
    byCat[cat].forEach(i=>{html+=`<div class="meal" onclick="editIngredient(${i.id})"><div class="meal-head"><div>
      <div class="name">${esc(i.name)}</div>
      <div class="nums muted">por 100 g — <b>${i.kcal}</b> kcal · P <b>${i.protein_g}</b> · C <b>${i.carbs_g}</b> · G <b>${i.fat_g}</b></div>
    </div></div></div>`;});
  });
  return html;
}
function foodsDiets(){
  const dayNames=["Dom","Lun","Mar","Mié","Jue","Vie","Sáb"];
  let html="";
  DB.diets.forEach(dt=>{
    const items=DB.dietDishes.filter(x=>x.diet_id===dt.id).sort((a,b)=>(((a.weekday+6)%7)-((b.weekday+6)%7)));
    let sum={kcal:0,p:0},n=0;
    const rows=items.map(it=>{const dish=DB.dishes.find(x=>x.id===it.dish_id);if(!dish)return"";const m=dishMacros(dish.id);sum.kcal+=m.kcal;sum.p+=m.p;n++;
      return `<div class="wk-day"><div class="wk-left"><div class="d">${dayNames[it.weekday]} <span class="muted small">${esc(it.slot||"")}</span></div><div class="m">${esc(dish.name)}</div></div><div class="center"><div style="font-weight:600">${m.kcal}</div><div class="muted small">P${m.p}</div></div></div>`;
    }).join("");
    html+=`<div class="section-h">${esc(dt.name)}</div><div class="muted small" style="margin:-4px 2px 8px">${esc(dt.description||"")}${n?` · almuerzo promedio ${Math.round(sum.kcal/n)} kcal / P ${Math.round(sum.p/n)} g`:""}</div>${rows}`;
  });
  return html||'<div class="muted small">Sin dietas.</div>';
}

/* ---- editor de ingrediente ---- */
function editIngredient(id){
  const it=id?ingById(id):{name:"",category:"",kcal:"",protein_g:"",carbs_g:"",fat_g:""};
  window._ing={id};
  modal(`<h3>${id?"Editar":"Nuevo"} ingrediente <span class="muted small">(valores por 100 g)</span></h3>
    <div class="field"><label>Nombre</label><input id="ig_name" value="${esc(it.name)}"></div>
    <div class="field"><label>Categoría</label><input id="ig_cat" value="${esc(it.category||"")}" placeholder="Proteína, Cereal, Verdura…"></div>
    <div class="grid4">
      <div class="field"><label>kcal</label><input id="ig_kcal" type="number" inputmode="decimal" value="${it.kcal}"></div>
      <div class="field"><label>Prot</label><input id="ig_p" type="number" inputmode="decimal" value="${it.protein_g}"></div>
      <div class="field"><label>Carb</label><input id="ig_c" type="number" inputmode="decimal" value="${it.carbs_g}"></div>
      <div class="field"><label>Grasa</label><input id="ig_f" type="number" inputmode="decimal" value="${it.fat_g}"></div>
    </div>
    <button class="btn btn-accent" style="width:100%;margin-top:8px" onclick="saveIngredient()">Guardar</button>
    ${id?`<button class="btn" style="width:100%;margin-top:8px" onclick="deleteIngredient(${id})">Eliminar</button>`:""}`);
}
async function saveIngredient(){
  const row={name:$("#ig_name").value.trim(),category:$("#ig_cat").value.trim()||null,kcal:+$("#ig_kcal").value||0,protein_g:+$("#ig_p").value||0,carbs_g:+$("#ig_c").value||0,fat_g:+$("#ig_f").value||0};
  if(!row.name){toast("Pon un nombre");return;}
  const id=window._ing.id;
  const res=id?await supa.from("ingredients").update(row).eq("id",id):await supa.from("ingredients").insert(row);
  if(res.error){toast("Error: "+res.error.message);return;}
  closeModal();await dbLoad();render();toast("Guardado");
}
async function deleteIngredient(id){
  if(!confirm("¿Eliminar ingrediente? No se puede si está usado en una receta."))return;
  const res=await supa.from("ingredients").delete().eq("id",id);
  if(res.error){toast("No se pudo: "+res.error.message);return;}
  closeModal();await dbLoad();render();toast("Eliminado");
}

/* ---- editor de plato (con receta) ---- */
function editDish(id){
  const dish=id?DB.dishes.find(d=>d.id===id):{name:"",slot:"almuerzo",menu:""};
  const lines=id?DB.dishIng.filter(x=>x.dish_id===id).map(l=>({ingredient_id:l.ingredient_id,grams:l.grams})):[];
  window._dish={id,name:dish.name||"",slot:dish.slot||"almuerzo",menu:dish.menu||"",lines};
  dishModal();
}
function dishSync(){const n=document.getElementById("ds_name");if(n)window._dish.name=n.value;}
function dishModal(){
  const d=window._dish;const m=macrosFromLines(d.lines);
  const slots=["desayuno","almuerzo","batido","cena","snack"];
  const linesHtml=d.lines.map((l,idx)=>`<div class="row" style="margin-bottom:6px">
    <select onchange="dishLineSet(${idx},'ingredient_id',this.value)" style="flex:1;background:var(--card2);border:1px solid var(--line);border-radius:8px;color:var(--txt);padding:8px">${DB.ingredients.map(i=>`<option value="${i.id}" ${i.id===+l.ingredient_id?"selected":""}>${esc(i.name)}</option>`).join("")}</select>
    <input type="number" inputmode="decimal" value="${l.grams}" onchange="dishLineSet(${idx},'grams',this.value)" style="width:64px;background:var(--card2);border:1px solid var(--line);border-radius:8px;color:var(--txt);padding:8px;text-align:center">
    <span class="muted small">g</span>
    <button class="btn btn-sm" onclick="dishLineDel(${idx})">✕</button>
  </div>`).join("");
  modal(`<h3>${d.id?"Editar":"Nuevo"} plato</h3>
    <div class="field"><label>Nombre</label><input id="ds_name" value="${esc(d.name)}"></div>
    <div class="row">
      <div class="field" style="flex:1"><label>Slot</label><select id="ds_slot" onchange="window._dish.slot=this.value">${slots.map(s=>`<option ${s===d.slot?"selected":""}>${s}</option>`).join("")}</select></div>
      <div class="field" style="flex:1"><label>Menú</label><select id="ds_menu" onchange="window._dish.menu=this.value"><option value="">—</option>${["A","B","C","D"].map(x=>`<option ${x===d.menu?"selected":""}>${x}</option>`).join("")}</select></div>
    </div>
    <div class="section-h" style="margin-left:0">Ingredientes (g)</div>
    ${linesHtml||'<div class="muted small">Sin ingredientes aún.</div>'}
    <button class="btn btn-sm" style="margin-top:6px" onclick="dishLineAdd()">＋ Agregar ingrediente</button>
    <div class="ai-box" style="margin-top:12px"><b>Macros calculados:</b> ${m.kcal} kcal · P ${m.p} · C ${m.c} · G ${m.f} g</div>
    <button class="btn btn-accent" style="width:100%;margin-top:12px" onclick="saveDish()">Guardar plato</button>
    ${d.id?`<button class="btn" style="width:100%;margin-top:8px" onclick="deleteDish(${d.id})">Eliminar plato</button>`:""}`);
}
function dishLineSet(idx,field,val){window._dish.lines[idx][field]=val;dishSync();dishModal();}
function dishLineDel(idx){dishSync();window._dish.lines.splice(idx,1);dishModal();}
function dishLineAdd(){if(!DB.ingredients.length){toast("Agrega ingredientes primero");return;}dishSync();window._dish.lines.push({ingredient_id:DB.ingredients[0].id,grams:100});dishModal();}
async function saveDish(){
  const d=window._dish;dishSync();d.name=(d.name||"").trim();
  if(!d.name){toast("Pon un nombre al plato");return;}
  let dishId=d.id;
  if(dishId){const r=await supa.from("dishes").update({name:d.name,slot:d.slot,menu:d.menu||null}).eq("id",dishId);if(r.error){toast("Error: "+r.error.message);return;}}
  else{const r=await supa.from("dishes").insert({name:d.name,slot:d.slot,menu:d.menu||null}).select();if(r.error){toast("Error: "+r.error.message);return;}dishId=r.data[0].id;}
  await supa.from("dish_ingredients").delete().eq("dish_id",dishId);
  const rows=d.lines.filter(l=>l.ingredient_id&&l.grams).map(l=>({dish_id:dishId,ingredient_id:+l.ingredient_id,grams:+l.grams}));
  if(rows.length){const r=await supa.from("dish_ingredients").insert(rows);if(r.error){toast("Error en ingredientes: "+r.error.message);return;}}
  closeModal();await dbLoad();render();toast("Plato guardado");
}
async function deleteDish(id){
  if(!confirm("¿Eliminar este plato?"))return;
  const r=await supa.from("dishes").delete().eq("id",id);
  if(r.error){toast("No se pudo: "+r.error.message);return;}
  closeModal();await dbLoad();render();toast("Plato eliminado");
}

/* ---------- util ---------- */
function esc(s){return String(s==null?"":s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));}

/* ---------- init ---------- */
function registerServiceWorker(){
  if(!CONFIG.pwa.registerServiceWorker||!("serviceWorker" in navigator))return;
  const host=location.hostname;
  const secure=location.protocol==="https:"||host==="localhost"||host==="127.0.0.1"||host==="::1";
  if(!secure)return;
  window.addEventListener("load",()=>{
    navigator.serviceWorker.register("./service-worker.js").catch(e=>console.warn("No se pudo registrar el service worker",e));
  });
}
// Carga la base de datos si hay conexión, para que los macros del día salgan de la DB.
function ensureDB(){if(supa&&!DB.loaded&&!DB.error)dbLoad().then(render);}
supaInit();
registerServiceWorker();
render();
ensureDB();
syncDay(current);
syncWeights();
// Carga las credenciales servidas por Vercel y re-renderiza con la conexión lista.
loadRemoteConfig().then(()=>{supaInit();render();ensureDB();syncDay(current);syncWeights();});
</script>
</body>
