<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="description" content="Fitbros — tu cuerpo, tu sistema. Nutrición y entrenamiento personalizados con IA.">
<meta name="theme-color" content="#07070f">
<meta name="color-scheme" content="dark">
<meta name="mobile-web-app-capable" content="yes">
<meta name="application-name" content="Fitbros">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Fitbros">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="assets/icon-192.png" sizes="192x192">
<link rel="apple-touch-icon" sizes="180x180" href="assets/icon-180.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<title>Fitbros — Tu cuerpo, tu sistema</title>
<style>
  /* ════════════════════════════════════════════
     FITBROS — Mobile design tokens
     Dark · Púrpura primario · Terracota secundario
  ═══════════════════════════════════════════════ */
  :root{
    /* Marca */
    --purple-200:#b8a2ff; --purple-300:#9878ff; --purple-400:#7c5cfc; --purple-500:#5c3cd8; --purple-600:#3c1fac;
    --terra-300:#df8c64; --terra-400:#d2744b; --terra-500:#c8643c;
    /* Superficies */
    --black:#07070f; --surf1:#0f0f1c; --surf2:#161626; --surf3:#1d1d30; --surf4:#26263e;
    /* Líneas */
    --border:rgba(255,255,255,.07); --border-2:rgba(255,255,255,.12); --border-acc:rgba(124,92,252,.22);
    /* Acentos */
    --accent:var(--purple-400); --accent2:var(--terra-500);
    --accent-dim:rgba(124,92,252,.14); --accent-glow:rgba(124,92,252,.28);
    --terra-dim:rgba(200,100,60,.16); --terra-glow:rgba(200,100,60,.30);
    /* Semántica */
    --good:#22c55e; --warn:#f59e0b; --bad:#ef4444;
    --good-dim:rgba(34,197,94,.14); --warn-dim:rgba(245,158,11,.14); --bad-dim:rgba(239,68,68,.14);
    /* Aliases compat. con la app */
    --bg:var(--black); --card:var(--surf1); --card2:var(--surf2); --line:var(--border);
    --txt:#f0eeff; --muted:#8880aa; --muted2:#52516e;
    /* Tipos de día */
    --pesas:var(--purple-400); --bajo:var(--terra-400); --refeed:var(--warn); --dietbreak:var(--purple-300); --libre:#52516e;
    /* Tipografía */
    --font-display:'Syne',system-ui,sans-serif;
    --font-body:'DM Sans',system-ui,sans-serif;
    --font-mono:'JetBrains Mono',ui-monospace,monospace;
    --r-sm:12px; --r-md:16px; --r-lg:22px;
    /* Bordes seguros para iPhone en modo PWA/standalone. */
    --safe-top:env(safe-area-inset-top,0px);
    --safe-right:env(safe-area-inset-right,0px);
    --safe-bottom:env(safe-area-inset-bottom,0px);
    --safe-left:env(safe-area-inset-left,0px);
  }
  *{box-sizing:border-box}
  html{min-height:100%;background:var(--black)}
  body{
    font-family:var(--font-body);background:var(--black);color:var(--txt);margin:0;padding:0;min-height:100vh;min-height:100dvh;overflow-x:hidden;
    -webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased;
    background-image:radial-gradient(circle at 12% 8%,rgba(124,92,252,.10),transparent 42%),
                     radial-gradient(circle at 90% 96%,rgba(200,100,60,.07),transparent 46%);
    background-attachment:fixed;
  }
  #app{
    width:100%;max-width:560px;min-height:100dvh;margin:0 auto;
    padding:calc(14px + var(--safe-top))
            max(14px,var(--safe-right))
            calc(88px + var(--safe-bottom))
            max(14px,var(--safe-left));
  }
  h1,h2,h3{margin:0;font-family:var(--font-display);letter-spacing:-.02em}
  button{font-family:inherit;cursor:pointer;border:none;border-radius:var(--r-sm);color:var(--txt)}
  .btn{background:var(--surf2);padding:9px 14px;font-size:14px;font-weight:500;border:1px solid var(--border-2);border-radius:999px;transition:.15s}
  .btn:active{transform:scale(.97)}
  .btn-accent{background:var(--accent);color:#fff;font-weight:700;font-family:var(--font-display);border:none;box-shadow:0 6px 22px var(--accent-glow)}
  .btn-sm{padding:7px 13px;font-size:13px}
  .row{display:flex;gap:8px;align-items:center}
  .between{justify-content:space-between}
  .wrap{flex-wrap:wrap}
  .muted{color:var(--muted)}
  .small{font-size:12px}
  .center{text-align:center}

  /* Header */
  header{padding:6px 2px 14px}
  header h2{font-size:26px;font-weight:800;letter-spacing:-.03em}
  header h2 .muted,header h2 .small,h2 .muted,h2 .small{font-family:var(--font-body);font-weight:400;letter-spacing:0}
  .daynav{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:12px}
  .daynav button{background:var(--surf2);border:1px solid var(--border-2);width:44px;height:44px;border-radius:14px;font-size:20px;color:var(--white);display:flex;align-items:center;justify-content:center;transition:.15s}
  .daynav button:active{transform:scale(.94)}
  .dtitle{flex:1;text-align:center}
  .dtitle .date{font-family:var(--font-display);font-size:19px;font-weight:700;letter-spacing:-.02em;text-transform:capitalize}
  .badge{display:inline-flex;align-items:center;gap:5px;padding:4px 11px;border-radius:999px;font-size:11px;font-weight:700;letter-spacing:.04em;white-space:nowrap}
  .b-PESAS{background:var(--accent-dim);color:var(--purple-200)}
  .b-BAJO{background:var(--terra-dim);color:var(--terra-300)}
  .b-REFEED{background:var(--warn-dim);color:var(--warn)}
  .b-DIETBREAK{background:var(--accent-dim);color:var(--purple-300)}
  .b-Libre{background:var(--surf3);color:var(--muted)}
  .weeknote{font-size:12px;color:var(--muted);margin-top:2px}
  .alert{background:var(--warn-dim);border:1px solid rgba(245,158,11,.32);color:#fcd34d;border-radius:var(--r-md);padding:10px 12px;font-size:13px;margin-bottom:10px;line-height:1.4}
  .alert.violet{background:var(--accent-dim);border-color:var(--border-acc);color:#d8ccff}

  /* Macro dashboard */
  .dash{background:linear-gradient(160deg,var(--surf2),var(--surf1));border:1px solid var(--border);border-radius:var(--r-lg);padding:18px;margin-bottom:14px;box-shadow:0 4px 16px rgba(0,0,0,.3)}
  .kcal-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px}
  .kcal-big{font-family:var(--font-display);font-size:30px;font-weight:800;letter-spacing:-.03em}
  .bar{height:8px;background:var(--surf3);border-radius:999px;overflow:hidden}
  .bar > i{display:block;height:100%;border-radius:999px;transition:width .5s cubic-bezier(.4,0,.2,1)}
  .fill-kcal{background:var(--accent2)}
  .macros{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px;margin-top:14px}
  .macro{background:var(--surf2);border:1px solid var(--border);border-radius:var(--r-md);padding:11px}
  .macro .lab{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;font-weight:600}
  .macro .val{font-family:var(--font-display);font-size:15px;font-weight:700;margin:3px 0 8px}
  .macro.prot{grid-column:1 / -1;border-color:var(--border-acc)}
  .macro.prot .lab{font-size:12px}
  .macro.prot .val{font-size:18px}
  .fill-good{background:var(--good)} .fill-warn{background:var(--warn)} .fill-bad{background:var(--bad)}
  .fill-prot{background:var(--accent)} .fill-carb{background:var(--terra-400)} .fill-fat{background:var(--warn)}

  /* Hero: anillo de progreso + medidores de macros (jerarquía Ring + Meter) */
  .hero{display:flex;gap:18px;align-items:center}
  .ring{position:relative;flex:0 0 auto}
  .ring-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center}
  .ring-n{font-family:var(--font-display);font-weight:800;font-size:26px;line-height:1;letter-spacing:-.02em}
  .ring-l{font-size:11px;color:var(--muted);margin-top:3px}
  .hero-macros{flex:1;display:flex;flex-direction:column;gap:13px;min-width:0}
  .mm-top{display:flex;justify-content:space-between;font-size:12px;margin-bottom:5px}
  .mm-top .mm-lab{color:var(--txt);font-weight:500}
  .mm-top .mm-num{color:var(--muted2);font-family:var(--font-mono)}
  .kcal-line{margin-top:16px}

  /* Screen header (eyebrow + título grande + chip de ícono) */
  .shead{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
  .shead-sub{font-size:12px;color:var(--muted);font-weight:500;margin-bottom:4px}
  .shead-ic{width:40px;height:40px;border-radius:13px;background:var(--surf2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;color:var(--accent);flex:0 0 auto}

  /* Meal cards */
  .section-h{font-size:11px;color:var(--terra-300);text-transform:uppercase;letter-spacing:.12em;font-weight:700;margin:18px 4px 10px}
  /* Secciones colapsables (REQ-04) */
  .csec{margin-top:14px}
  .csec-h{width:100%;display:flex;justify-content:space-between;align-items:center;gap:10px;background:transparent;border:none;padding:8px 4px;margin:0;cursor:pointer;font-size:11px;color:var(--terra-300);text-transform:uppercase;letter-spacing:.12em;font-weight:700;text-align:left}
  .csec-h .csec-sub{color:var(--muted);font-weight:500;text-transform:none;letter-spacing:0;margin-left:8px}
  .csec-h .chev{flex:0 0 auto;color:var(--muted);transition:transform .2s}
  .csec:not(.collapsed) .csec-h .chev{transform:rotate(90deg)}
  .csec.collapsed .csec-body{display:none}
  .meal{background:var(--surf1);border:1px solid var(--border);border-radius:var(--r-lg);padding:14px 16px;margin-bottom:10px;transition:.2s}
  .meal.done{border-color:var(--border-acc);background:var(--accent-dim)}
  .meal .slot{font-family:var(--font-body);font-size:10px;color:var(--terra-300);text-transform:uppercase;letter-spacing:.12em;font-weight:700}
  .meal .name{font-family:var(--font-display);font-weight:600;font-size:16px;margin:3px 0 5px;line-height:1.25}
  .meal .nums{font-size:12px;color:var(--muted);font-family:var(--font-mono)}
  .meal .nums b{color:var(--txt);font-weight:500}
  .meal-actions{display:flex;gap:7px;margin-top:11px;flex-wrap:wrap}
  .chk{width:32px;height:32px;border-radius:999px;border:2px solid var(--surf4);background:transparent;flex:0 0 auto;font-size:16px;display:flex;align-items:center;justify-content:center;transition:.2s}
  .chk.on{background:var(--accent);border-color:var(--accent);color:#fff}
  .meal-head{display:flex;gap:13px}
  .meal-head .chk{margin-top:2px}
  .meal-head > div{flex:1;min-width:0}
  .recipe{display:none;margin-top:11px;padding-top:11px;border-top:1px dashed var(--border)}
  .recipe.open{display:block}
  .recipe .r-row{display:flex;justify-content:space-between;gap:10px;font-size:13px;padding:3px 0;color:var(--txt)}
  .recipe .r-row .g{font-family:var(--font-mono);color:var(--muted);white-space:nowrap}
  .recipe .r-foot{font-size:11px;color:var(--muted);font-family:var(--font-mono);margin-top:7px}

  .workout{background:linear-gradient(160deg,rgba(200,100,60,.16),var(--surf1));border:1px solid var(--terra-dim);border-radius:var(--r-lg);padding:16px}
  .workout .name{font-family:var(--font-display);font-size:17px}
  .workout .detail{font-size:13px;color:var(--muted);margin-top:5px;line-height:1.45}

  /* Tabs */
  .tabs{
    position:fixed;bottom:0;left:0;right:0;width:100%;max-width:560px;margin:0 auto;
    background:rgba(7,7,15,.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
    border-top:1px solid var(--border);display:flex;justify-content:space-between;
    padding:10px max(10px,var(--safe-right)) max(12px,var(--safe-bottom)) max(10px,var(--safe-left));
    z-index:50;
  }
  .tabs button{flex:1;background:transparent;border:none;color:var(--muted);padding:2px 0;font-size:10px;font-weight:500;display:flex;flex-direction:column;align-items:center;gap:5px;border-radius:0;transition:.15s}
  .tabs button .ic{font-size:18px;width:46px;height:30px;display:flex;align-items:center;justify-content:center;border-radius:10px;transition:.15s}
  .tabs button.active{color:var(--accent);font-weight:600}
  .tabs button.active .ic{background:var(--accent-dim)}

  /* Week view */
  .wk-day{display:flex;justify-content:space-between;align-items:center;background:var(--surf1);border:1px solid var(--border);border-radius:var(--r-md);padding:13px 15px;margin-bottom:8px;transition:.15s}
  .wk-day.today{border-color:var(--border-acc);background:var(--accent-dim)}
  .wk-left .d{font-family:var(--font-display);font-weight:600;text-transform:capitalize}
  .wk-left .m{font-size:12px;color:var(--muted);margin-top:3px}
  .wk-day .center>div:first-child{font-family:var(--font-display);font-weight:700}
  .dot{width:9px;height:9px;border-radius:999px;display:inline-block;margin-left:6px}

  /* Modal */
  .overlay{position:fixed;inset:0;background:rgba(5,5,9,.72);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);display:flex;align-items:flex-end;justify-content:center;z-index:100;padding:0}
  .sheet{background:var(--surf2);width:100%;max-width:560px;border-radius:var(--r-lg) var(--r-lg) 0 0;border:1px solid var(--border-2);border-bottom:none;padding:18px max(18px,var(--safe-right)) max(18px,var(--safe-bottom)) max(18px,var(--safe-left));max-height:88vh;max-height:88dvh;overflow:auto;box-shadow:0 -12px 40px rgba(0,0,0,.5)}
  .sheet h3{font-family:var(--font-display);font-weight:700;font-size:18px;margin-bottom:4px;letter-spacing:-.02em}
  .field{margin:12px 0}
  .field label{display:block;font-size:12px;color:var(--muted);margin-bottom:5px;font-weight:500}
  .field input,.field select,.field textarea{width:100%;background:var(--surf3);border:1px solid var(--border-2);border-radius:var(--r-sm);color:var(--txt);padding:11px;font-size:15px;font-family:inherit}
  .field input:focus,.field select:focus,.field textarea:focus,.opt:focus{outline:none;border-color:var(--accent)}
  .grid4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px}
  .opt{width:100%;text-align:left;background:var(--surf3);border:1px solid var(--border-2);border-radius:var(--r-md);padding:13px;margin-bottom:8px;font-size:14px;line-height:1.3;transition:.15s}
  .opt:active{transform:scale(.99);border-color:var(--accent)}
  .opt .o-meta{font-size:12px;color:var(--muted);margin-top:4px;font-family:var(--font-mono)}
  .closebar{display:flex;justify-content:flex-end;margin-bottom:4px}
  .closebar button{background:var(--surf3);width:36px;height:36px;border-radius:999px;font-size:16px;color:var(--muted)}
  .ai-box{background:var(--accent-dim);border:1px solid var(--border-acc);border-radius:var(--r-md);padding:12px;font-size:14px;margin-top:10px;white-space:pre-wrap;line-height:1.5}
  .mic{background:var(--surf3);border:1px solid var(--border-2);width:48px;height:48px;border-radius:var(--r-sm);font-size:20px}
  .mic.live{background:var(--bad);border-color:var(--bad);animation:pulse 1s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
  .pill{display:inline-block;background:var(--surf3);border:1px solid var(--border-2);border-radius:999px;padding:4px 10px;font-size:11px;font-weight:500;margin:0 4px 4px 0}

  /* Weight */
  table.wt{width:100%;border-collapse:collapse;font-size:13px}
  table.wt th,table.wt td{padding:9px 6px;border-bottom:1px solid var(--border);text-align:center}
  table.wt th{color:var(--muted);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.06em}
  table.wt td{font-family:var(--font-mono)}
  table.wt input{width:72px;background:var(--surf3);border:1px solid var(--border-2);border-radius:var(--r-sm);color:var(--txt);padding:7px;text-align:center;font-size:14px;font-family:var(--font-mono)}
  .chart{background:var(--surf1);border:1px solid var(--border);border-radius:var(--r-lg);padding:14px;margin:14px 0}

  .summary{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .scard{background:var(--surf2);border:1px solid var(--border);border-radius:var(--r-md);padding:14px;text-align:center}
  .scard .n{font-family:var(--font-display);font-size:24px;font-weight:800;letter-spacing:-.02em}
  .scard .l{font-size:11px;color:var(--muted);margin-top:3px}
  .toast{position:fixed;bottom:calc(82px + var(--safe-bottom));left:50%;transform:translateX(-50%);background:var(--surf3);border:1px solid var(--border-2);padding:10px 16px;border-radius:999px;font-size:13px;font-weight:500;z-index:200;opacity:0;transition:opacity .2s;box-shadow:0 8px 24px rgba(0,0,0,.4)}
  .toast.show{opacity:1}

  /* Sugerencia "agregar a pantalla de inicio" (solo móvil) */
  .a2hs{position:fixed;left:10px;right:10px;bottom:calc(82px + var(--safe-bottom,0px));max-width:540px;margin:0 auto;z-index:60;
    background:linear-gradient(160deg,var(--surf2),var(--surf1));border:1px solid var(--border-acc);border-radius:var(--r-lg);
    padding:14px 40px 14px 14px;box-shadow:0 12px 40px rgba(0,0,0,.55);display:flex;gap:12px;align-items:flex-start;animation:a2hsIn .25s ease}
  .a2hs .a2hs-ic{font-size:22px;flex:0 0 auto;line-height:1.1}
  .a2hs .a2hs-body{flex:1;min-width:0}
  .a2hs .a2hs-title{font-family:var(--font-display);font-weight:700;font-size:15px}
  .a2hs .a2hs-txt{font-size:12.5px;color:var(--muted);margin-top:3px;line-height:1.45}
  .a2hs .a2hs-actions{display:flex;gap:8px;margin-top:11px;flex-wrap:wrap}
  .a2hs .a2hs-x{position:absolute;top:8px;right:8px;width:30px;height:30px;border-radius:999px;background:var(--surf3);color:var(--muted);font-size:15px;border:none}
  @keyframes a2hsIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

  /* Card-link: tarjeta que lleva a otra vista (Home → Nutrición/Entreno) */
  .card-link{display:flex;align-items:center;gap:12px;cursor:pointer;transition:.15s}
  .card-link:not(.workout){background:var(--surf1);border:1px solid var(--border);border-radius:var(--r-lg);padding:14px 16px}
  .card-link:active{transform:scale(.99)}
  .cl-title{font-family:var(--font-display);font-weight:700;font-size:16px}
  .chev{color:var(--muted2);flex:0 0 auto}
  .avatar{width:40px;height:40px;border-radius:999px;background:linear-gradient(135deg,var(--purple-300),var(--terra-400));display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-weight:800;color:#fff;font-size:15px;flex:0 0 auto}
  .shead-sub .badge{font-size:10px;padding:2px 8px}
  .splash{display:flex;align-items:center;justify-content:center;min-height:70vh}

  /* Auth / login */
  .auth{max-width:380px;margin:0 auto;padding-top:7vh}
  .auth-brand{font-family:var(--font-display);font-weight:800;font-size:32px;letter-spacing:-.03em;text-align:center;margin-bottom:6px}

  /* Chips de preferencias (Perfil) */
  .chips{display:flex;flex-wrap:wrap;gap:8px}
  .chip-check{display:inline-flex;align-items:center;gap:7px;background:var(--surf3);border:1px solid var(--border-2);border-radius:999px;padding:7px 13px;font-size:13px;cursor:pointer;user-select:none}
  .chip-check input{accent-color:var(--accent);width:15px;height:15px}

  /* Onboarding y revisión periódica del perfil */
  .onboarding{max-width:560px;margin:0 auto;padding:24px 14px 50px}
  .onboarding-brand{font-family:var(--font-display);font-size:14px;font-weight:800;color:var(--purple-200);margin-bottom:22px}
  .onboarding h1{font-size:30px;line-height:1.08;margin-bottom:8px}
  .onboarding-copy{color:var(--muted);font-size:14px;line-height:1.5;margin-bottom:18px}
  .steps{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-bottom:24px}
  .step{height:5px;background:var(--surf3);border-radius:999px;overflow:hidden}
  .step.on{background:var(--accent)}
  .onboarding-grid{display:grid;grid-template-columns:1fr 1fr;gap:0 10px}
  .onboarding-actions{display:flex;gap:10px;margin-top:18px}
  .onboarding-actions .btn{min-height:44px}
  .onboarding-actions .btn-accent{flex:1}

const ACTIVITY_LEVELS={
  light:{label:"Ligera",description:"Trabajo sedentario y caminatas ocasionales",factor:1.35},
  moderate:{label:"Moderada",description:"Vida activa además de los entrenamientos",factor:1.55},
  high:{label:"Alta",description:"Trabajo físico o actividad diaria intensa",factor:1.725},
};
const PROFILE_REVIEW_DAYS=28;
const PROFILE_REVIEW_MS=PROFILE_REVIEW_DAYS*24*60*60*1000;
function calculateMacroTargets(input){
  const kg=Number(input.weightKg),cm=Number(input.heightCm),age=Number(input.age);
  const bf=Number(input.bodyFatPct);
  const activity=ACTIVITY_LEVELS[input.activityLevel]||ACTIVITY_LEVELS.moderate;
  const hasBf=Number.isFinite(bf)&&bf>=3&&bf<=60;
  const leanKg=hasBf?kg*(1-bf/100):null;
  const bmr=hasBf
    ?370+21.6*leanKg
    :10*kg+6.25*cm-5*age+(input.sex==="female"?-161:5);
  const maintenance=Math.round(bmr*activity.factor/10)*10;
  const goalFactor=input.goal==="volumen"?1.1:input.goal==="mantenimiento"?1:.85;
  const kcal=Math.round(maintenance*goalFactor/10)*10;
  const proteinRate=input.goal==="deficit"?2:1.8;
  const p=Math.round((hasBf?Math.max(leanKg*2.2,kg*1.6):kg*proteinRate));
  const f=Math.round(Math.max(45,kg*.8));
  const c=Math.max(50,Math.round((kcal-p*4-f*9)/4));
  return {kcal,p,c,f,maintenance,bmr:Math.round(bmr),method:hasBf?"Katch-McArdle":"Mifflin-St Jeor"};
}
function profileMacroTargets(){
  const p=(profile&&profile.prefs)||{};
  const target={kcal:+p.calorieTarget,p:+p.proteinTarget,c:+p.carbTarget,f:+p.fatTarget};
  return Object.values(target).every(v=>Number.isFinite(v)&&v>0)?target:null;
}
function effectiveDayTarget(type){
  const custom=profileMacroTargets();
  if(custom)return {...custom};
  return DAY_TARGET[type]||DAY_TARGET.PESAS;
}

/* ---- helpers de fecha ---- */
function ymd(d){return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}
function parseYmd(s){const[y,m,d]=s.split("-").map(Number);return new Date(y,m-1,d);}
function addDays(s,n){const d=parseYmd(s);d.setDate(d.getDate()+n);return ymd(d);}
function todayStr(){return ymd(new Date());}
const DOW=["Domingo","Lunes","Martes","Miércoles","Jueves","Viernes","Sábado"];
const MON=["ene","feb","mar","abr","may","jun","jul","ago","sep","oct","nov","dic"];
function prettyDate(s){const d=parseYmd(s);return DOW[d.getDay()]+", "+d.getDate()+" "+MON[d.getMonth()];}
function validYmd(s){return typeof s==="string"&&/^\d{4}-\d{2}-\d{2}$/.test(s)&&!isNaN(parseYmd(s));}
function cycleNumber(){return Math.max(1,Number.parseInt(profile&&profile.prefs&&profile.prefs.planCycleNumber,10)||1);}
function planEndFor(start,duration){return addDays(start,(validPlanDuration(duration)?+duration:10)*7-1);}
function buildCycleWeeks(start,duration){
  return CYCLE_MENUS.slice(0,duration).map((menu,i)=>({
    label:"S"+(i+1),
    start:addDays(start,i*7),
    end:addDays(start,i*7+6),
    menu,
    num:i+1,
    dietBreak:i===5,
  }));
}
function weekdayInWeek(week,weekday){
  for(let i=0;i<7;i++){const ds=addDays(week.start,i);if(parseYmd(ds).getDay()===weekday)return ds;}
  return week.end;
}
function buildWeightRanges(prefs){
  const p=prefs||{};
  const startWeight=Number(p.cycleStartWeight||p.weightKg);
  if(!Number.isFinite(startWeight)||startWeight<=0)return Object.fromEntries(Array.from({length:PLAN_DURATION_WEEKS},(_,i)=>[i+1,"—"]));
  const rate=p.goal==="deficit"?-.004:p.goal==="volumen"?.002:0;
  const ranges={};
  for(let week=1;week<=PLAN_DURATION_WEEKS;week++){
    const center=startWeight*Math.pow(1+rate,week-1);
    ranges[week]=`${(center-.3).toFixed(1)}–${(center+.3).toFixed(1)}`;
  }
  return ranges;
}
function refreshPlanCalendar(){
  const p=(profile&&profile.prefs)||{};
  if(validYmd(p.planStartDate)){
    PLAN_DURATION_WEEKS=resolvedPlanDuration(p);
    START=p.planStartDate;
    END=planEndFor(START,PLAN_DURATION_WEEKS);
    WEEKS=buildCycleWeeks(START,PLAN_DURATION_WEEKS);
    REFEED_DATES=new Set([2,4,8,10].filter(n=>n<=PLAN_DURATION_WEEKS).map(n=>weekdayInWeek(WEEKS[n-1],6)));
    WEIGHT_RANGES=buildWeightRanges(p);
  }else{
    PLAN_DURATION_WEEKS=10;
    START=DEFAULT_START;END=DEFAULT_END;
    WEEKS=DEFAULT_WEEKS.map(w=>({...w}));
    REFEED_DATES=new Set(DEFAULT_REFEED_DATES);
    WEIGHT_RANGES={...DEFAULT_WEIGHT_RANGES};
  }
}

function weekOf(ds){for(const w of WEEKS){if(ds>=w.start&&ds<=w.end)return w;}return null;}
function dayType(ds){
  const w=weekOf(ds); const wd=parseYmd(ds).getDay();
  if(w&&w.dietBreak)return "DIETBREAK";
  if(REFEED_DATES.has(ds))return "REFEED";
  if([1,2,4,5].includes(wd))return "PESAS";
  return "BAJO";
}

// Construye el día completo (datos base del plan)
function buildDay(ds){
  const w=weekOf(ds); const wd=parseYmd(ds).getDay();
  const type=dayType(ds);
  const idx=Math.round((parseYmd(ds)-parseYmd(START))/86400000); // offset para rotación
  const slots=SLOTS[type].map(s=>({...s}));
  const lunchMenu = (w&&w.menu!=="Libre") ? w.menu : "A";
  const meals=slots.map(s=>{
    // kcal/p/c/f del slot son FALLBACK; mealValue() prioriza los macros de la DB vía dishName
    const m={id:s.id,slot:s.slot,kcal:s.kcal,p:s.p,c:s.c,f:s.f,name:"",dishName:null};
    if(s.id==="desayuno"){
      m.name = type==="REFEED" ? "Avena 80g + 1.5 scoop + plátano entero + miel 1 cda" : BREAKFASTS[idx%4];
      m.dishName = type==="REFEED" ? DISH_NAMES.refeedDesayuno : BREAKFAST_DISHES[idx%4];
    }else if(s.id==="almuerzo"){
      if(w&&w.menu==="Libre"){ m.name="Almuerzo libre (elige una opción del plan)"; m.dishName=null; }
      else {
        const dbLunch=dietLunchDish(lunchMenu,wd); // desde diet_dishes (DB) si está cargada
        if(dbLunch){ m.name=dbLunch.name; m.dishName=dbLunch.name; }
        else { m.name=MENUS[lunchMenu][wd]; m.dishName=LUNCH_DISHES[lunchMenu][wd]; }
      }
    }else if(s.id==="batido"){
      m.name = type==="PESAS" ? "2 scoops de proteína + plátano" : "2 scoops de proteína (solos)";
      m.dishName = type==="PESAS" ? DISH_NAMES.batidoPesas : DISH_NAMES.batidoBajo;
    }else if(s.id==="cena"){
      m.name = type==="REFEED" ? "Arroz/pasta 100g seco + tofu/queso + verduras" : DINNERS[idx%4];
      m.dishName = type==="REFEED" ? DISH_NAMES.refeedCena : DINNER_DISHES[idx%4];
    }else if(s.id==="snack"){
      m.name = type==="REFEED" ? "Pan 2 tajadas + mermelada + 1 scoop en agua" : "Snack: pan con palta / fruta + yogur";
      m.dishName = type==="REFEED" ? DISH_NAMES.refeedSnack : DISH_NAMES.dietbreakSnack;
    }else if(s.id==="snack_extra"){
      m.name = "Snack extra: fruta + yogur griego";
      m.dishName = DISH_NAMES.snackExtra;
    }
    return m;
  });
  return {ds,wd,type,week:w,target:effectiveDayTarget(type),meals,workout:effectiveWorkout(ds).workout};
}

function mealValue(base,ms){
  const o=ms&&ms.ovr;
  const name=o&&o.name!=null?o.name:base.name;
  if(o&&o.kcal!=null&&o.dishName==null){
    return{name,kcal:+o.kcal||0,p:+o.p||0,c:+o.c||0,f:+o.f||0,src:"custom"};
  }
  const dn=o&&o.dishName!=null?o.dishName:base.dishName;
  if(dn&&DB.loaded){const d=dishByName(dn);if(d){const m=dishMacros(d.id);return{name,kcal:m.kcal,p:m.p,c:m.c,f:m.f,src:"db"};}}
  return{name,kcal:base.kcal,p:base.p,c:base.c,f:base.f,src:"plan"};
}

function dayTotals(ds){

  let t={kcal:0,p:0,c:0,f:0}, doneMeals=0, totMeals=day.meals.length+st.extras.length;
  day.meals.forEach(b=>{const ms=st.meals[b.id];if(ms&&ms.done){const v=mealValue(b,ms);t.kcal+=v.kcal;t.p+=v.p;t.c+=v.c;t.f+=v.f;doneMeals++;}});

}

function paceClass(consumed,target,isToday){
  const pct=target?consumed/target:0;
  if(pct>=1)return"fill-good";
  if(!isToday)return pct>=0.7?"fill-warn":"fill-bad";
  const now=new Date();const h=now.getHours()+now.getMinutes()/60;
  const expected=Math.min(1,Math.max(0,(h-7)/(21-7)));
  if(pct>=expected-0.1)return"fill-good";
  if(pct>=expected-0.3)return"fill-warn";
  return"fill-bad";
}

function cycleSummary(){
  let ds=START,activeDays=0,bestStreak=0,currentStreak=0,workouts=0,doneMeals=0,plannedMeals=0;
  while(ds<=END){
    const st=S.days[ds]||{};
    const day=buildDay(ds);
    const mealStates=st.meals||{};
    const dayMeals=day.meals.reduce((n,m)=>n+(mealStates[m.id]&&mealStates[m.id].done?1:0),0);
    const dayActive=dayMeals>0||!!st.workoutDone||(Array.isArray(st.extras)&&st.extras.some(x=>x&&x.done));
    plannedMeals+=day.meals.length;doneMeals+=dayMeals;
    if(st.workoutDone)workouts++;
    if(dayActive){activeDays++;currentStreak++;bestStreak=Math.max(bestStreak,currentStreak);}else currentStreak=0;
    ds=addDays(ds,1);
  }
  const weighted=Object.keys(WEIGHT_RANGES).map(Number).filter(n=>wkg(n)!=null).sort((a,b)=>a-b);
  const firstWeek=weighted[0],lastWeek=weighted[weighted.length-1];
  const prefs=(profile&&profile.prefs)||{};
  const initialWeight=Number(prefs.cycleStartWeight);
  const initialBf=Number(prefs.cycleStartBodyFat);
  const startWeight=Number.isFinite(initialWeight)&&initialWeight>0?initialWeight:(firstWeek!=null?wkg(firstWeek):null);
  const startBf=Number.isFinite(initialBf)&&initialBf>0?initialBf:(firstWeek!=null?wbf(firstWeek):null);
  const endWeight=lastWeek!=null?wkg(lastWeek):null,endBf=lastWeek!=null?wbf(lastWeek):null;
  return {
    activeDays,bestStreak,workouts,doneMeals,plannedMeals,
    mealAdherence:plannedMeals?Math.round(doneMeals/plannedMeals*100):0,
    startWeight,endWeight,weightChange:startWeight!=null&&endWeight!=null?+(endWeight-startWeight).toFixed(1):null,
    startBodyFat:startBf,endBodyFat:endBf,bodyFatChange:startBf!=null&&endBf!=null?+(endBf-startBf).toFixed(1):null,
  };
}

function selectNextChallenge(id){

function previewRecapPhoto(input){

function challengeGoal(challenge,currentGoal){

}
function applyChallengeDefaults(d,challenge){

async function startNextChallenge(){
  if(!CHALLENGE_LABELS[recapChallenge]){toast("Elige tu siguiente desafío");return;}
  const btn=$("#nextChallengeBtn"),out=$("#recapOut");
  if(btn){btn.disabled=true;btn.textContent="Guardando tu ciclo…";}
  if(out)out.textContent=recapPhotoFile?"Comprimiendo y guardando tu foto privada…":"Guardando tu resumen…";
  try{
    const summary=cycleSummary();
    const photoPath=recapPhotoFile?await uploadProgressPhoto(recapPhotoFile,cycleNumber()):null;
    await archiveCompletedCycle(summary,recapChallenge,photoPath);
    const prefs={...((profile&&profile.prefs)||{}),
      recapCompletedCycle:cycleNumber(),
      onboardingPending:true,
      pendingChallenge:recapChallenge,
      lastCycleSummary:summary,
    };
    const saved=await saveProfilePrefs(prefs);
    if(saved&&saved.error)throw saved.error;
    onboardingDraft=onboardingDefaults();
    applyChallengeDefaults(onboardingDraft,recapChallenge);
    onboardingActive=true;onboardingStep=1;reviewPromptShown=true;
    recapPhotoFile=null;if(recapPhotoUrl)URL.revokeObjectURL(recapPhotoUrl);recapPhotoUrl="";
    render();window.scrollTo(0,0);
  }catch(e){
    if(btn){btn.disabled=false;btn.textContent="Reintentar";}
    if(out)out.textContent="No se pudo guardar: "+((e&&e.message)||String(e));
  }
}

    if(d.heightCm<130||d.heightCm>230)return "Revisa tu estatura";
    if(d.weightKg<35||d.weightKg>250)return "Revisa tu peso";
    if(d.bodyFatPct!==""&&(d.bodyFatPct<3||d.bodyFatPct>60))return "El porcentaje de grasa debe estar entre 3% y 60%";
  }
  if(onboardingStep===2&&[d.calorieTarget,d.proteinTarget,d.carbTarget,d.fatTarget].some(v=>!Number.isFinite(v)||v<=0))return "Completa las cuatro metas de nutrición";
  if(onboardingStep===3&&(!SPORT_LABELS[d.primarySport]||!STRENGTH_LABELS[d.strengthMode]||!validTrainingDays(d.trainDays)||!validPlanDuration(d.planDurationWeeks)))return "Completa tu plan de entrenamiento";

async function saveOnboarding(){
  readOnboardingStep();
  const error=validateOnboardingStep();
  if(error){toast(error);return;}
  const d=onboardingDraft,now=new Date().toISOString();
  const previous={...((profile&&profile.prefs)||{})};
  const newCycle=!!previous.onboardingPending;
  const firstCycle=!hasCompleteOnboarding(previous);
  const duration=validPlanDuration(d.planDurationWeeks)?+d.planDurationWeeks:10;
  const durationChanged=duration!==resolvedPlanDuration(previous);
  let planStartDate=previous.planStartDate,planEndDate=previous.planEndDate;
  let planCycleNumber=Math.max(1,Number.parseInt(previous.planCycleNumber,10)||1);
  if(newCycle){
    planCycleNumber+=1;
    planStartDate=todayStr()>END?todayStr():addDays(END,1);
    planEndDate=planEndFor(planStartDate,duration);
  }else if(firstCycle&&!validYmd(planStartDate)){
    planStartDate=todayStr();
    planEndDate=planEndFor(planStartDate,duration);
  }else if(validYmd(planStartDate)){
    planEndDate=planEndFor(planStartDate,duration);
  }else{
    planStartDate=START;
    planEndDate=planEndFor(planStartDate,duration);
  }
  const calendarChanged=durationChanged||previous.planStartDate!==planStartDate||previous.planEndDate!==planEndDate;
  const prefs={...previous,
    name:d.name,sex:d.sex,age:d.age,heightCm:d.heightCm,weightKg:d.weightKg,
    bodyFatPct:d.bodyFatPct===""?null:d.bodyFatPct,activityLevel:d.activityLevel,goal:d.goal,
    calorieTarget:d.calorieTarget,proteinTarget:d.proteinTarget,carbTarget:d.carbTarget,fatTarget:d.fatTarget,
    maintenanceCalories:d.maintenanceCalories,macroMethod:d.macroMethod,
    challenge:d.challenge||previous.pendingChallenge||previous.challenge||(d.goal==="mantenimiento"?"maintain":d.goal==="volumen"?"strength":"continue"),
    primarySport:d.primarySport,strengthMode:d.strengthMode,trainType:d.primarySport,
    trainDays:d.trainDays,trainPlace:d.strengthMode==="bodyweight"?"casa":"gym",trainNote:d.trainNote,
    diet:d.diet,avoid:d.avoid,foodNote:d.foodNote,
    planCycleNumber,planStartDate,planEndDate,planDurationWeeks:duration,
    cycleStartWeight:d.weightKg,cycleStartBodyFat:d.bodyFatPct===""?null:d.bodyFatPct,
    onboardingPending:false,pendingChallenge:null,
    onboardingCompletedAt:previous.onboardingCompletedAt||now,onboardingReviewedAt:now,cycleStartedAt:now,
  };
  const result=await saveProfilePrefs(prefs);
  if(result&&result.error){toast("No se pudo guardar: "+result.error.message);return;}
  if(newCycle||firstCycle){
    S.days={};S.weights={};save();
  }
  if(newCycle||firstCycle||calendarChanged){
    await upsertActiveCycle();
    await pullCycleHistory();
  }
  onboardingActive=false;onboardingDraft=null;reviewPromptShown=true;
  view="hoy";current=clampDate(todayStr());render();window.scrollTo(0,0);toast("Tu plan quedó actualizado");
}

/* ---------- Componentes compartidos (jerarquía del design system) ---------- */
// Anillo de progreso SVG (Ring). pct 0..1, centerHtml va en el centro.
function ring(pct,centerHtml,opt){
  opt=opt||{};
  const size=opt.size||128, stroke=opt.stroke||12, color=opt.color||"var(--accent2)", track=opt.track||"var(--surf3)";
  const r=(size-stroke)/2, c=2*Math.PI*r;
  const p=Math.min(Math.max(pct||0,0),1), off=c*(1-p);
  return `<div class="ring" style="width:${size}px;height:${size}px">
    <svg width="${size}" height="${size}" style="transform:rotate(-90deg)">
      <circle cx="${size/2}" cy="${size/2}" r="${r.toFixed(1)}" fill="none" stroke="${track}" stroke-width="${stroke}"/>
      <circle cx="${size/2}" cy="${size/2}" r="${r.toFixed(1)}" fill="none" stroke="${color}" stroke-width="${stroke}" stroke-linecap="round" stroke-dasharray="${c.toFixed(1)}" stroke-dashoffset="${off.toFixed(1)}" style="transition:stroke-dashoffset .6s cubic-bezier(.4,0,.2,1)"/>
    </svg>
    <div class="ring-center">${centerHtml}</div>
  </div>`;
}
// Medidor de macro (etiqueta + valor/meta + barra). fillClass: clase .fill-*
function macroMeter(label,v,g,fillClass){
  return `<div class="mm">
    <div class="mm-top"><span class="mm-lab">${label}</span><span class="mm-num">${v}/${g} g</span></div>
    <div class="bar"><i class="${fillClass}" style="width:${pctW(v,g)}%"></i></div>
  </div>`;
}
// Cabecera de pantalla (eyebrow + título Syne + chip de ícono a la derecha)
function screenHeader(title,sub,icon){
  return `<header class="shead">
    <div>${sub?`<div class="shead-sub">${sub}</div>`:""}<h2>${esc(title)}</h2></div>
    ${icon?`<div class="shead-ic">${tabIcon(icon)}</div>`:""}
  </header>`;
}

const UI_KEY="fitbud_ui";
let UI=(()=>{try{return JSON.parse(localStorage.getItem(UI_KEY))||{}}catch(e){return{}}})();

/* ---- Sugerencia: agregar a la pantalla de inicio (solo móvil, una vez) ---- */
let deferredInstallPrompt=null;
function isStandaloneMode(){return (window.matchMedia&&window.matchMedia('(display-mode: standalone)').matches)||window.navigator.standalone===true;}
function isIOSDevice(){return /iphone|ipad|ipod/i.test(navigator.userAgent||"")&&!window.MSStream;}
function isMobileDevice(){return /android|iphone|ipad|ipod|mobile/i.test(navigator.userAgent||"");}
function installDismissed(){return !!(UI&&UI.installDismissed);}
function removeInstallPrompt(){const el=document.getElementById("a2hs");if(el)el.remove();}
function dismissInstall(){UI.installDismissed=true;uiSave();removeInstallPrompt();}
function updateInstallPrompt(){
  const inApp=session&&profile&&(typeof isActive!=="function"||isActive())&&!onboardingActive&&!passwordRecovery&&!(typeof planNeedsRecap==="function"&&planNeedsRecap());
  const show=inApp&&isMobileDevice()&&!isStandaloneMode()&&!installDismissed();
  if(!show){removeInstallPrompt();return;}
  if(document.getElementById("a2hs"))return;               // ya visible
  const ios=isIOSDevice(), canPrompt=!!deferredInstallPrompt;
  const txt=ios
    ? 'Pulsa <b>Compartir</b> y luego <b>“Añadir a pantalla de inicio”</b> para abrirla como app.'
    : canPrompt
      ? 'Instálala para abrirla a pantalla completa, como una app de tu celular.'
      : 'Abre el menú de tu navegador y elige <b>“Instalar app”</b> o <b>“Añadir a pantalla de inicio”</b>.';
  const action=(!ios&&canPrompt)?'<button class="btn btn-sm btn-accent" onclick="installApp()">Instalar</button>':'';
  const el=document.createElement("div");
  el.id="a2hs"; el.className="a2hs";
  el.innerHTML=`<div class="a2hs-ic">📲</div>
    <div class="a2hs-body">
      <div class="a2hs-title">Agrega Fitbros a tu inicio</div>
      <div class="a2hs-txt">${txt}</div>
      <div class="a2hs-actions">${action}<button class="btn btn-sm" onclick="dismissInstall()">${action?'Ahora no':'Entendido'}</button></div>
    </div>
    <button class="a2hs-x" aria-label="Cerrar" onclick="dismissInstall()">✕</button>`;
  document.body.appendChild(el);
}
async function installApp(){
  const dp=deferredInstallPrompt; deferredInstallPrompt=null;
  if(!dp){dismissInstall();return;}
  try{ dp.prompt(); await dp.userChoice; }catch(e){}
  UI.installDismissed=true; uiSave(); removeInstallPrompt();   // no volver a sugerir tras el intento
}
function isCollapsed(key){return !!(UI.collapsed&&UI.collapsed[key]);}
function toggleSection(key,btn){
  UI.collapsed=UI.collapsed||{};

// Receta (ingredientes + gramos) de la comida, desde la DB, respetando override.
function mealRecipe(b,ms){
  const o=ms&&ms.ovr;
  // Comida generada por IA: trae sus propios ingredientes con gramos.
  if(o&&Array.isArray(o.ingredientes)&&o.ingredientes.length){
    const lines=o.ingredientes.map(x=>({name:x.nombre||x.name||"(ingrediente)",grams:+(x.gramos!=null?x.gramos:x.grams)})).filter(l=>l.grams>0);
    if(lines.length)return{dish:{name:o.name},lines,generated:true};
  }
  if(o&&o.kcal!=null&&o.dishName==null)return null;           // macros manuales: sin receta
  const dn=o&&o.dishName!=null?o.dishName:b.dishName;
  if(!dn||!DB.loaded)return null;
  const d=dishByName(dn);if(!d)return null;
  const lines=DB.dishIng.filter(x=>x.dish_id===d.id)
    .map(l=>{const i=ingById(+l.ingredient_id);return{name:i?i.name:"(ingrediente)",grams:+l.grams};})
    .filter(l=>l.grams>0);
  return lines.length?{dish:d,lines}:null;
}
function mealCard(ds,b){
  const ms=mealState(ds,b.id); const v=mealValue(b,ms);
  const r=mealRecipe(b,ms);
  const recipeHtml=r?`
    <div class="recipe">
      ${r.lines.map(l=>`<div class="r-row"><span>${esc(l.name)}</span><span class="g">${l.grams} g</span></div>`).join("")}
      <div class="r-foot">${r.lines.length} ingredientes · ${r.generated?"generado por IA":"macros calculados desde la receta"}</div>
    </div>`:"";
  return `<div class="meal ${ms.done?'done':''}">
    <div class="meal-head">
      <button class="chk ${ms.done?'on':''}" onclick="toggleMeal('${ds}','${b.id}')">${ms.done?'✓':''}</button>

}

/* ---------- PROGRESO: stats + peso + semana ---------- */
function renderProgress(){
  $("#app").innerHTML=`${screenHeader("Progreso","Tu evolución","progreso")}
    ${progressStats()}
    ${section("pr.ciclos","Tus ciclos",progressJourney(),`${cycleNumber()}`)}
    ${section("pr.peso","Peso corporal",
      weightChart()+bodyComposition()+
      `<table class="wt"><thead><tr><th>Sem</th><th>Rango kg</th><th>Peso kg</th><th>% grasa</th></tr></thead><tbody>${weightRows()}</tbody></table>`)}
    ${section("pr.semana","Semana",weekSection())}`;
}
function progressJourney(){
  const completed=cycleHistory.filter(row=>row.status==="completed");
  const current=`<div class="alert violet"><b>Ciclo ${cycleNumber()} en curso</b><br>${prettyDate(START)} → ${prettyDate(END)}${profile&&profile.prefs&&profile.prefs.challenge?` · ${CHALLENGE_LABELS[profile.prefs.challenge]||profile.prefs.challenge}`:""}</div>`;
  if(!completed.length)return current+`<div class="muted small">Cuando termines este ciclo de ${PLAN_DURATION_WEEKS} semanas, aquí quedarán el recap y tus fotos privadas de progreso.</div>`;
  return current+completed.map(row=>{
    const s=row.summary||{};
    const photo=row.photo_url?`<img class="journey-photo" src="${row.photo_url}" alt="Foto de progreso del ciclo ${row.cycle_number}">`:"";
    return `<div class="dash">
      <div class="row between" style="align-items:flex-start">
        <div><div class="slot">Ciclo ${row.cycle_number}</div><div class="cl-title">${CHALLENGE_LABELS[row.challenge]||"Ciclo completado"}</div></div>
        <span class="badge b-PESAS">Completado</span>
      </div>
      <div class="muted small" style="margin:4px 0 12px">${prettyDate(row.start_date)} → ${prettyDate(row.end_date)}</div>
      ${photo}
      <div class="summary" style="margin-top:12px">
        <div class="scard"><div class="n">${s.workouts||0}</div><div class="l">entrenamientos</div></div>
        <div class="scard"><div class="n">${s.mealAdherence||0}%</div><div class="l">adherencia</div></div>
        <div class="scard"><div class="n">${recapDelta(s.weightChange," kg")}</div><div class="l">cambio de peso</div></div>
        <div class="scard"><div class="n">${s.bestStreak||0}</div><div class="l">mejor racha</div></div>
      </div>
    </div>`;
  }).join("");
}
// Tarjetas de estadísticas (kg, entrenos, racha)
function progressStats(){
  const entrenos=Object.values(S.days).filter(d=>d&&d.workoutDone).length;
  const ws=Object.keys(WEIGHT_RANGES).map(n=>wkg(n)).filter(v=>v!=null);
  const lost=ws.length>=2?(ws[0]-ws[ws.length-1]):0;
  const lostTxt=lost>0?"-"+lost.toFixed(1):(lost<0?"+"+(-lost).toFixed(1):"0");
  return `<div class="summary" style="grid-template-columns:1fr 1fr 1fr">
    <div class="scard"><div class="n" style="color:var(--good)">${lostTxt}</div><div class="l">kg</div></div>
    <div class="scard"><div class="n">${entrenos}</div><div class="l">entrenos</div></div>
    <div class="scard"><div class="n" style="color:var(--terra-300)">🔥 ${streak()}</div><div class="l">días racha</div></div>
  </div>`;
}
function weightRows(){
  return Object.keys(WEIGHT_RANGES).map(n=>{
    const kg=wkg(n), bf=wbf(n);
    return `<tr><td>S${n}</td><td class="muted">${WEIGHT_RANGES[n].replace(/ .*/,'')}</td>
      <td><input type="number" step="0.1" inputmode="decimal" value="${kg!=null?kg:""}" onchange="setWeight(${n},this.value)" placeholder="kg"></td>
      <td><input type="number" step="0.1" inputmode="decimal" value="${bf!=null?bf:""}" onchange="setBodyFat(${n},this.value)" placeholder="%"></td></tr>`;
  }).join("");
}
// Resumen de composición corporal: masa grasa/magra de la última semana + cambios.
function bodyComposition(){
  const last=lastWeighedWeek(); if(last==null)return "";
  const comp=composition(last);
  // semana previa con datos para los deltas
  const prevWk=Object.keys(WEIGHT_RANGES).map(Number).filter(n=>n<last&&wkg(n)!=null).sort((a,b)=>b-a)[0];
  const dKg=prevWk!=null?(wkg(last)-wkg(prevWk)):null;
  const dBf=(prevWk!=null&&wbf(last)!=null&&wbf(prevWk)!=null)?(wbf(last)-wbf(prevWk)):null;
  const sign=v=>v>0?"+"+v.toFixed(1):v.toFixed(1);
  const cards=[];
  if(comp){
    cards.push(`<div class="scard"><div class="n">${comp.lean.toFixed(1)}</div><div class="l">masa magra kg</div></div>`);
    cards.push(`<div class="scard"><div class="n">${comp.fat.toFixed(1)}</div><div class="l">masa grasa kg</div></div>`);
  }
  if(dKg!=null) cards.push(`<div class="scard"><div class="n" style="color:${dKg<=0?'var(--good)':'var(--warn)'}">${sign(dKg)}</div><div class="l">Δ peso (sem)</div></div>`);
  if(dBf!=null) cards.push(`<div class="scard"><div class="n" style="color:${dBf<=0?'var(--good)':'var(--warn)'}">${sign(dBf)}</div><div class="l">Δ grasa %</div></div>`);
  if(!cards.length)return "";
  const cols=Math.min(cards.length,2);
  return `<div class="muted small" style="margin:0 4px 8px">Composición · semana ${last}${wbf(last)!=null?` · ${wbf(last)}% grasa`:""}</div>
    <div class="summary" style="grid-template-columns:repeat(${cols},1fr);margin-bottom:14px">${cards.join("")}</div>`;
}
// Lista de días de la semana actual (con navegación), reutiliza goDay
function weekSection(){
  const w=weekOf(current)||WEEKS[0];
  const dotColor={PESAS:"var(--pesas)",BAJO:"var(--bajo)",REFEED:"var(--refeed)",DIETBREAK:"var(--dietbreak)"};
  let days=[];let d=w.start;while(d<=w.end){days.push(d);d=addDays(d,1);}
  const rows=days.map(ds=>{
    const day=buildDay(ds);const{t,target,doneMeals,totMeals}=dayTotals(ds);
    const lunch=day.meals.find(m=>m.id==="almuerzo");
    return `<div class="wk-day ${ds===todayStr()?'today':''}" onclick="goDay('${ds}')">
      <div class="wk-left">
        <div class="d">${prettyDate(ds)} <span class="dot" style="background:${dotColor[day.type]}"></span></div>
        <div class="m">${day.type} · ${esc(lunch?lunch.name.split("—")[0].split("(+")[0]:"")}</div>
      </div>
      <div class="center"><div style="font-weight:600">${t.kcal}/${target.kcal}</div><div class="muted small">${doneMeals}/${totMeals} ✓</div></div>
    </div>`;
  }).join("");
  return `<div class="row between" style="margin-bottom:10px">
      <button class="btn btn-sm" onclick="weekNav(-1)" ${w.num<=0?'disabled style=opacity:.3':''}>‹</button>
      <span class="muted small">${w.label==="Arranque"?"Arranque":"Semana "+w.num} · Menú ${w.menu}</span>
      <button class="btn btn-sm" onclick="weekNav(1)" ${w.num>=PLAN_DURATION_WEEKS?'disabled style=opacity:.3':''}>›</button>
    </div>
    ${rows}`;
}
function goDay(ds){current=ds;view="nutricion";render();window.scrollTo(0,0);syncDay(current);}
function weekNav(n){const w=weekOf(current)||WEEKS[0];const i=WEEKS.indexOf(w)+n;if(i>=0&&i<WEEKS.length){current=WEEKS[i].start;render();window.scrollTo(0,0);}}

function updateTrainingSummary(){
  const sport=$("#pf_primarysport"),days=$("#pf_traindays"),duration=$("#pf_duration"),out=$("#trainingSummary");
  if(out&&sport&&days&&duration)out.innerHTML=`<b>${duration.value} semanas.</b> ${trainingPlanSummary(+days.value,sport.value)}`;
}
async function saveProfile(){
  const previous={...((profile&&profile.prefs)||{})};
  const diet=["vegetariano","vegano","sin_huevo","sin_lacteos","sin_gluten","omnivoro"].filter(v=>{const el=$("#pf_diet_"+v);return el&&el.checked;});
  const primarySport=$("#pf_primarysport").value;
  const strengthMode=$("#pf_strengthmode").value;
  const trainDays=+$("#pf_traindays").value;
  const planDurationWeeks=+$("#pf_duration").value;
  if(!validTrainingDays(trainDays)){toast(`Elige entre ${MIN_TRAINING_DAYS} y ${MAX_TRAINING_DAYS} días de entrenamiento`);return;}
  if(!validPlanDuration(planDurationWeeks)){toast("Elige un plan de 4 o 10 semanas");return;}
  const durationChanged=planDurationWeeks!==resolvedPlanDuration(previous);
  const planStartDate=validYmd(previous.planStartDate)?previous.planStartDate:START;
  const planEndDate=planEndFor(planStartDate,planDurationWeeks);
  const calendarChanged=durationChanged||previous.planStartDate!==planStartDate||previous.planEndDate!==planEndDate;
  const prefs={...previous,
    name:$("#pf_name").value.trim(),
    diet,
    avoid:$("#pf_avoid").value.trim(),
    foodNote:$("#pf_foodnote").value.trim(),
    primarySport,
    strengthMode,
    trainType:primarySport,
    trainDays,
    trainPlace:strengthMode==="bodyweight"?"casa":"gym",
    trainNote:$("#pf_trainnote").value.trim(),
    planDurationWeeks,
    planStartDate,
    planEndDate,
  };
  const result=await saveProfilePrefs(prefs);
  if(result&&result.error){toast("Error: "+result.error.message);return;}
  if(calendarChanged){await upsertActiveCycle();await pullCycleHistory();}
  current=clampDate(current);
  render();
  toast(durationChanged?`Plan ajustado a ${planDurationWeeks} semanas`:"Preferencias guardadas");
}

/* ---------- LOGIN / REGISTRO ---------- */
function renderAuth(){
  if(!supa){
    const host=location.hostname;
    const isLocal=host==="localhost"||host==="127.0.0.1"||host==="::1"||host==="";
    if(!isLocal){
      // Producción: las credenciales vienen de /api/config. No mostramos el
      // formulario de conexión al usuario; si falló, ofrecemos reintentar.
      $("#app").innerHTML=`<div class="auth">
        <div class="auth-brand">Fitbros</div>
        <div class="muted small center" style="margin-bottom:18px">Conectando con el servidor…</div>
        <div class="center"><button class="btn btn-accent" onclick="retryConnect()">Reintentar</button></div>
      </div>`;
      return;
    }
    // Dev local sin credenciales: pedir conexión Supabase (solo en localhost).
    const cfg=effectiveSettings();
    $("#app").innerHTML=`<div class="auth">
      <div class="auth-brand">Fitbros</div>
      <div class="muted small center" style="margin-bottom:18px">Conecta tu proyecto Supabase para continuar.</div>
      <div class="dash">
        <div class="field"><label>Project URL o ID</label><input id="au_url" value="${esc(cfg.supaUrl||"")}" placeholder="xxxx ó https://xxxx.supabase.co"></div>
        <div class="field"><label>Publishable key</label><input id="au_key" type="password" placeholder="sb_publishable_…"></div>
        <button class="btn btn-accent" style="width:100%" onclick="connectFromAuth()">Conectar</button>
      </div>
    </div>`;
    return;
  }
  const mode=window._authMode||"in";
  $("#app").innerHTML=`<div class="auth">
    <div class="auth-brand">Fitbros</div>
    <div class="muted small center" style="margin-bottom:20px">${mode==="in"?"Inicia sesión para continuar":"Crea tu cuenta"}</div>
    <div class="dash">
      <div class="field"><label>Correo</label><input id="au_email" type="email" autocomplete="email" placeholder="tu@correo.com"></div>
      <div class="field"><label>Contraseña</label><input id="au_pwd" type="password" autocomplete="${mode==="in"?"current-password":"new-password"}" placeholder="••••••••"></div>
      <button class="btn btn-accent" style="width:100%" onclick="doAuth()">${mode==="in"?"Entrar":"Registrarme"}</button>
      <div id="auOut" class="muted small" style="margin-top:10px"></div>
    </div>
    <div class="center" style="margin-top:14px">
      <button class="btn btn-sm" onclick="toggleAuthMode()">${mode==="in"?"¿No tienes cuenta? Regístrate":"¿Ya tienes cuenta? Inicia sesión"}</button>
      ${mode==="in"?'<button class="btn btn-sm" style="margin-top:8px" onclick="requestOwnPasswordReset()">Olvidé mi contraseña</button>':""}
    </div>
  </div>`;
}
function toggleAuthMode(){window._authMode=(window._authMode==="up")?"in":"up";renderAuth();}
function retryConnect(){
  loadRemoteConfig().then(()=>{supaInit();setupAuthListener();refreshAuth().then(()=>{session?onAuth():render();});});
}
function connectFromAuth(){
  const url=supaUrlFrom($("#au_url").value);const key=$("#au_key").value.trim();
  if(!url||!key){toast("Faltan datos");return;}
  S.settings.supaUrl=url;S.settings.supaKey=key;save();
  supaInit();
  if(!supa){toast("No se pudo conectar");return;}
  setupAuthListener();
  refreshAuth().then(()=>{session?onAuth():render();});
}
async function doAuth(){
  const email=$("#au_email").value.trim();const pwd=$("#au_pwd").value;
  const out=$("#auOut");
  if(!email||!pwd){if(out)out.textContent="Pon correo y contraseña";return;}
  if(out)out.textContent="…";
  const mode=window._authMode||"in";
  const r=mode==="up"?await signUp(email,pwd):await signIn(email,pwd);
  if(r.error){if(out)out.textContent="⚠️ "+r.error.message;return;}
  if(mode==="up"&&!(r.data&&r.data.session)){if(out)out.textContent="Cuenta creada. Confirma tu correo y luego inicia sesión.";window._authMode="in";return;}
  const{data}=await supa.auth.getSession();session=(data&&data.session)||null;
  if(session)onAuth();
}
async function requestOwnPasswordReset(){
  const email=$("#au_email")&&$("#au_email").value.trim();
  const out=$("#auOut");
  if(!email){if(out)out.textContent="Escribe tu correo primero";return;}
  if(out)out.textContent="Enviando…";
  const redirectTo=location.origin+location.pathname;
  const result=await supa.auth.resetPasswordForEmail(email,{redirectTo});
  if(out)out.textContent=result.error?("⚠️ "+result.error.message):"Revisa tu correo para crear una nueva contraseña.";
}
function renderPasswordRecovery(){
  $("#app").innerHTML=`<div class="auth">
    <div class="auth-brand">Fitbros</div>
    <div class="muted small center" style="margin-bottom:20px">Define una nueva contraseña para tu cuenta.</div>
    <div class="dash">
      <div class="field"><label>Nueva contraseña</label><input id="recovery_pwd" type="password" autocomplete="new-password" minlength="8"></div>
      <div class="field"><label>Confirmar contraseña</label><input id="recovery_confirm" type="password" autocomplete="new-password" minlength="8"></div>
      <button class="btn btn-accent" style="width:100%" onclick="finishPasswordRecovery()">Actualizar contraseña</button>
      <div id="recoveryOut" class="muted small" style="margin-top:10px"></div>
    </div>
  </div>`;
}
async function finishPasswordRecovery(){
  const pwd=$("#recovery_pwd").value,confirmPwd=$("#recovery_confirm").value,out=$("#recoveryOut");
  if(pwd.length<8){out.textContent="Usa al menos 8 caracteres.";return;}
  if(pwd!==confirmPwd){out.textContent="Las contraseñas no coinciden.";return;}
  out.textContent="Actualizando…";
  const result=await supa.auth.updateUser({password:pwd});
  if(result.error){out.textContent="⚠️ "+result.error.message;return;}
  if(history&&history.replaceState)history.replaceState({},document.title,location.pathname);
  passwordRecovery=false;
  await signOutUser();
  window._authMode="in";
  toast("Contraseña actualizada. Inicia sesión nuevamente.");
}

function modal(html){
  let o=$("#overlay");
  if(!o){o=document.createElement("div");o.id="overlay";o.className="overlay";o.addEventListener("click",e=>{if(e.target===o)closeModal();});document.body.appendChild(o);}
  o.innerHTML=`<div class="sheet"><div class="closebar"><button onclick="closeModal()">✕</button></div>${html}</div>`;
}
function closeModal(){const o=$("#overlay");if(o)o.remove();stopMic();}

function openReplace(ds,id){
  const day=buildDay(ds);const base=day.meals.find(m=>m.id===id);
  let options=[];
  if(id==="desayuno")options=BREAKFASTS.map((n,i)=>({name:n,dishName:BREAKFAST_DISHES[i]}));
  else if(id==="cena")options=DINNERS.map((n,i)=>({name:n,dishName:DINNER_DISHES[i]}));
  else if(id==="almuerzo")options=ALL_LUNCHES.map(l=>({name:l.name,dishName:l.dishName,tag:"Menú "+l.menu}));
  else options=[];
  const optsHtml=options.map((o,i)=>{
    const d=o.dishName?dishByName(o.dishName):null;const m=d?dishMacros(d.id):null;
    const meta=m?`${m.kcal} kcal · P ${m.p} · C ${m.c} · G ${m.f} g`:"macros del plan";

// Arma el system prompt de Claude desde las preferencias del perfil.
const DIET_LABELS={vegetariano:"vegetariano",vegano:"vegano",sin_huevo:"sin huevo",sin_lacteos:"sin lácteos",sin_gluten:"sin gluten",omnivoro:"omnívoro"};
function buildSysPrompt(){
  const p=(profile&&profile.prefs)||{};
  const base="Da estimaciones realistas de porciones reales, con kcal y macros.";
  const parts=[];
  if(Array.isArray(p.diet)&&p.diet.length)parts.push("Dieta: "+p.diet.map(d=>DIET_LABELS[d]||d).join(", ")+".");
  if(p.goal)parts.push("Objetivo: "+({deficit:"déficit calórico",mantenimiento:"mantenimiento",volumen:"volumen/superávit"}[p.goal]||p.goal)+".");
  if(p.calorieTarget)parts.push("Meta base: "+p.calorieTarget+" kcal/día.");
  if(p.proteinTarget)parts.push("Meta de proteína: "+p.proteinTarget+" g/día.");
  if(p.carbTarget)parts.push("Meta de carbohidratos: "+p.carbTarget+" g/día.");
  if(p.fatTarget)parts.push("Meta de grasas: "+p.fatTarget+" g/día.");
  if(p.weightKg)parts.push("Peso actual: "+p.weightKg+" kg"+(p.bodyFatPct?" y "+p.bodyFatPct+"% de grasa corporal":"")+".");
  if(p.avoid&&p.avoid.trim())parts.push("Evitar: "+p.avoid.trim()+".");
  if(p.foodNote&&p.foodNote.trim())parts.push("Notas de alimentación: "+p.foodNote.trim()+".");
  const tt=[];
  const training=trainingPrefs();
  tt.push(SPORT_LABELS[training.primary]+" + "+STRENGTH_LABELS[training.strength]);
  tt.push(training.days+" sesiones/semana");
  if(tt.length||p.trainNote)parts.push("Entrenamiento: "+tt.join(", ")+(p.trainNote&&p.trainNote.trim()?". "+p.trainNote.trim():"")+".");
  if(!parts.length)return "El usuario es vegetariano, no come huevo, toma proteína en polvo y busca alta proteína (~180 g/día) en déficit agresivo. "+base;
  return "Perfil del usuario — "+parts.join(" ")+" "+base+" Respeta SIEMPRE estas preferencias y restricciones alimenticias.";
}
async function callClaude(userText,maxTokens){
  if(!isActive())throw new Error("Tu cuenta está desactivada.");
  const cfg=effectiveSettings();
  // 1) Override local: si guardaste una API key en este navegador, llamada directa
  //    (útil para desarrollo local sin las funciones serverless).
  if(cfg.apiKey){
    const res=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"x-api-key":cfg.apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true","content-type":"application/json"},
      body:JSON.stringify({model:cfg.model||DEFAULT_MODEL,max_tokens:maxTokens||512,system:buildSysPrompt(),messages:[{role:"user",content:userText}]})
    });
    if(!res.ok){const e=await res.text();throw new Error("API "+res.status+": "+e.slice(0,200));}
    const data=await res.json();
    return (data.content&&data.content[0]&&data.content[0].text)||"";
  }
  // 2) Producción (Vercel): proxy /api/claude. La API key vive solo en el servidor.
  //    El proxy exige sesión: enviamos el token de Supabase (Bearer) para que valide.
  const token=session&&session.access_token;
  if(!token)throw new Error("Inicia sesión para usar la IA.");
  const res=await fetch("/api/claude",{
    method:"POST",headers:{"content-type":"application/json","authorization":"Bearer "+token},
    body:JSON.stringify({userText,system:buildSysPrompt(),maxTokens:maxTokens||512,model:cfg.model||DEFAULT_MODEL})
  });
  if(res.status===404)throw new Error("El proxy /api/claude no está disponible. Despliega en Vercel (con ANTHROPIC_API_KEY) o pon una API key local en Ajustes.");
  const data=await res.json().catch(()=>({}));
  if(!res.ok)throw new Error(data.error||("Error "+res.status));
  return data.text||"";
}
function parseJSON(txt){
  let t=txt.trim().replace(/^```(json)?/i,"").replace(/```$/,"").trim();
  const a=t.indexOf("{"),b=t.lastIndexOf("}");
  if(a>=0&&b>=0)t=t.slice(a,b+1);
  return JSON.parse(t);
}

/* ============================================================
   REQ-08 — Generador de días de dieta con Claude.
   Usa contexto real del usuario (prefs, metas, platos de la DB, historial),
   valida la respuesta y deja revisar antes de aplicar. Solo autenticados
   (callClaude exige sesión).
   ============================================================ */
// Nombres de comidas de los últimos N días (para evitar repetir).
function recentMealNames(ds,n){
  const names=[];
  for(let i=1;i<=n;i++){
    const prev=addDays(ds,-i); const st=S.days&&S.days[prev]; if(!st)continue;
    const day=buildDay(prev);
    day.meals.forEach(b=>{const ms=st.meals&&st.meals[b.id];const v=mealValue(b,ms);if(v&&v.name)names.push(v.name);});
    (st.extras||[]).forEach(e=>{if(e.name)names.push(e.name);});
  }
  return names;
}
// Valida la respuesta de Claude contra metas, restricciones y repetición.
function validateGeneratedDay(j,day,target){
  const issues=[], warns=[];
  if(!j||!Array.isArray(j.comidas)||!j.comidas.length){return{ok:false,issues:["La respuesta no trae comidas."]};}
  const slotIds=day.meals.map(m=>m.id);
  const prefs=(profile&&profile.prefs)||{};
  const noEgg=!Array.isArray(prefs.diet)||prefs.diet.indexOf("omnivoro")<0; // por defecto sin huevo
  const recent=recentMealNames(day.ds,5).map(s=>s.toLowerCase());
  const knownIng=new Set((DB.ingredients||[]).map(i=>i.name.toLowerCase()));
  let tot={kcal:0,p:0,c:0,f:0}; const comidas=[];
  j.comidas.forEach((c,idx)=>{
    const slot_id=c.slot_id||c.slot||slotIds[idx]||("slot"+idx);
    const nombre=(c.nombre||c.name||"").trim();
    const ings=Array.isArray(c.ingredientes)?c.ingredientes.map(x=>({nombre:(x.nombre||x.name||"").trim(),gramos:+(x.gramos!=null?x.gramos:x.grams)})):[];
    if(!nombre)issues.push(`Comida ${idx+1} sin nombre.`);
    if(!ings.length)issues.push(`"${nombre||("Comida "+(idx+1))}" sin ingredientes.`);
    ings.forEach(g=>{if(!(g.gramos>0))issues.push(`"${nombre}": gramos inválidos en "${g.nombre}".`);});
    const macro={kcal:+c.kcal||0,p:+c.proteina_g||+c.p||0,c:+c.carbohidratos_g||+c.c||0,f:+c.grasa_g||+c.f||0};
    tot.kcal+=macro.kcal;tot.p+=macro.p;tot.c+=macro.c;tot.f+=macro.f;
    // huevo / restricción
    const hay=(nombre+" "+ings.map(g=>g.nombre).join(" ")).toLowerCase();
    if(noEgg&&/\bhuevo|clara de huevo|yema\b/.test(hay))issues.push(`"${nombre}" contiene huevo (restricción del perfil).`);
    if(prefs.avoid){prefs.avoid.toLowerCase().split(/[,;]/).map(s=>s.trim()).filter(Boolean).forEach(a=>{if(hay.includes(a))issues.push(`"${nombre}" incluye "${a}" (en tu lista de evitar).`);});}
    // ingredientes nuevos (no en la DB)
    const nuevos=ings.filter(g=>g.nombre&&!knownIng.has(g.nombre.toLowerCase())).map(g=>g.nombre);
    if(nuevos.length&&DB.loaded)warns.push(`"${nombre}": ingredientes nuevos (${nuevos.join(", ")}).`);
    if(recent.includes(nombre.toLowerCase()))warns.push(`"${nombre}" se repite respecto a días recientes.`);
    comidas.push({slot_id,nombre,ingredientes:ings,kcal:Math.round(macro.kcal),proteina_g:Math.round(macro.p),carbohidratos_g:Math.round(macro.c),grasa_g:Math.round(macro.f)});
  });
  // tolerancia del día: kcal ±15%, proteína no menos del 85% de la meta
  const off=(v,t,tol)=>t>0&&Math.abs(v-t)>t*tol;
  if(off(tot.kcal,target.kcal,0.15))issues.push(`kcal del día ${Math.round(tot.kcal)} fuera de ±15% de ${target.kcal}.`);
  if(tot.p<target.p*0.85)issues.push(`Proteína ${Math.round(tot.p)} g por debajo del 85% de la meta (${target.p} g).`);
  if(off(tot.c,target.c,0.3))warns.push(`Carbohidratos ${Math.round(tot.c)} g lejos de la meta (${target.c} g).`);
  return{ok:issues.length===0,issues,warns,comidas,totals:{kcal:Math.round(tot.kcal),p:Math.round(tot.p),c:Math.round(tot.c),f:Math.round(tot.f)},explicacion:(j.explicacion||j.explicación||"").trim()};
}
// Núcleo reutilizable: genera UN día a la medida de los macros del usuario y lo valida.
async function generateOneDay(ds){
  const day=buildDay(ds); const target=effectiveDayTarget(day.type)||day.target;
  const slots=day.meals.map(m=>`${m.id} (${m.slot})`).join(", ");
  const dishList=DB.loaded?DB.dishes.slice(0,60).map(d=>{const m=dishMacros(d.id);return `${d.name} [${d.slot}] ${m.kcal}kcal P${m.p}/C${m.c}/G${m.f}`;}).join("; "):"(base de datos no conectada)";
  const recent=recentMealNames(ds,5);
  const prompt=`Genera el plan de comidas de UN día tipo ${day.type} para ${prettyDate(ds)}.
Metas del día: ${target.kcal} kcal, ${target.p} g proteína, ${target.c} g carbohidratos, ${target.f} g grasa.
Llena EXACTAMENTE estos slots (usa su id en "slot_id"): ${slots}.
Platos disponibles (reutilízalos cuando encajen; puedes crear variantes coherentes): ${dishList}.
Comidas de días recientes a NO repetir: ${recent.join(" | ")||"(ninguna)"}.
Cada comida debe llevar ingredientes reales con gramos y macros que sumen cerca de la meta del día.
Responde SOLO JSON válido, sin texto extra:
{"explicacion":"breve","comidas":[{"slot_id":"desayuno","nombre":"...","ingredientes":[{"nombre":"Avena","gramos":50}],"kcal":0,"proteina_g":0,"carbohidratos_g":0,"grasa_g":0}]}`;

let recog=null;
function toggleMic(){
  if(!aiAvailable()){toast("Configura la IA para usar voz (Vercel o API key local)");return;}
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){toast("Tu navegador no soporta dictado por voz");return;}

  const btn=$("#micBtn");if(btn)btn.classList.add("live");
  let finalT="";
  recog.onresult=e=>{let interim="";for(let i=e.resultIndex;i<e.results.length;i++){const tr=e.results[i][0].transcript;if(e.results[i].isFinal)finalT+=tr;else interim+=tr;}const f=$("#f_name");if(f)f.value=(finalT+interim).trim();};
  recog.onerror=ev=>{if(ev.error==="language-not-supported"){recog.lang="es-ES";}else{toast("Error de voz: "+ev.error);}stopMic();};

// --- modelo de peso: S.weights[n] puede ser número (legado, solo kg) u objeto {kg,bf}.
function wEntry(n){const v=S.weights[n];if(v==null)return null;return typeof v==="object"?v:{kg:+v,bf:null};}
function wkg(n){const e=wEntry(n);return e&&e.kg!=null?+e.kg:null;}
function wbf(n){const e=wEntry(n);return e&&e.bf!=null?+e.bf:null;}
function setWeightEntry(n,patch){
  const e=wEntry(n); const cur=e?{kg:e.kg,bf:e.bf}:{kg:null,bf:null};
  if("kg" in patch) cur.kg=(patch.kg===""||patch.kg==null)?null:+patch.kg;
  if("bf" in patch) cur.bf=(patch.bf===""||patch.bf==null)?null:+patch.bf;
  if(cur.kg==null&&cur.bf==null) delete S.weights[n];
  else S.weights[n]={kg:cur.kg,bf:cur.bf};
  pushWeight(n, cur.kg==null?null:cur.kg, cur.bf);
  save();renderProgress();
}
function setWeight(n,v){setWeightEntry(n,{kg:v});}
function setBodyFat(n,v){setWeightEntry(n,{bf:v});}
// Composición corporal derivada para una semana con peso y % grasa.
function composition(n){const kg=wkg(n),bf=wbf(n);if(kg==null||bf==null)return null;const fat=kg*bf/100;return{kg,bf,fat,lean:kg-fat};}
// Última semana (mayor índice) con datos de peso.
function lastWeighedWeek(){const ks=Object.keys(WEIGHT_RANGES).map(Number).filter(n=>wkg(n)!=null);return ks.length?Math.max(...ks):null;}
function weightChart(){
  const pts=Object.keys(WEIGHT_RANGES).map(n=>({x:+n,y:wkg(n)})).filter(p=>p.y!=null);
  if(pts.length<1)return `<div class="chart muted small center">Ingresa tu peso semanal para ver el gráfico de evolución.</div>`;
  const W=520,H=160,pad=28;const span=Math.max(1,PLAN_DURATION_WEEKS-1);const xs=p=>pad+(p.x-1)/span*(W-pad*2);
  const allY=pts.map(p=>p.y).concat([74,82]);const minY=Math.min(...allY)-0.5,maxY=Math.max(...allY)+0.5;
  const ys=y=>H-pad-(y-minY)/(maxY-minY)*(H-pad*2);
  const line=pts.map((p,i)=>(i?"L":"M")+xs(p).toFixed(1)+" "+ys(p.y).toFixed(1)).join(" ");
  const dots=pts.map(p=>`<circle cx="${xs(p).toFixed(1)}" cy="${ys(p.y).toFixed(1)}" r="3.5" fill="var(--accent)"/>`).join("");
  // Overlay de % grasa corporal (eje propio, en terracota) si hay datos.
  const bfpts=Object.keys(WEIGHT_RANGES).map(n=>({x:+n,y:wbf(n)})).filter(p=>p.y!=null);
  let bfLayer="";
  if(bfpts.length>=1){
    const bfAll=bfpts.map(p=>p.y);const bMin=Math.min(...bfAll)-1,bMax=Math.max(...bfAll)+1;
    const bys=y=>H-pad-(y-bMin)/((bMax-bMin)||1)*(H-pad*2);
    const bline=bfpts.map((p,i)=>(i?"L":"M")+xs(p).toFixed(1)+" "+bys(p.y).toFixed(1)).join(" ");
    const bdots=bfpts.map(p=>`<circle cx="${xs(p).toFixed(1)}" cy="${bys(p.y).toFixed(1)}" r="3" fill="var(--terra-400)"/>`).join("");
    bfLayer=`<path d="${bline}" fill="none" stroke="var(--terra-400)" stroke-width="1.6" stroke-dasharray="2 2"/>${bdots}
      <text x="${pad}" y="12" fill="var(--terra-300)" font-size="10">% grasa</text>`;
  }
  return `<div class="chart"><svg viewBox="0 0 ${W} ${H}" width="100%">
    <line x1="${pad}" y1="${ys(82)}" x2="${W-pad}" y2="${ys(82)}" stroke="var(--line)" stroke-dasharray="3 3"/>
    <line x1="${pad}" y1="${ys(74.5)}" x2="${W-pad}" y2="${ys(74.5)}" stroke="var(--good)" stroke-dasharray="3 3"/>
    <text x="${W-pad}" y="${ys(74.5)-4}" fill="var(--good)" font-size="10" text-anchor="end">meta ~74.5</text>
    <path d="${line}" fill="none" stroke="var(--accent)" stroke-width="2"/>${dots}
    ${bfLayer}
  </svg></div>`;
}

function supaUrlFrom(v){
  v=(v||"").trim().replace(/\/+$/,"");
  if(!v)return"";
  const dash=v.match(/dashboard\/project\/([a-z0-9]+)/i);
  if(dash)return"https://"+dash[1]+".supabase.co";
  if(/^https?:\/\//i.test(v))return v;
  return"https://"+v.replace(/\.supabase\.co$/i,"")+".supabase.co";
}
function supaInit(){

    try{supa=window.supabase.createClient(url,cfg.supaKey);}catch(e){supa=null;}

}

function dayActive(ds){

  if(st.workoutDone)return true;
  if(st.meals&&Object.values(st.meals).some(m=>m&&m.done))return true;
  if(st.extras&&st.extras.some(e=>e&&e.done))return true;
  return false;
}

function streak(){
  let n=0,ds=todayStr();
  if(!dayActive(ds))ds=addDays(ds,-1);
  while(dayActive(ds)){n++;ds=addDays(ds,-1);}
  return n;
}

async function dbLoad(){
  if(!supa){DB.error="no-config";return;}
  try{
    const [a,b,c,d,e]=await Promise.all([
      supa.from("ingredients").select("*"),
      supa.from("dishes").select("*"),
      supa.from("dish_ingredients").select("*"),
      supa.from("diets").select("*"),
      supa.from("diet_dishes").select("*"),
    ]);
    for(const r of [a,b,c,d,e]) if(r.error) throw r.error;
    DB.ingredients=a.data||[];DB.dishes=b.data||[];DB.dishIng=c.data||[];DB.diets=d.data||[];DB.dietDishes=e.data||[];
    DB.byName={};DB.dishes.forEach(x=>{DB.byName[x.name]=x;});
    DB.ingredients.sort((x,y)=>(x.category||"").localeCompare(y.category||"")||x.name.localeCompare(y.name));
    DB.dishes.sort((x,y)=>(x.slot||"").localeCompare(y.slot||"")||x.name.localeCompare(y.name));
    DB.diets.sort((x,y)=>(x.code||"").localeCompare(y.code||""));
    DB.loaded=true;DB.error=null;
  }catch(e){DB.loaded=false;DB.error=(e&&e.message)||String(e);}
}

/* ---- Historial de ciclos + foto privada de progreso ---- */
async function compressProgressPhoto(file){
  const url=URL.createObjectURL(file);
  try{
    const image=await new Promise((resolve,reject)=>{const img=new Image();img.onload=()=>resolve(img);img.onerror=reject;img.src=url;});
    const maxSide=1600,scale=Math.min(1,maxSide/Math.max(image.naturalWidth,image.naturalHeight));
    const canvas=document.createElement("canvas");
    canvas.width=Math.max(1,Math.round(image.naturalWidth*scale));
    canvas.height=Math.max(1,Math.round(image.naturalHeight*scale));
    canvas.getContext("2d").drawImage(image,0,0,canvas.width,canvas.height);
    return await new Promise((resolve,reject)=>canvas.toBlob(blob=>blob?resolve(blob):reject(new Error("No se pudo procesar la foto.")),"image/jpeg",.84));
  }finally{URL.revokeObjectURL(url);}
}
async function uploadProgressPhoto(file,cycleNo){
  if(!supa||!uid())throw new Error("Inicia sesión para guardar la foto.");
  let blob;
  try{blob=await compressProgressPhoto(file);}catch(e){blob=file;}
  const path=`${uid()}/cycle-${cycleNo}/final-${Date.now()}.${blob.type==="image/jpeg"?"jpg":"img"}`;
  const result=await supa.storage.from("progress-photos").upload(path,blob,{contentType:blob.type||file.type||"image/jpeg",upsert:true});
  if(result.error)throw new Error("No se pudo guardar la foto. Aplica supabase/plan_cycles.sql y vuelve a intentar.");
  return path;
}
