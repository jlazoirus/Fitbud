<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="description" content="Fitbros — tu cuerpo, tu sistema. Nutrición y entrenamiento personalizados para tu día a día.">
<meta name="theme-color" content="#07070f">
<meta name="color-scheme" content="dark">
<meta name="mobile-web-app-capable" content="yes">
<meta name="application-name" content="Fitbros">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Fitbros">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="assets/icon-192.png" sizes="192x192">
<link rel="apple-touch-icon" sizes="180x180" href="assets/icon-180.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<title>Fitbros — Tu cuerpo, tu sistema</title>
<style>
  /* ════════════════════════════════════════════
     FITBROS — Mobile design tokens
     Dark · Púrpura primario · Terracota secundario
  ═══════════════════════════════════════════════ */
  :root{
    /* Marca */
    --purple-200:#b8a2ff; --purple-300:#9878ff; --purple-400:#7c5cfc; --purple-500:#5c3cd8; --purple-600:#3c1fac;
    --terra-300:#df8c64; --terra-400:#d2744b; --terra-500:#c8643c;
    /* Superficies */
    --black:#07070f; --surf1:#0f0f1c; --surf2:#161626; --surf3:#1d1d30; --surf4:#26263e;
    /* Líneas */
    --border:rgba(255,255,255,.07); --border-2:rgba(255,255,255,.12); --border-acc:rgba(124,92,252,.22);
    /* Acentos */
    --accent:var(--purple-400); --accent2:var(--terra-500);
    --accent-dim:rgba(124,92,252,.14); --accent-glow:rgba(124,92,252,.28);
    --terra-dim:rgba(200,100,60,.16); --terra-glow:rgba(200,100,60,.30);
    /* Semántica */
    --good:#22c55e; --warn:#f59e0b; --bad:#ef4444;
    --good-dim:rgba(34,197,94,.14); --warn-dim:rgba(245,158,11,.14); --bad-dim:rgba(239,68,68,.14);
    /* Aliases compat. con la app */
    --bg:var(--black); --card:var(--surf1); --card2:var(--surf2); --line:var(--border);
    --txt:#f0eeff; --muted:#8880aa; --muted2:#52516e;
    /* Tipos de día */
    --pesas:var(--purple-400); --bajo:var(--terra-400); --refeed:var(--warn); --dietbreak:var(--purple-300); --libre:#52516e;
    /* Tipografía */
    --font-display:'Syne',system-ui,sans-serif;
    --font-body:'DM Sans',system-ui,sans-serif;
    --font-mono:'JetBrains Mono',ui-monospace,monospace;
    --r-sm:12px; --r-md:16px; --r-lg:22px;
    /* Bordes seguros para iPhone en modo PWA/standalone. */
    --safe-top:env(safe-area-inset-top,0px);
    --safe-right:env(safe-area-inset-right,0px);
    --safe-bottom:env(safe-area-inset-bottom,0px);
    --safe-left:env(safe-area-inset-left,0px);
  }
  *{box-sizing:border-box}
  html{min-height:100%;background:var(--black)}
  body{
    font-family:var(--font-body);background:var(--black);color:var(--txt);margin:0;padding:0;min-height:100vh;min-height:100dvh;overflow-x:hidden;
    -webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased;
    background-image:radial-gradient(circle at 12% 8%,rgba(124,92,252,.10),transparent 42%),
                     radial-gradient(circle at 90% 96%,rgba(200,100,60,.07),transparent 46%);
    background-attachment:fixed;
  }
  #app{
    width:100%;max-width:560px;min-height:100dvh;margin:0 auto;
    padding:calc(14px + var(--safe-top))
            max(14px,var(--safe-right))
            calc(88px + var(--safe-bottom))
            max(14px,var(--safe-left));
  }
  h1,h2,h3{margin:0;font-family:var(--font-display);letter-spacing:-.02em}
  button{font-family:inherit;cursor:pointer;border:none;border-radius:var(--r-sm);color:var(--txt)}
  .btn{background:var(--surf2);padding:9px 14px;font-size:14px;font-weight:500;border:1px solid var(--border-2);border-radius:999px;transition:.15s}
  .btn:active{transform:scale(.97)}
  .btn-accent{background:var(--accent);color:#fff;font-weight:700;font-family:var(--font-display);border:none;box-shadow:0 6px 22px var(--accent-glow)}
  .btn-sm{padding:7px 13px;font-size:13px}
  .row{display:flex;gap:8px;align-items:center}
  .between{justify-content:space-between}
  .wrap{flex-wrap:wrap}
  .muted{color:var(--muted)}
  .small{font-size:12px}
  .center{text-align:center}

  /* Header */
  header{padding:6px 2px 14px}
  header h2{font-size:26px;font-weight:800;letter-spacing:-.03em}
  header h2 .muted,header h2 .small,h2 .muted,h2 .small{font-family:var(--font-body);font-weight:400;letter-spacing:0}
  .daynav{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:12px}
  .daynav button{background:var(--surf2);border:1px solid var(--border-2);width:44px;height:44px;border-radius:14px;font-size:20px;color:var(--white);display:flex;align-items:center;justify-content:center;transition:.15s}
  .daynav button:active{transform:scale(.94)}
  .dtitle{flex:1;text-align:center}
  .dtitle .date{font-family:var(--font-display);font-size:19px;font-weight:700;letter-spacing:-.02em;text-transform:capitalize}
  .badge{display:inline-flex;align-items:center;gap:5px;padding:4px 11px;border-radius:999px;font-size:11px;font-weight:700;letter-spacing:.04em;white-space:nowrap}
  .b-PESAS{background:var(--accent-dim);color:var(--purple-200)}
  .b-BAJO{background:var(--terra-dim);color:var(--terra-300)}
  .b-REFEED{background:var(--warn-dim);color:var(--warn)}
  .b-DIETBREAK{background:var(--accent-dim);color:var(--purple-300)}
  .b-Libre{background:var(--surf3);color:var(--muted)}
  .weeknote{font-size:12px;color:var(--muted);margin-top:2px}
  .alert{background:var(--warn-dim);border:1px solid rgba(245,158,11,.32);color:#fcd34d;border-radius:var(--r-md);padding:10px 12px;font-size:13px;margin-bottom:10px;line-height:1.4}
  .alert.violet{background:var(--accent-dim);border-color:var(--border-acc);color:#d8ccff}

  /* Macro dashboard */
  .dash{background:linear-gradient(160deg,var(--surf2),var(--surf1));border:1px solid var(--border);border-radius:var(--r-lg);padding:18px;margin-bottom:14px;box-shadow:0 4px 16px rgba(0,0,0,.3)}
  .kcal-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px}
  .kcal-big{font-family:var(--font-display);font-size:30px;font-weight:800;letter-spacing:-.03em}
  .bar{height:8px;background:var(--surf3);border-radius:999px;overflow:hidden}
  .bar > i{display:block;height:100%;border-radius:999px;transition:width .5s cubic-bezier(.4,0,.2,1)}
  .fill-kcal{background:var(--accent2)}
  .macros{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px;margin-top:14px}
  .macro{background:var(--surf2);border:1px solid var(--border);border-radius:var(--r-md);padding:11px}
  .macro .lab{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;font-weight:600}
  .macro .val{font-family:var(--font-display);font-size:15px;font-weight:700;margin:3px 0 8px}
  .macro.prot{grid-column:1 / -1;border-color:var(--border-acc)}
  .macro.prot .lab{font-size:12px}
  .macro.prot .val{font-size:18px}
  .fill-good{background:var(--good)} .fill-warn{background:var(--warn)} .fill-bad{background:var(--bad)}
  .fill-prot{background:var(--accent)} .fill-carb{background:var(--terra-400)} .fill-fat{background:var(--warn)}

  /* Hero: anillo de progreso + medidores de macros (jerarquía Ring + Meter) */
  .hero{display:flex;gap:18px;align-items:center}
  .ring{position:relative;flex:0 0 auto}
  .ring-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center}
  .ring-n{font-family:var(--font-display);font-weight:800;font-size:26px;line-height:1;letter-spacing:-.02em}
  .ring-l{font-size:11px;color:var(--muted);margin-top:3px}
  .hero-macros{flex:1;display:flex;flex-direction:column;gap:13px;min-width:0}
  .mm-top{display:flex;justify-content:space-between;font-size:12px;margin-bottom:5px}
  .mm-top .mm-lab{color:var(--txt);font-weight:500}
  .mm-top .mm-num{color:var(--muted2);font-family:var(--font-mono)}
  .kcal-line{margin-top:16px}

  /* Screen header (eyebrow + título grande + chip de ícono) */
  .shead{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
  .shead-sub{font-size:12px;color:var(--muted);font-weight:500;margin-bottom:4px}
  .shead-ic{width:40px;height:40px;border-radius:13px;background:var(--surf2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;color:var(--accent);flex:0 0 auto}

  /* Meal cards */
  .section-h{font-size:11px;color:var(--terra-300);text-transform:uppercase;letter-spacing:.12em;font-weight:700;margin:18px 4px 10px}
  /* Secciones colapsables (REQ-04) */
  .csec{margin-top:14px}
  .csec-h{width:100%;display:flex;justify-content:space-between;align-items:center;gap:10px;background:transparent;border:none;padding:8px 4px;margin:0;cursor:pointer;font-size:11px;color:var(--terra-300);text-transform:uppercase;letter-spacing:.12em;font-weight:700;text-align:left}
  .csec-h .csec-sub{color:var(--muted);font-weight:500;text-transform:none;letter-spacing:0;margin-left:8px}
  .csec-h .chev{flex:0 0 auto;color:var(--muted);transition:transform .2s}
  .csec:not(.collapsed) .csec-h .chev{transform:rotate(90deg)}
  .csec.collapsed .csec-body{display:none}
  .meal{background:var(--surf1);border:1px solid var(--border);border-radius:var(--r-lg);padding:14px 16px;margin-bottom:10px;transition:.2s}
  .meal.done{border-color:var(--border-acc);background:var(--accent-dim)}
  .meal .slot{font-family:var(--font-body);font-size:10px;color:var(--terra-300);text-transform:uppercase;letter-spacing:.12em;font-weight:700}
  .meal .name{font-family:var(--font-display);font-weight:600;font-size:16px;margin:3px 0 5px;line-height:1.25}
  .meal .nums{font-size:12px;color:var(--muted);font-family:var(--font-mono)}
  .meal .nums b{color:var(--txt);font-weight:500}
  .meal-actions{display:flex;gap:7px;margin-top:11px;flex-wrap:wrap}
  .chk{width:32px;height:32px;border-radius:999px;border:2px solid var(--surf4);background:transparent;flex:0 0 auto;font-size:16px;display:flex;align-items:center;justify-content:center;transition:.2s}
  .chk.on{background:var(--accent);border-color:var(--accent);color:#fff}
  .meal-head{display:flex;gap:13px}
  .meal-head .chk{margin-top:2px}
  .meal-head > div{flex:1;min-width:0}
  .recipe{display:none;margin-top:11px;padding-top:11px;border-top:1px dashed var(--border)}
  .recipe.open{display:block}
  .recipe .r-row{display:flex;justify-content:space-between;gap:10px;font-size:13px;padding:3px 0;color:var(--txt)}
  .recipe .r-row .g{font-family:var(--font-mono);color:var(--muted);white-space:nowrap}
  .recipe .r-foot{font-size:11px;color:var(--muted);font-family:var(--font-mono);margin-top:7px}

  .workout{background:linear-gradient(160deg,rgba(200,100,60,.16),var(--surf1));border:1px solid var(--terra-dim);border-radius:var(--r-lg);padding:16px}
  .workout .name{font-family:var(--font-display);font-size:17px}
  .workout .detail{font-size:13px;color:var(--muted);margin-top:5px;line-height:1.45}
  .exercise-list{display:grid;gap:12px}
  .exercise-card{background:var(--surf1);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden}
  .exercise-card.inactive{opacity:.62}
  .exercise-demo{position:relative;background:linear-gradient(145deg,var(--surf3),var(--surf2));border-bottom:1px solid var(--border);min-height:164px;display:flex;align-items:center;justify-content:center}
  .exercise-demo svg{display:block;width:100%;height:164px;color:var(--purple-200)}
  .exercise-demo .demo-floor{stroke:var(--border-2);stroke-width:3}
  .exercise-demo .demo-athlete{transform-box:fill-box;transform-origin:center}
  .exercise-demo .demo-body{stroke:currentColor;stroke-width:7;stroke-linecap:round;stroke-linejoin:round;fill:none}
  .exercise-demo .demo-head{fill:var(--terra-300)}
  .exercise-demo .demo-prop{stroke:var(--muted2);stroke-width:5;fill:none}
  .demo-squat .demo-athlete{animation:demoSquat 2.2s ease-in-out infinite}
  .demo-hinge .demo-athlete{animation:demoHinge 2.2s ease-in-out infinite}
  .demo-push .demo-athlete{animation:demoPush 1.8s ease-in-out infinite}
  .demo-pull .demo-athlete{animation:demoPull 2s ease-in-out infinite}
  .demo-lunge .demo-athlete{animation:demoLunge 2.4s ease-in-out infinite}
  .demo-bridge .demo-athlete{animation:demoBridge 2.2s ease-in-out infinite}
  .demo-core .demo-athlete{animation:demoCore 2.6s ease-in-out infinite}
  .demo-calf .demo-athlete{animation:demoCalf 1.8s ease-in-out infinite}
  .demo-isolation .demo-athlete{animation:demoIsolation 1.8s ease-in-out infinite}
  .demo-run .demo-athlete{animation:demoRun 1.2s ease-in-out infinite}
  .demo-cycle .demo-crank{transform-box:fill-box;transform-origin:center;animation:demoCycle .9s linear infinite}
  .demo-swim .demo-athlete{animation:demoSwim 2s ease-in-out infinite}
  .exercise-card.paused .demo-athlete,.exercise-card.paused .demo-crank{animation-play-state:paused}
  @keyframes demoSquat{0%,100%{transform:translateY(0) scaleY(1)}50%{transform:translateY(22px) scaleY(.82)}}
  @keyframes demoHinge{0%,100%{transform:rotate(0)}50%{transform:rotate(28deg) translate(8px,10px)}}
  @keyframes demoPush{0%,100%{transform:translateY(-9px)}50%{transform:translateY(12px)}}
  @keyframes demoPull{0%,100%{transform:translateX(12px)}50%{transform:translateX(-12px)}}
  @keyframes demoLunge{0%,100%{transform:translate(0,0)}50%{transform:translate(18px,18px) scaleY(.88)}}
  @keyframes demoBridge{0%,100%{transform:rotate(0) translateY(8px)}50%{transform:rotate(-10deg) translateY(-10px)}}
  @keyframes demoCore{0%,100%{transform:rotate(-3deg)}50%{transform:rotate(3deg)}}
  @keyframes demoCalf{0%,100%{transform:translateY(8px)}50%{transform:translateY(-9px)}}
  @keyframes demoIsolation{0%,100%{transform:rotate(-5deg)}50%{transform:rotate(8deg)}}
  @keyframes demoRun{0%,100%{transform:translate(-9px,0) rotate(-2deg)}50%{transform:translate(9px,-6px) rotate(2deg)}}
  @keyframes demoCycle{to{transform:rotate(360deg)}}
  @keyframes demoSwim{0%,100%{transform:translateX(-12px) rotate(-2deg)}50%{transform:translateX(12px) rotate(2deg)}}
  .exercise-body{padding:14px 15px}
  .exercise-title{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
  .exercise-title h3{font-family:var(--font-display);font-size:16px;margin:0}
  .exercise-meta{font-size:11px;color:var(--muted);margin-top:4px}
  .exercise-copy{font-size:13px;line-height:1.48;color:var(--muted);margin-top:10px}
  .exercise-copy b{color:var(--txt)}
  .exercise-steps{margin:8px 0 0;padding-left:20px;color:var(--txt);font-size:13px;line-height:1.5}
  .exercise-safety{margin-top:10px;padding:10px;border-radius:var(--r-sm);background:rgba(220,80,80,.08);border:1px solid rgba(220,80,80,.2);font-size:12px;line-height:1.45}
  .exercise-actions{display:flex;gap:7px;flex-wrap:wrap;margin-top:11px}
  .exercise-filters{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
  .exercise-filters input,.exercise-filters select{width:100%;background:var(--surf3);border:1px solid var(--border-2);border-radius:var(--r-sm);color:var(--txt);padding:10px;font:inherit}
  .player-overview{display:grid;grid-template-columns:1fr auto;gap:14px;align-items:center}
  .player-progress{height:9px;background:var(--surf3);border-radius:999px;overflow:hidden;margin-top:11px}
  .player-progress i{display:block;height:100%;background:linear-gradient(90deg,var(--accent),var(--terra-400));border-radius:999px}
  .player-clock{font-family:var(--font-mono);font-size:20px;font-weight:700;color:var(--purple-200);white-space:nowrap}
  .player-step{background:linear-gradient(155deg,var(--surf2),var(--surf1));border:1px solid var(--border-acc);border-radius:var(--r-lg);padding:16px;margin-bottom:12px}
  .player-phase{font-size:10px;color:var(--terra-300);text-transform:uppercase;letter-spacing:.12em;font-weight:700}
  .player-step h3{font-size:21px;margin-top:5px}
  .player-target{font-size:14px;line-height:1.45;margin-top:8px}
  .player-dose{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:12px 0}
  .player-dose .scard{padding:10px 8px}
  .player-dose .n{font-size:16px}
  .player-timer{display:flex;flex-direction:column;align-items:center;gap:10px;padding:16px;background:var(--black);border:1px solid var(--border);border-radius:var(--r-md);margin:12px 0}
  .workout-timer-value{font-family:var(--font-mono);font-size:44px;font-weight:700;letter-spacing:-.04em}
  .player-controls{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:12px}
  .player-controls .btn{min-height:48px;border-radius:var(--r-md);white-space:normal}
  .player-controls .primary{grid-column:1 / -1}
  .set-list{display:grid;gap:8px;margin-top:12px}
  .set-row{display:grid;grid-template-columns:38px minmax(70px,1fr) minmax(70px,1fr) minmax(62px,.8fr);gap:7px;align-items:end;background:var(--surf3);border:1px solid var(--border);border-radius:var(--r-md);padding:10px}
  .set-row.done{border-color:var(--good);background:var(--good-dim)}
  .set-row label{font-size:10px;color:var(--muted);display:block}
  .set-row input{width:100%;min-width:0;background:var(--surf2);border:1px solid var(--border-2);border-radius:10px;color:var(--txt);padding:9px 7px;font:inherit}
  .set-row .chk{margin-bottom:2px}
  .player-summary{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin:12px 0}
  .player-status{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);margin-top:5px}
  .player-status i{width:8px;height:8px;border-radius:999px;background:var(--muted2)}
  .player-status.completed i{background:var(--good)}
  .player-status.partial i{background:var(--warn)}
  .player-status.in_progress i{background:var(--accent)}
  .player-status.paused i{background:var(--terra-300)}
  .player-active-exercise{margin-top:12px}
  .player-active-exercise .exercise-card{border-color:var(--border-acc)}
  @media(prefers-reduced-motion:reduce){
    .exercise-demo .demo-athlete,.exercise-demo .demo-crank{animation:none!important}
  }

  /* Tabs */
  .tabs{
    position:fixed;bottom:0;left:0;right:0;width:100%;max-width:560px;margin:0 auto;
    background:rgba(7,7,15,.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
    border-top:1px solid var(--border);display:flex;justify-content:space-between;
    padding:10px max(10px,var(--safe-right)) max(12px,var(--safe-bottom)) max(10px,var(--safe-left));
    z-index:50;
  }
  .tabs:empty{display:none}
  .tabs button{flex:1;background:transparent;border:none;color:var(--muted);padding:2px 0;font-size:10px;font-weight:500;display:flex;flex-direction:column;align-items:center;gap:5px;border-radius:0;transition:.15s}
  .tabs button .ic{font-size:18px;width:46px;height:30px;display:flex;align-items:center;justify-content:center;border-radius:10px;transition:.15s}
  .tabs button.active{color:var(--accent);font-weight:600}
  .tabs button.active .ic{background:var(--accent-dim)}

  /* Week view */
  .wk-day{display:flex;justify-content:space-between;align-items:center;background:var(--surf1);border:1px solid var(--border);border-radius:var(--r-md);padding:13px 15px;margin-bottom:8px;transition:.15s}
  .wk-day.today{border-color:var(--border-acc);background:var(--accent-dim)}
  .wk-left .d{font-family:var(--font-display);font-weight:600;text-transform:capitalize}
  .wk-left .m{font-size:12px;color:var(--muted);margin-top:3px}
  .wk-day .center>div:first-child{font-family:var(--font-display);font-weight:700}
  .dot{width:9px;height:9px;border-radius:999px;display:inline-block;margin-left:6px}

  /* Modal */
  .overlay{position:fixed;inset:0;background:rgba(5,5,9,.72);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);display:flex;align-items:flex-end;justify-content:center;z-index:100;padding:0}

const PREPARATION_LABELS={quick:"Rápidas",batch:"Cocinar por tandas",no_cook:"Sin cocinar",one_pot:"Una sola olla",oven:"Horno",grill:"Plancha o parrilla"};
function validTrainingDays(value){
  const days=Number.parseInt(value,10);
  return Number.isInteger(days)&&days>=MIN_TRAINING_DAYS&&days<=MAX_TRAINING_DAYS;
}
function validPlanDuration(value){return PLAN_DURATION_OPTIONS.some(o=>o.value===Number(value));}
function resolvedPlanDuration(prefs){
  const duration=Number.parseInt(prefs&&prefs.planDurationWeeks,10);
  return validPlanDuration(duration)?duration:10;
}
function normalizedList(value,allowed){
  const list=Array.isArray(value)?value:[];
  return [...new Set(list.filter(item=>allowed.includes(item)))];
}
function defaultTrainingDays(count){
  const defaults={3:[1,3,6],4:[1,3,5,6],5:[1,2,3,5,6],6:[1,2,3,4,5,6]};
  return (defaults[validTrainingDays(count)?+count:3]||defaults[3]).slice();
}
function normalizedTrainingDays(value,count){
  const valid=[...new Set((Array.isArray(value)?value:[]).map(Number).filter(day=>WEEKDAY_OPTIONS.some(o=>o.value===day)))];
  valid.sort((a,b)=>WEEKDAY_OPTIONS.findIndex(o=>o.value===a)-WEEKDAY_OPTIONS.findIndex(o=>o.value===b));
  return valid.length>=MIN_TRAINING_DAYS&&valid.length<=MAX_TRAINING_DAYS?valid:defaultTrainingDays(count);
}
function defaultMealTimes(count){
  const presets={
    2:["10:00","19:00"],
    3:["08:00","13:00","19:00"],
    4:["08:00","12:30","17:00","20:30"],
    5:["07:30","11:00","14:00","17:30","20:30"],
    6:["07:30","10:30","13:00","16:00","19:00","21:00"],
  };
  return (presets[count]||presets[4]).slice();
}
function validTime(value){return typeof value==="string"&&/^(?:[01]\d|2[0-3]):[0-5]\d$/.test(value);}
function detectedTimeZone(){
  try{return Intl.DateTimeFormat().resolvedOptions().timeZone||"UTC";}catch(e){return"UTC";}
}
function validTimeZone(value){
  if(typeof value!=="string"||!value.trim())return false;
  try{Intl.DateTimeFormat("en-US",{timeZone:value}).format();return true;}catch(e){return false;}
}
function normalizedMealTimes(value,count){
  const fallback=defaultMealTimes(count);
  const source=Array.isArray(value)?value:[];
  return fallback.map((time,index)=>validTime(source[index])?source[index]:time);
}
function inferredTrainingPriority(p){
  if(TRAINING_PRIORITY_LABELS[p.trainingPriority])return p.trainingPriority;
  if(p.challenge==="performance")return "performance";
  if(p.challenge==="strength")return "strength";
  return p.goal==="mantenimiento"?"health":"composition";
}
function baseWorkoutTemplate(days,priority){
  const base={
    3:["fullA","calidad","facil"],
    4:["fullA","calidad","fullB","facil"],
    5:["torsoA","piernaA","calidad","fullB","facil"],
    6:["torsoA","piernaA","calidad","torsoB","piernaB","facil"],
  };
  const strength={
    3:["fullA","fullB","facil"],
    4:["torsoA","piernaA","fullB","facil"],
    5:["torsoA","piernaA","torsoB","piernaB","facil"],
    6:base[6],
  };
  const performance={
    3:base[3],
    4:["fullA","tecnica","calidad","facil"],
    5:["fullA","tecnica","calidad","fullB","facil"],
    6:["fullA","tecnica","calidad","fullB","tecnica","facil"],
  };
  const templates=priority==="strength"?strength:priority==="performance"?performance:base;
  return (templates[days]||templates[3]).slice();
}
function defaultTrainingLocations(primary,strength,dayIds,priority){
  const sessions=baseWorkoutTemplate(dayIds.length,priority);
  const strengthIds=new Set(["fullA","fullB","torsoA","torsoB","piernaA","piernaB"]);
  return Object.fromEntries(dayIds.map((day,index)=>{
    const session=sessions[index];
    const location=strengthIds.has(session)?(strength==="bodyweight"?"home":"gym"):(primary==="swimming"?"pool":"outdoor");
    return [day,location];
  }));
}
function migrateProfilePrefs(source){
  const p={...(source&&typeof source==="object"?source:{})};
  let primary=SPORT_LABELS[p.primarySport]?p.primarySport:"";
  if(!primary)primary=p.trainType==="cycling"?"cycling":(p.trainType==="swimming"||p.trainType==="natacion")?"swimming":"running";
  const strength=STRENGTH_LABELS[p.strengthMode]?p.strengthMode:(p.trainPlace==="casa"?"bodyweight":"gym");
  const legacyCount=validTrainingDays(p.trainDays)?+p.trainDays:3;
  const trainingDays=normalizedTrainingDays(p.trainingDays,legacyCount);
  const trainingPriority=inferredTrainingPriority(p);
  const locationDefaults=defaultTrainingLocations(primary,strength,trainingDays,trainingPriority);
  const trainingLocations={...locationDefaults};
  if(p.trainingLocations&&typeof p.trainingLocations==="object"){
    trainingDays.forEach(day=>{
      const value=p.trainingLocations[day];
      if(TRAINING_LOCATION_LABELS[value])trainingLocations[day]=value;
    });
  }
  const mealCount=Math.min(6,Math.max(2,Number.parseInt(p.mealCount,10)||4));
  const allergies=String(p.allergies!=null?p.allergies:(p.avoid||"")).trim();
  const dislikedIngredients=String(p.dislikedIngredients||"").trim();
  const equipmentDefault=strength==="bodyweight"?["bodyweight"]:["dumbbells","barbell","machines"];
  const prefs={...p,
    profileSchemaVersion:PROFILE_SCHEMA_VERSION,
    timeZone:validTimeZone(p.timeZone)?p.timeZone:detectedTimeZone(),
    primarySport:primary,
    strengthMode:strength,
    trainType:primary,
    trainDays:trainingDays.length,
    trainingDays,
    trainingLocations,
    sessionMinutes:Math.min(180,Math.max(20,Number.parseInt(p.sessionMinutes,10)||60)),
    equipment:normalizedList(p.equipment,Object.keys(EQUIPMENT_LABELS)),
    trainingExperience:TRAINING_EXPERIENCE_LABELS[p.trainingExperience]?p.trainingExperience:"beginner",
    trainingPriority,
    preferredTrainingTime:TRAINING_TIME_LABELS[p.preferredTrainingTime]?p.preferredTrainingTime:"flexible",
    injuries:String(p.injuries||"").trim(),
    limitations:String(p.limitations||p.trainNote||"").trim(),
    avoidMovements:String(p.avoidMovements||"").trim(),
    mealCount,
    mealTimes:normalizedMealTimes(p.mealTimes,mealCount),
    eatingWindowStart:validTime(p.eatingWindowStart)?p.eatingWindowStart:defaultMealTimes(mealCount)[0],
    eatingWindowEnd:validTime(p.eatingWindowEnd)?p.eatingWindowEnd:defaultMealTimes(mealCount).slice(-1)[0],
    mainMealIndex:Math.min(mealCount,Math.max(1,Number.parseInt(p.mainMealIndex,10)||Math.min(2,mealCount))),
    cookingMinutes:Math.min(180,Math.max(5,Number.parseInt(p.cookingMinutes,10)||30)),
    foodBudget:FOOD_BUDGET_LABELS[p.foodBudget]?p.foodBudget:"medium",
    repeatPreference:REPEAT_LABELS[p.repeatPreference]?p.repeatPreference:"moderate",
    preferredCuisines:normalizedList(p.preferredCuisines,Object.keys(CUISINE_LABELS)),
    preferredPreparations:normalizedList(p.preferredPreparations,Object.keys(PREPARATION_LABELS)),
    preferredIngredients:String(p.preferredIngredients||"").trim(),
    foodNotes:String(p.foodNotes||p.foodNote||"").trim(),
    allergies,
    dislikedIngredients,
  };
  if(!prefs.equipment.length)prefs.equipment=equipmentDefault;
  prefs.avoid=[prefs.allergies,prefs.dislikedIngredients].filter(Boolean).join(", ");
  prefs.trainPlace=strength==="bodyweight"?"casa":"gym";
  prefs.trainNote=[prefs.injuries,prefs.limitations,prefs.avoidMovements].filter(Boolean).join(". ");
  return prefs;
}
function trainingPrefsFromPrefs(source){
  const p=migrateProfilePrefs(source||{});
  return {
    primary:p.primarySport,
    strength:p.strengthMode,
    days:p.trainingDays.length,
    dayIds:[...(p.trainingDays||[])],
    locations:{...(p.trainingLocations||{})},
    sessionMinutes:p.sessionMinutes,
    equipment:[...(p.equipment||[])],
    experience:p.trainingExperience,
    priority:p.trainingPriority,
    preferredTime:p.preferredTrainingTime,

function workoutSchedule(days,dayIds,priority,locations,primary){
  const selected=normalizedTrainingDays(dayIds,days);
  const sessions=baseWorkoutTemplate(selected.length,priority);
  const sportIds=new Set(["calidad","facil","tecnica"]);
  const remaining=sessions.slice();
  const assigned={};
  selected.forEach(day=>{
    const location=locations&&locations[day];
    const prefersSport=(primary==="swimming"&&location==="pool")||(primary!=="swimming"&&location==="outdoor");
    const index=remaining.findIndex(id=>sportIds.has(id)===prefersSport);
    assigned[day]=remaining.splice(index>=0?index:0,1)[0];
  });
  return assigned;
}

function strengthProgression(ds,prefs){
  const ctx=prefs?migrateProfilePrefs(prefs):planPrefsForDate(ds);
  const n=trainingWeek(ds,ctx);
  const duration=resolvedPlanDuration(ctx);
  if(duration===4){
    if(n===1)return "Base: 3 series por ejercicio, deja 3 repeticiones en reserva.";
    if(n<=3)return "Progresión: sube carga o repeticiones con buena técnica y deja 1-2 repeticiones en reserva.";
    return "Consolidación: reduce el volumen, conserva intensidad y registra tus mejores series técnicas.";
  }
  if(n<=2)return "Base: 3 series por ejercicio, deja 3 repeticiones en reserva.";
  if(n<=5)return "Progresión: 4 series principales, sube carga o repeticiones con buena técnica.";
  if(n===6)return "Descarga: 2 series por ejercicio al 60-70% del esfuerzo habitual.";
  if(n<=9)return "Bloque fuerte: 4 series principales, deja 1-2 repeticiones en reserva.";

function effectiveWorkout(ds,prefs){
  if(trainingSafetyHold()&&ds>=todayStr()){
    const hold=safetyHoldWorkout();
    return {id:hold.id,workout:hold,plannedId:hold.id,planned:hold,overridden:false};
  }
  const resolvedPrefs=prefs||planPrefsForDate(ds);
  const generated=!prefs?generatedWorkoutForDate(ds):null;
  const planned=generated||workoutById(ds,plannedWorkoutId(ds,resolvedPrefs),resolvedPrefs);
  const plannedId=planned&&planned.id?planned.id:"descanso";
  const st=S.days[ds];
  const ovrId=st&&st.workoutOverride;
  const valid=ovrId&&workoutById(ds,ovrId,resolvedPrefs);
  const id=valid?ovrId:plannedId;
  return {id,workout:valid||planned,plannedId,planned,overridden:!!(valid&&ovrId!==plannedId)};
}

// metas y macros por slot según tipo de día
const ACTIVITY_LEVELS={
  light:{label:"Ligera",description:"Trabajo sedentario y caminatas ocasionales",factor:1.35},
  moderate:{label:"Moderada",description:"Vida activa además de los entrenamientos",factor:1.55},
  high:{label:"Alta",description:"Trabajo físico o actividad diaria intensa",factor:1.725},
};
const PROFILE_REVIEW_DAYS=28;
const PROFILE_REVIEW_MS=PROFILE_REVIEW_DAYS*24*60*60*1000;
function calculateMacroTargets(input){
  const kg=Number(input.weightKg),cm=Number(input.heightCm),age=Number(input.age);
  const bf=Number(input.bodyFatPct);
  const activity=ACTIVITY_LEVELS[input.activityLevel]||ACTIVITY_LEVELS.moderate;
  const hasBf=Number.isFinite(bf)&&bf>=3&&bf<=60;
  const leanKg=hasBf?kg*(1-bf/100):null;
  const bmr=hasBf
    ?370+21.6*leanKg
    :10*kg+6.25*cm-5*age+(input.sex==="female"?-161:5);
  const maintenance=Math.round(bmr*activity.factor/10)*10;
  const goalFactor=input.goal==="volumen"?1.1:input.goal==="mantenimiento"?1:.85;
  const kcal=Math.round(maintenance*goalFactor/10)*10;
  const proteinRate=input.goal==="deficit"?2:1.8;
  const p=Math.round((hasBf?Math.max(leanKg*2.2,kg*1.6):kg*proteinRate));
  const f=Math.round(Math.max(45,kg*.8));
  const c=Math.max(50,Math.round((kcal-p*4-f*9)/4));
  return {kcal,p,c,f,maintenance,bmr:Math.round(bmr),method:hasBf?"Katch-McArdle":"Mifflin-St Jeor"};
}
function profileMacroTargets(){
  const p=(profile&&profile.prefs)||{};

function ymd(d){return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}
function parseYmd(s){const[y,m,d]=s.split("-").map(Number);return new Date(y,m-1,d);}
function addDays(s,n){const d=parseYmd(s);d.setDate(d.getDate()+n);return ymd(d);}

const DOW=["Domingo","Lunes","Martes","Miércoles","Jueves","Viernes","Sábado"];
const MON=["ene","feb","mar","abr","may","jun","jul","ago","sep","oct","nov","dic"];

function buildCycleWeeks(start,duration){
  return CYCLE_MENUS.slice(0,duration).map((menu,i)=>({
    label:"S"+(i+1),

    end:addDays(start,i*7+6),

function weekdayInWeek(week,weekday){
  for(let i=0;i<7;i++){const ds=addDays(week.start,i);if(parseYmd(ds).getDay()===weekday)return ds;}
  return week.end;
}
function buildWeightRanges(prefs){
  const p=prefs||{};
  const startWeight=Number(p.cycleStartWeight||p.weightKg);
  if(!Number.isFinite(startWeight)||startWeight<=0)return Object.fromEntries(Array.from({length:PLAN_DURATION_WEEKS},(_,i)=>[i+1,"—"]));
  const rate=p.goal==="deficit"?-.004:p.goal==="volumen"?.002:0;
  const ranges={};
  for(let week=1;week<=PLAN_DURATION_WEEKS;week++){
    const center=startWeight*Math.pow(1+rate,week-1);
    ranges[week]=`${(center-.3).toFixed(1)}–${(center+.3).toFixed(1)}`;
  }
  return ranges;
}
function hashText(text){
  let h=2166136261;
  for(let i=0;i<text.length;i++){
    h^=text.charCodeAt(i);
    h=Math.imul(h,16777619);
  }
  return ("00000000"+(h>>>0).toString(16)).slice(-8);
}

  if(Array.isArray(value))return `[${value.map(stableJson).join(",")}]`;
  if(value&&typeof value==="object")return `{${Object.keys(value).sort().map(key=>`${JSON.stringify(key)}:${stableJson(value[key])}`).join(",")}}`;
  return JSON.stringify(value);
}

function planVersionForDate(ds){
  if(!validYmd(ds)||!Array.isArray(PLAN_VERSIONS)||!PLAN_VERSIONS.length)return null;
  const storedId=S&&S.days&&S.days[ds]&&S.days[ds].planVersionId;
  const stored=storedId&&PLAN_VERSIONS.find(version=>String(version.id)===String(storedId));
  if(stored)return stored;
  const matches=PLAN_VERSIONS.filter(v=>validYmd(v.valid_from)&&ds>=v.valid_from&&(!validYmd(v.valid_to)||ds<=v.valid_to));
  const pool=matches;
  if(!pool.length)return null;
  const rank=status=>status==="active"?3:status==="draft"?2:status==="completed"?1:0;
  return pool.slice().sort((a,b)=>
    (b.valid_from||"").localeCompare(a.valid_from||"")||
    rank(b.status)-rank(a.status)||
    (Number(b.version_number)||0)-(Number(a.version_number)||0)||
    (b.updated_at||b.created_at||"").localeCompare(a.updated_at||a.created_at||"")
  )[0]||null;
}

}

function paceClass(consumed,target,isToday){
  const pct=target?consumed/target:0;
  if(pct>=1)return"fill-good";
  if(!isToday)return pct>=0.7?"fill-warn":"fill-bad";
  const now=new Date();const h=now.getHours()+now.getMinutes()/60;
  const expected=Math.min(1,Math.max(0,(h-7)/(21-7)));
  if(pct>=expected-0.1)return"fill-good";
  if(pct>=expected-0.3)return"fill-warn";
  return"fill-bad";
}

function cycleSummary(){
  let ds=START,activeDays=0,bestStreak=0,currentStreak=0,workouts=0,partialWorkouts=0,doneMeals=0,plannedMeals=0;
  while(ds<=END){
    const st=S.days[ds]||{};

    const mealStates=st.meals||{};
    const dayMeals=day.meals.reduce((n,m)=>n+(mealStates[m.id]&&mealStates[m.id].done?1:0),0);
    const workoutOutcome=workoutOutcomeForState(st);
    const dayActive=dayMeals>0||workoutHasRecordedActivity(st)||(Array.isArray(st.extras)&&st.extras.some(x=>x&&x.done));
    plannedMeals+=day.meals.length;doneMeals+=dayMeals;

    if(workoutOutcome==="partial")partialWorkouts++;
    if(dayActive){activeDays++;currentStreak++;bestStreak=Math.max(bestStreak,currentStreak);}else currentStreak=0;
    ds=addDays(ds,1);
  }
  const weighted=Object.keys(WEIGHT_RANGES).map(Number).filter(n=>wkg(n)!=null).sort((a,b)=>a-b);

  const endWeight=lastWeek!=null?wkg(lastWeek):null,endBf=lastWeek!=null?wbf(lastWeek):null;

    mealAdherence:plannedMeals?Math.round(doneMeals/plannedMeals*100):0,

async function loadPrivacyState(){
  privacyReady=false;privacyError="";consentRecords=[];safetyScreening=null;
  if(!supa||!uid()){privacyReady=true;return false;}
  try{
    const [consents,screening]=await Promise.all([
      supa.from("user_consents").select("*").eq("user_id",uid()).eq("policy_version",CONSENT_POLICY_VERSION),
      supa.from("safety_screenings").select("*").eq("user_id",uid()).eq("screening_version",SAFETY_SCREENING_VERSION).maybeSingle(),
    ]);
    if(consents.error)throw consents.error;
    if(screening.error)throw screening.error;
    consentRecords=consents.data||[];
    safetyScreening=screening.data||null;
    return true;
  }catch(e){
    privacyError=privacyApiMessage(e);
    return false;
  }finally{privacyReady=true;}
}

async function savePrivacyChoices(source,origin){
  if(!supa||!uid())return{error:{message:"Sin sesión"}};
  const choices=privacyChoicesFrom(source||{});
  if(!source.consentCore)return{error:{message:"Acepta el uso esencial de datos para personalizar tu plan"}};
  const age=Number(source.age!=null?source.age:(profile&&profile.prefs&&profile.prefs.age));
  if(age<MINIMUM_AGE)return{error:{message:`Debes tener al menos ${MINIMUM_AGE} años`}};
  const responses=Object.fromEntries(SAFETY_QUESTIONS.map(([key])=>[key,source.safetyResponses&&source.safetyResponses[key]==="yes"]));
  if(SAFETY_QUESTIONS.some(([key])=>!["yes","no"].includes(source.safetyResponses&&source.safetyResponses[key])))return{error:{message:"Cuestionario de seguridad incompleto"}};
  const now=new Date().toISOString();
  const rows=Object.entries(choices).map(([type,accepted])=>({
    user_id:uid(),
    consent_type:type,
    policy_version:CONSENT_POLICY_VERSION,
    status:accepted?"accepted":"withdrawn",
    accepted_at:accepted?now:null,
    withdrawn_at:accepted?null:now,
    source:origin||"app",
    metadata:{legal_review_required:true},
    updated_at:now,
  }));
  const hasRedFlags=Object.values(responses).some(Boolean);
  const [consents,screening]=await Promise.all([
    supa.from("user_consents").upsert(rows,{onConflict:"user_id,consent_type,policy_version"}),
    supa.from("safety_screenings").upsert({
      user_id:uid(),
      screening_version:SAFETY_SCREENING_VERSION,
      age_confirmed:true,
      responses,
      has_red_flags:hasRedFlags,
      cleared_for_training:!hasRedFlags,
      completed_at:now,
      updated_at:now,
    },{onConflict:"user_id,screening_version"}),
  ]);
  if(consents.error)return{error:consents.error};
  if(screening.error)return{error:screening.error};
  await loadPrivacyState();
  return{error:null};
}

function timeMinutes(value){
  if(!validTime(value))return null;
  const [hours,minutes]=value.split(":").map(Number);

function validateTrainingProfile(d){
  if(!SPORT_LABELS[d.primarySport]||!STRENGTH_LABELS[d.strengthMode]||!validPlanDuration(d.planDurationWeeks))return "Completa la base de tu plan de entrenamiento";
  if(!validTrainingDays((d.trainingDays||[]).length))return `Elige entre ${MIN_TRAINING_DAYS} y ${MAX_TRAINING_DAYS} días exactos para entrenar`;
  if(d.trainingDays.some(day=>!TRAINING_LOCATION_LABELS[d.trainingLocations&&d.trainingLocations[day]]))return "Elige el lugar de entrenamiento para cada día disponible";
  if(d.primarySport==="swimming"){
    const poolDays=d.trainingDays.filter(day=>d.trainingLocations[day]==="pool").length;
    const swimSessions=baseWorkoutTemplate(d.trainingDays.length,d.trainingPriority).filter(id=>["calidad","facil","tecnica"].includes(id)).length;
    if(poolDays<swimSessions)return `Con esta prioridad necesitas acceso a piscina ${swimSessions} ${swimSessions===1?"día":"días"} por semana`;
  }
  if(!Number.isFinite(d.sessionMinutes)||d.sessionMinutes<20||d.sessionMinutes>180)return "Los minutos por sesión deben estar entre 20 y 180";
  if(!TRAINING_EXPERIENCE_LABELS[d.trainingExperience]||!TRAINING_PRIORITY_LABELS[d.trainingPriority]||!TRAINING_TIME_LABELS[d.preferredTrainingTime])return "Completa tu experiencia, prioridad y horario";
  if(!Array.isArray(d.equipment)||!d.equipment.length)return "Selecciona al menos un recurso o equipo disponible";
  return "";
}
function validateFoodSchedule(d){
  if(!Number.isInteger(d.mealCount)||d.mealCount<2||d.mealCount>6)return "Elige entre 2 y 6 comidas al día";
  if(!Array.isArray(d.mealTimes)||d.mealTimes.length!==d.mealCount||d.mealTimes.some(time=>!validTime(time)))return "Completa un horario aproximado para cada comida";
  const start=timeMinutes(d.eatingWindowStart),end=timeMinutes(d.eatingWindowEnd);
  if(start==null||end==null||end<=start)return "La ventana de alimentación debe terminar después de comenzar";
  const times=d.mealTimes.map(timeMinutes);
  if(times.some(time=>time<start||time>end))return "Los horarios de comida deben quedar dentro de tu ventana de alimentación";
  if(times.some((time,index)=>index>0&&time<=times[index-1]))return "Ordena los horarios de comida de más temprano a más tarde";
  if(d.mainMealIndex<1||d.mainMealIndex>d.mealCount)return "Elige tu comida principal";
  if(!Number.isFinite(d.cookingMinutes)||d.cookingMinutes<5||d.cookingMinutes>180)return "El tiempo para cocinar debe estar entre 5 y 180 minutos";
  if(!FOOD_BUDGET_LABELS[d.foodBudget]||!REPEAT_LABELS[d.repeatPreference])return "Completa presupuesto y frecuencia de repetición";
  return "";
}
function validateFoodPreferences(d){
  if(!Array.isArray(d.diet)||!d.diet.length)return "Elige al menos un patrón de alimentación";
  if(d.diet.includes("omnivoro")&&(d.diet.includes("vegetariano")||d.diet.includes("vegano")))return "Omnívoro no puede combinarse con vegetariano o vegano";
  return "";
}

function readOnboardingStep(){
  const d=onboardingDraft;
  if(onboardingStep===1){
    d.name=$("#ob_name").value.trim();d.sex=$("#ob_sex").value;d.age=+$("#ob_age").value;
    d.heightCm=+$("#ob_height").value;d.weightKg=+$("#ob_weight").value;
    d.bodyFatPct=$("#ob_bf").value?+$("#ob_bf").value:"";d.activityLevel=$("#ob_activity").value;
  }else if(onboardingStep===2){
    d.goal=$("#ob_goal").value;d.calorieTarget=+$("#ob_kcal").value;d.proteinTarget=+$("#ob_protein").value;
    d.carbTarget=+$("#ob_carbs").value;d.fatTarget=+$("#ob_fat").value;
  }else if(onboardingStep===3){
    readTrainingFields("ob",d);
  }else if(onboardingStep===4){
    readFoodScheduleFields("ob",d);
  }else{
    d.diet=["vegetariano","vegano","sin_huevo","sin_lacteos","sin_gluten","omnivoro"].filter(v=>$("#ob_diet_"+v).checked);
    d.preferredCuisines=checkedValues("ob_cuisine",CUISINE_LABELS);
    d.preferredPreparations=checkedValues("ob_preparation",PREPARATION_LABELS);
    d.preferredIngredients=$("#ob_preferred_ingredients").value.trim();
    d.foodNotes=$("#ob_food_notes").value.trim();
    d.allergies=$("#ob_allergies").value.trim();
    d.dislikedIngredients=$("#ob_disliked").value.trim();
    d.consentCore=$("#ob_consent_core").checked;
    d.consentPhotos=$("#ob_consent_photos").checked;
    d.safetyResponses=Object.fromEntries(SAFETY_QUESTIONS.map(([key])=>[key,$("#ob_safety_"+key).value]));
  }
}
function validateOnboardingStep(){
  const d=onboardingDraft;
  if(onboardingStep===1){
    if(!d.name)return "Escribe tu nombre";
    if(!["male","female"].includes(d.sex))return "Selecciona el sexo usado para el cálculo";
    if(d.age<MINIMUM_AGE||d.age>90)return `Debes tener entre ${MINIMUM_AGE} y 90 años`;
    if(d.heightCm<130||d.heightCm>230)return "Revisa tu estatura";
    if(d.weightKg<35||d.weightKg>250)return "Revisa tu peso";
    if(d.bodyFatPct!==""&&(d.bodyFatPct<3||d.bodyFatPct>60))return "El porcentaje de grasa debe estar entre 3% y 60%";
  }
  if(onboardingStep===2&&[d.calorieTarget,d.proteinTarget,d.carbTarget,d.fatTarget].some(v=>!Number.isFinite(v)||v<=0))return "Completa las cuatro metas de nutrición";
  if(onboardingStep===3)return validateTrainingProfile(d);
  if(onboardingStep===4)return validateFoodSchedule(d);
  if(onboardingStep===5){
    const foodError=validateFoodPreferences(d);
    if(foodError)return foodError;
    if(d.age<MINIMUM_AGE)return `Debes tener al menos ${MINIMUM_AGE} años`;
    if(!d.consentCore)return "Acepta el uso esencial de datos para crear tu plan";
    if(SAFETY_QUESTIONS.some(([key])=>!["yes","no"].includes(d.safetyResponses&&d.safetyResponses[key])))return "Responde las cuatro preguntas de seguridad";
  }
  return "";
}
function applyCalculatedMacros(){
  const result=calculateMacroTargets(onboardingDraft);
  onboardingDraft.calorieTarget=result.kcal;onboardingDraft.proteinTarget=result.p;
  onboardingDraft.carbTarget=result.c;onboardingDraft.fatTarget=result.f;
  onboardingDraft.maintenanceCalories=result.maintenance;onboardingDraft.macroMethod=result.method;
}
function onboardingNext(){
  readOnboardingStep();
  const error=validateOnboardingStep();
  if(error){toast(error);return;}
  if(onboardingStep===1)applyCalculatedMacros();
  onboardingStep=Math.min(5,onboardingStep+1);
  renderOnboarding();window.scrollTo(0,0);
}
function onboardingBack(){readOnboardingStep();onboardingStep=Math.max(1,onboardingStep-1);renderOnboarding();window.scrollTo(0,0);}
function onboardingGoalChanged(goal){onboardingDraft.goal=goal;applyCalculatedMacros();renderOnboarding();}
function recalculateOnboarding(){readOnboardingStep();applyCalculatedMacros();renderOnboarding();toast("Metas recalculadas");}
function updateOnboardingTrainingSummary(){
  const out=$("#obTrainingSummary"),sport=$("#ob_sport"),duration=$("#ob_duration"),priority=$("#ob_priority");
  if(!out||!sport||!duration||!priority)return;
  const dayIds=WEEKDAY_OPTIONS.filter(day=>{const el=$("#ob_day_"+day.value);return el&&el.checked;}).map(day=>day.value);
  const labels=dayIds.map(day=>WEEKDAY_OPTIONS.find(option=>option.value===day).short).join(", ");
  const impact=dayIds.length<MIN_TRAINING_DAYS
    ?`Elige al menos ${MIN_TRAINING_DAYS} días para combinar fuerza y ${SPORT_LABELS[sport.value]||"tu disciplina"}.`
    :trainingPlanSummary(dayIds.length,sport.value,priority.value);
  out.innerHTML=`<b>${duration.value} semanas · ${dayIds.length} días${labels?" ("+labels+")":""}.</b> ${impact}`;

function toggleTrainingDay(prefix,day){
  const checkbox=$("#"+prefix+"_day_"+day),location=$("#"+prefix+"_location_"+day);
  if(location)location.disabled=!(checkbox&&checkbox.checked);
  if(prefix==="ob")updateOnboardingTrainingSummary();else updateTrainingSummary();

function updateOnboardingMealCount(value){
  const previousCount=onboardingDraft.mealCount;
  onboardingDraft.mealTimes=Array.from({length:previousCount},(_,index)=>{
    const input=$("#ob_meal_time_"+index);
    return input&&validTime(input.value)?input.value:onboardingDraft.mealTimes[index];
  });
  onboardingDraft.eatingWindowStart=$("#ob_window_start").value;
  onboardingDraft.eatingWindowEnd=$("#ob_window_end").value;
  onboardingDraft.mainMealIndex=+$("#ob_main_meal").value;
  onboardingDraft.cookingMinutes=+$("#ob_cooking").value;
  onboardingDraft.foodBudget=$("#ob_budget").value;
  onboardingDraft.repeatPreference=$("#ob_repeat").value;
  const count=Math.min(6,Math.max(2,+value||4));
  onboardingDraft.mealCount=count;
  onboardingDraft.mealTimes=defaultMealTimes(count);
  onboardingDraft.mainMealIndex=Math.min(count,onboardingDraft.mainMealIndex||2);
  renderOnboarding();
}
function updateOnboardingActivity(value){
  const out=$("#obActivityDescription"),activity=ACTIVITY_LEVELS[value];

  if(error){toast(error);return;}

  const newCycle=!!previous.onboardingPending;

  const durationChanged=duration!==resolvedPlanDuration(previous);
  let planStartDate=previous.planStartDate,planEndDate=previous.planEndDate;
  let planCycleNumber=Math.max(1,Number.parseInt(previous.planCycleNumber,10)||1);
  if(newCycle){
    planCycleNumber+=1;
    planStartDate=todayStr()>END?todayStr():addDays(END,1);
    planEndDate=planEndFor(planStartDate,duration);
  }else if(firstCycle&&!validYmd(planStartDate)){
    planStartDate=todayStr();
    planEndDate=planEndFor(planStartDate,duration);
  }else if(validYmd(planStartDate)){
    planEndDate=planEndFor(planStartDate,duration);
  }else{
    planStartDate=START;
    planEndDate=planEndFor(planStartDate,duration);
  }
  const calendarChanged=durationChanged||previous.planStartDate!==planStartDate||previous.planEndDate!==planEndDate;
  const prefs={...previous,
    profileSchemaVersion:PROFILE_SCHEMA_VERSION,
    name:d.name,sex:d.sex,age:d.age,heightCm:d.heightCm,weightKg:d.weightKg,
    bodyFatPct:d.bodyFatPct===""?null:d.bodyFatPct,activityLevel:d.activityLevel,goal:d.goal,
    calorieTarget:d.calorieTarget,proteinTarget:d.proteinTarget,carbTarget:d.carbTarget,fatTarget:d.fatTarget,
    maintenanceCalories:d.maintenanceCalories,macroMethod:d.macroMethod,
    challenge:d.challenge||previous.pendingChallenge||previous.challenge||(d.goal==="mantenimiento"?"maintain":d.goal==="volumen"?"strength":"continue"),
    primarySport:d.primarySport,strengthMode:d.strengthMode,trainType:d.primarySport,
    trainDays:d.trainingDays.length,trainingDays:d.trainingDays,trainingLocations:d.trainingLocations,
    sessionMinutes:d.sessionMinutes,equipment:d.equipment,trainingExperience:d.trainingExperience,
    trainingPriority:d.trainingPriority,preferredTrainingTime:d.preferredTrainingTime,
    injuries:d.injuries,limitations:d.limitations,avoidMovements:d.avoidMovements,
    trainPlace:d.strengthMode==="bodyweight"?"casa":"gym",
    trainNote:[d.injuries,d.limitations,d.avoidMovements].filter(Boolean).join(". "),
    diet:d.diet,mealCount:d.mealCount,mealTimes:d.mealTimes,
    eatingWindowStart:d.eatingWindowStart,eatingWindowEnd:d.eatingWindowEnd,mainMealIndex:d.mainMealIndex,
    cookingMinutes:d.cookingMinutes,foodBudget:d.foodBudget,repeatPreference:d.repeatPreference,
    preferredCuisines:d.preferredCuisines,preferredPreparations:d.preferredPreparations,
    preferredIngredients:d.preferredIngredients,foodNotes:d.foodNotes,
    allergies:d.allergies,dislikedIngredients:d.dislikedIngredients,
    avoid:[d.allergies,d.dislikedIngredients].filter(Boolean).join(", "),
    planCycleNumber,planStartDate,planEndDate,planDurationWeeks:duration,
    cycleStartWeight:d.weightKg,cycleStartBodyFat:d.bodyFatPct===""?null:d.bodyFatPct,
    onboardingPending:false,pendingChallenge:null,
    onboardingCompletedAt:previous.onboardingCompletedAt||now,onboardingReviewedAt:now,cycleStartedAt:now,
  };
  const result=await saveProfilePrefs(prefs,{
    source:newCycle?"new_cycle":"onboarding",
    reason:newCycle?"Nuevo ciclo tras el recap":"Onboarding inicial",
    validFrom:planStartDate,
    validTo:planEndDate,

  });
  if(result&&result.error){toast("No se pudo guardar: "+result.error.message);return;}

  onboardingActive=false;onboardingDraft=null;reviewPromptShown=true;
  view="hoy";current=clampDate(todayStr());render();window.scrollTo(0,0);toast("Tu plan quedó actualizado");
}

}
async function keepCurrentProfile(){

// Anillo de progreso SVG (Ring). pct 0..1, centerHtml va en el centro.
function ring(pct,centerHtml,opt){
  opt=opt||{};
  const size=opt.size||128, stroke=opt.stroke||12, color=opt.color||"var(--accent2)", track=opt.track||"var(--surf3)";
  const r=(size-stroke)/2, c=2*Math.PI*r;
  const p=Math.min(Math.max(pct||0,0),1), off=c*(1-p);
  return `<div class="ring" style="width:${size}px;height:${size}px">
    <svg width="${size}" height="${size}" style="transform:rotate(-90deg)">
      <circle cx="${size/2}" cy="${size/2}" r="${r.toFixed(1)}" fill="none" stroke="${track}" stroke-width="${stroke}"/>
      <circle cx="${size/2}" cy="${size/2}" r="${r.toFixed(1)}" fill="none" stroke="${color}" stroke-width="${stroke}" stroke-linecap="round" stroke-dasharray="${c.toFixed(1)}" stroke-dashoffset="${off.toFixed(1)}" style="transition:stroke-dashoffset .6s cubic-bezier(.4,0,.2,1)"/>
    </svg>
    <div class="ring-center">${centerHtml}</div>
  </div>`;
}
// Medidor de macro (etiqueta + valor/meta + barra). fillClass: clase .fill-*
function macroMeter(label,v,g,fillClass){
  return `<div class="mm">
    <div class="mm-top"><span class="mm-lab">${label}</span><span class="mm-num">${v}/${g} g</span></div>
    <div class="bar"><i class="${fillClass}" style="width:${pctW(v,g)}%"></i></div>
  </div>`;
}
// Cabecera de pantalla (eyebrow + título Syne + chip de ícono a la derecha)
function screenHeader(title,sub,icon){
  return `<header class="shead">
    <div>${sub?`<div class="shead-sub">${sub}</div>`:""}<h2>${esc(title)}</h2></div>
    ${icon?`<div class="shead-ic">${tabIcon(icon)}</div>`:""}
  </header>`;
}

let deferredInstallPrompt=null;
function isStandaloneMode(){return (window.matchMedia&&window.matchMedia('(display-mode: standalone)').matches)||window.navigator.standalone===true;}

  const show=inApp&&isMobileDevice()&&!isStandaloneMode()&&!installDismissed();

  const ios=isIOSDevice(), canPrompt=!!deferredInstallPrompt;

    : canPrompt

      : 'Abre el menú de tu navegador y elige <b>“Instalar app”</b> o <b>“Añadir a pantalla de inicio”</b>.';

/* ---------- Reproductor guiado de entrenamiento (REQ-16) ---------- */
function workoutPrescription(ds){
  const ew=effectiveWorkout(ds);
  const exercises=exerciseArray(ew.workout&&ew.workout.exerciseIds).map(slug=>exerciseBySlug(slug,true)).filter(Boolean);
  const prefs=trainingPrefsFromPrefs(planPrefsForDate(ds));
  return WORKOUT_PLAYER.buildPrescription({
    workout:ew.workout,
    exercises,
    context:{
      week:trainingWeek(ds,planPrefsForDate(ds)),
      durationWeeks:resolvedPlanDuration(planPrefsForDate(ds)),
      sessionMinutes:prefs.sessionMinutes,
    },
  });
}
function workoutContentIssues(ds){
  const workout=effectiveWorkout(ds).workout;
  return exerciseArray(workout&&workout.exerciseIds).filter(slug=>!exerciseBySlug(slug));
}
function normalizedWorkoutExecution(ds){
  const st=dayState(ds);
  const saved=st.workoutExecution;
  if(!saved)return null;
  const normalized=WORKOUT_PLAYER.normalizeExecution(saved,workoutPrescription(ds),Date.now());
  if(!normalized)return null;
  st.workoutExecution=normalized;
  return normalized;
}
function workoutOutcomeForState(st){
  const execution=st&&st.workoutExecution;
  if(execution){
    const outcome=WORKOUT_PLAYER.outcome(execution);
    if(outcome!=="pending")return outcome;
  }
  return st&&st.workoutDone?"completed":"pending";
}
function workoutOutcomeForDay(ds){return workoutOutcomeForState(S.days[ds]||{});}
function workoutHasRecordedActivity(st){
  const outcome=workoutOutcomeForState(st);
  if(outcome==="completed"||outcome==="partial")return true;
  const execution=st&&st.workoutExecution;
  if(!execution||!Array.isArray(execution.steps))return false;
  return execution.steps.some(step=>step.status==="done"||step.status==="skipped"||(Array.isArray(step.sets)&&step.sets.some(set=>set&&set.done)));
}
function workoutStatusLabel(outcome){
  return {
    completed:"Completado",
    partial:"Parcial",
    paused:"Pausado",
    in_progress:"En curso",
    pending:"Pendiente",
  }[outcome]||"Pendiente";
}
function workoutStatusHtml(ds,execution){
  const outcome=execution?WORKOUT_PLAYER.outcome(execution):workoutOutcomeForDay(ds);
  const progress=execution?WORKOUT_PLAYER.progress(execution):null;
  const detail=progress&&outcome!=="completed"&&outcome!=="partial"?` · ${progress.completed}/${progress.total} bloques`:"";
  return `<span class="player-status ${outcome}"><i></i>${workoutStatusLabel(outcome)}${detail}</span>`;
}
function formatWorkoutTime(seconds){
  const total=Math.max(0,Math.round(Number(seconds)||0));
  const hours=Math.floor(total/3600),minutes=Math.floor((total%3600)/60),secs=total%60;
  return hours?`${String(hours).padStart(2,"0")}:${String(minutes).padStart(2,"0")}:${String(secs).padStart(2,"0")}`:`${String(minutes).padStart(2,"0")}:${String(secs).padStart(2,"0")}`;
}
function workoutPhaseLabel(phase){
  return {warmup:"Calentamiento",main:"Bloque principal",recovery:"Recuperación",cooldown:"Vuelta a la calma"}[phase]||"Sesión";
}
function workoutVariationLabel(step,exercise){
  if(step.variation==="regression")return exercise&&exercise.regression?`Versión más fácil: ${exercise.regression}`:"Versión más fácil";
  if(step.variation==="progression")return exercise&&exercise.progression?`Progresión: ${exercise.progression}`:"Progresión";
  if(step.exerciseSlug!==step.originalExerciseSlug)return "Ejercicio sustituido conservando series y objetivo";
  return "";
}
function currentWorkoutStep(execution){
  if(!execution||!execution.steps.length)return null;
  return execution.steps[Math.min(execution.steps.length-1,Math.max(0,execution.currentStep||0))]||null;
}
function nextWorkoutStepIndex(execution,from){
  for(let index=Math.max(0,Number(from)||0);index<execution.steps.length;index++){
    if(execution.steps[index].status==="pending")return index;
  }
  for(let index=0;index<Math.max(0,Number(from)||0);index++){
    if(execution.steps[index].status==="pending")return index;
  }
  return -1;
}
function captureWorkoutElapsed(execution){
  execution.elapsedSeconds=WORKOUT_PLAYER.elapsedSeconds(execution,Date.now());
  execution.resumedAt=null;
}
function persistWorkoutExecution(ds,execution,rerender){
  const st=dayState(ds);
  execution.updatedAt=new Date().toISOString();
  st.workoutExecution=execution;
  st.workoutDone=execution.status==="completed";
  commitDay(ds);
  if(rerender!==false)render();
}
function startWorkoutExecution(ds){
  if(trainingSafetyHold()){toast("El entrenamiento está pausado por seguridad");return;}
  const prescription=workoutPrescription(ds);
  if(prescription.sessionType==="rest"){toast("Hoy corresponde descanso planificado");return;}
  if(workoutContentIssues(ds).length){toast("Esta sesión necesita actualizar su contenido antes de iniciarse");return;}
  const st=dayState(ds);
  if(st.workoutDone&&!st.workoutExecution){toast("Este día ya figura como completado en el historial anterior");return;}
  if(st.workoutExecution){toast("Este día ya tiene una sesión registrada");return;}
  st.workoutExecution=WORKOUT_PLAYER.createExecution(prescription,Date.now());
  st.workoutDone=false;
  commitDay(ds);render();toast("Sesión iniciada");
}
function pauseResumeWorkoutExecution(ds){
  const execution=normalizedWorkoutExecution(ds);if(!execution)return;
  if(execution.status==="in_progress"){
    captureWorkoutElapsed(execution);
    execution.status="paused";
    if(execution.timer){
      execution.timer.remainingSeconds=WORKOUT_PLAYER.timerRemaining(execution.timer,Date.now());
      execution.timer.running=false;execution.timer.endsAt=null;
    }
  }else if(execution.status==="paused"){
    execution.status="in_progress";execution.resumedAt=new Date().toISOString();
    if(execution.timer&&execution.timer.remainingSeconds>0){
      execution.timer.running=true;
      execution.timer.endsAt=new Date(Date.now()+execution.timer.remainingSeconds*1000).toISOString();
    }
  }else return;
  persistWorkoutExecution(ds,execution,true);
}
function startWorkoutTimer(ds,seconds,kind){
  const execution=normalizedWorkoutExecution(ds);if(!execution||execution.status!=="in_progress")return;
  const step=currentWorkoutStep(execution);
  const total=Math.max(1,Math.round(Number(seconds)||0));
  execution.timer={
    kind:kind||"step",
    stepId:step&&step.id||null,
    totalSeconds:total,
    remainingSeconds:total,
    running:true,
    endsAt:new Date(Date.now()+total*1000).toISOString(),
  };
  persistWorkoutExecution(ds,execution,true);
}
function startCurrentWorkoutStep(ds){
  const execution=normalizedWorkoutExecution(ds);if(!execution||execution.status!=="in_progress")return;
  const step=currentWorkoutStep(execution);
  if(!step||step.type!=="timed")return;
  startWorkoutTimer(ds,step.durationSeconds,"step");
}
function toggleWorkoutTimer(ds){
  const execution=normalizedWorkoutExecution(ds);if(!execution||!execution.timer)return;
  const remaining=WORKOUT_PLAYER.timerRemaining(execution.timer,Date.now());
  execution.timer.remainingSeconds=remaining;
  execution.timer.running=!execution.timer.running&&remaining>0;
  execution.timer.endsAt=execution.timer.running?new Date(Date.now()+remaining*1000).toISOString():null;
  persistWorkoutExecution(ds,execution,true);
}
function addWorkoutTimer(ds,seconds){
  const execution=normalizedWorkoutExecution(ds);if(!execution||!execution.timer)return;
  const remaining=WORKOUT_PLAYER.timerRemaining(execution.timer,Date.now())+Math.max(1,Number(seconds)||0);
  execution.timer.remainingSeconds=remaining;
  if(execution.timer.running)execution.timer.endsAt=new Date(Date.now()+remaining*1000).toISOString();
  persistWorkoutExecution(ds,execution,true);
}
function finishTimedWorkoutStep(ds,skipped){
  const execution=normalizedWorkoutExecution(ds);if(!execution)return;
  const step=currentWorkoutStep(execution);if(!step)return;
  step.status=skipped?"skipped":"done";
  step.completedAt=new Date().toISOString();
  execution.timer=null;
  const next=nextWorkoutStepIndex(execution,(execution.currentStep||0)+1);
  if(next>=0)execution.currentStep=next;
  persistWorkoutExecution(ds,execution,true);
  if(next<0)toast("Todos los bloques están registrados. Finaliza la sesión.");
}
function skipWorkoutTimer(ds){
  const execution=normalizedWorkoutExecution(ds);if(!execution||!execution.timer)return;
  if(execution.timer.kind==="step")return finishTimedWorkoutStep(ds,true);
  execution.timer=null;persistWorkoutExecution(ds,execution,true);toast("Descanso omitido");
}
function completeWorkoutStep(ds){
  const execution=normalizedWorkoutExecution(ds);if(!execution)return;
  const step=currentWorkoutStep(execution);if(!step)return;
  if(step.type==="strength"){
    const completed=step.sets.filter(set=>set.done).length;
    if(!completed){toast("Registra al menos una serie antes de avanzar");return;}
  }
  step.status="done";step.completedAt=new Date().toISOString();execution.timer=null;
  const next=nextWorkoutStepIndex(execution,(execution.currentStep||0)+1);
  if(next>=0)execution.currentStep=next;
  persistWorkoutExecution(ds,execution,true);
  if(next<0)toast("Todos los bloques están registrados. Finaliza la sesión.");
}
function skipWorkoutStep(ds){
  const execution=normalizedWorkoutExecution(ds);if(!execution)return;
  const step=currentWorkoutStep(execution);if(!step)return;
  step.status="skipped";step.completedAt=new Date().toISOString();execution.timer=null;
  const next=nextWorkoutStepIndex(execution,(execution.currentStep||0)+1);
  if(next>=0)execution.currentStep=next;
  persistWorkoutExecution(ds,execution,true);
}
function saveWorkoutSetField(ds,stepIndex,setIndex,field,value){
  const execution=normalizedWorkoutExecution(ds);if(!execution)return;
  const step=execution.steps[stepIndex],set=step&&step.sets&&step.sets[setIndex];if(!set)return;
  set[field]=field==="load"?String(value||""):((value===""||value==null)?null:Number(value));
  persistWorkoutExecution(ds,execution,false);
}
function toggleWorkoutSet(ds,stepIndex,setIndex){
  const execution=normalizedWorkoutExecution(ds);if(!execution||execution.status!=="in_progress")return;
  const step=execution.steps[stepIndex],set=step&&step.sets&&step.sets[setIndex];if(!set)return;
  set.done=!set.done;
  if(set.done){
    if(set.reps==null)set.reps=step.defaultReps;
    if(set.rpe==null)set.rpe=step.targetRpe;
    set.completedAt=new Date().toISOString();
  }else set.completedAt=null;
  persistWorkoutExecution(ds,execution,true);
  if(set.done&&setIndex<step.sets.length-1)startWorkoutTimer(ds,step.restSeconds,"rest");
}
function setWorkoutVariation(ds,variation){
  const execution=normalizedWorkoutExecution(ds);if(!execution)return;
  const step=currentWorkoutStep(execution);if(!step||step.type!=="strength")return;
  step.variation=variation;
  persistWorkoutExecution(ds,execution,true);
  toast(variation==="regression"?"Versión más fácil seleccionada":"Progresión seleccionada");
}
function exerciseCompatibleForWorkout(exercise,ds){
  if(!exercise||exercise.active===false)return false;
  const training=trainingPrefsFromPrefs(planPrefsForDate(ds));
  const location=training.locations[parseYmd(ds).getDay()];
  const places=exerciseArray(exercise.places);
  if(location&&places.length&&!places.includes(location))return false;
  const blocked=[training.injuries,training.limitations,training.avoidMovements].filter(Boolean).join(" ").toLowerCase();
  if(!blocked)return true;
  const contraindications=exerciseArray(exercise.contraindications).join(" ").toLowerCase();
  const identity=[exercise.name,exercise.movement_pattern,contraindications].join(" ").toLowerCase();
  return !blocked.split(/[,.;]/).map(item=>item.trim()).filter(item=>item.length>3).some(item=>identity.includes(item));
}
function openExerciseSubstitution(ds){
  const execution=normalizedWorkoutExecution(ds);if(!execution)return;
  const step=currentWorkoutStep(execution);if(!step||step.type!=="strength")return;
  const currentExercise=exerciseBySlug(step.exerciseSlug,true);
  if(!currentExercise){toast("No se pudo resolver el ejercicio actual");return;}
  const direct=exerciseArray(currentExercise&&currentExercise.substitute_slugs);
  const samePattern=exerciseCatalog(false).filter(ex=>ex.movement_pattern===currentExercise.movement_pattern).map(ex=>ex.slug);
  const candidates=[...new Set(direct.concat(samePattern))]
    .filter(slug=>slug!==step.exerciseSlug)
    .map(slug=>exerciseBySlug(slug))
    .filter(ex=>exerciseCompatibleForWorkout(ex,ds));
  const body=candidates.length?candidates.map(ex=>`<button class="opt" onclick="applyExerciseSubstitution('${ds}','${esc(ex.slug)}')">
      <b>${esc(ex.name)}</b><div class="o-meta">${esc(ex.regression)} · mismo patrón: ${esc(ex.movement_pattern)}</div>
    </button>`).join(""):'<div class="alert">No hay una sustitución compatible con tu lugar y limitaciones actuales.</div>';
  modal(`<h3>Sustituir ejercicio</h3>
    <p class="muted small">Se conservan las series, repeticiones y el objetivo del movimiento.</p>${body}`);
}
function applyExerciseSubstitution(ds,slug){
  const exercise=exerciseBySlug(slug);if(!exercise||!exerciseCompatibleForWorkout(exercise,ds))return;
  const execution=normalizedWorkoutExecution(ds);if(!execution)return;
  const step=currentWorkoutStep(execution);if(!step||step.type!=="strength")return;
  step.exerciseSlug=slug;step.label=exercise.name;step.variation="substitution";
  persistWorkoutExecution(ds,execution,false);closeModal();render();toast("Ejercicio sustituido");
}
function workoutFullyCompleted(execution){
  return execution.steps.every(step=>{

  });
}
function openFinishWorkout(ds,partial){

      <option value="">Selecciona</option><option value="none">No</option>
      <option value="discomfort">Molestia que alteró la técnica</option>

    </select></div>

      <option value="">Selecciona</option><option value="easy">Más fácil de lo esperado</option>

    </select></div>
    <div class="field"><label>Notas opcionales</label><textarea id="finishNotes" rows="3" placeholder="Carga, técnica, energía o cualquier contexto útil">${esc(execution.notes||"")}</textarea></div>
    <button class="btn btn-accent" style="width:100%" onclick="finishWorkoutExecution('${ds}',${partial||!complete})">Guardar resultado</button>`);
}
function finishWorkoutExecution(ds,partialRequested){
  const pain=$("#finishPain").value,difficulty=$("#finishDifficulty").value;
  if(!pain||!difficulty){toast("Completa las dos preguntas de cierre");return;}
  const execution=normalizedWorkoutExecution(ds);if(!execution)return;
  captureWorkoutElapsed(execution);
  const complete=workoutFullyCompleted(execution);
  const safetyIssue=pain!=="none";
  execution.status=(!partialRequested&&complete&&!safetyIssue)?"completed":"partial";
  execution.completedAt=new Date().toISOString();
  execution.timer=null;
  execution.pain=pain;
  execution.difficulty=difficulty;
  execution.notes=$("#finishNotes").value.trim();
  execution.needsReview=safetyIssue;
  persistWorkoutExecution(ds,execution,false);closeModal();render();
  toast(execution.status==="completed"?"Sesión completada":"Sesión guardada como parcial");
}
function resumePartialWorkout(ds){
  const execution=normalizedWorkoutExecution(ds);if(!execution||execution.status!=="partial"||execution.needsReview)return;
  execution.status="in_progress";execution.completedAt=null;execution.resumedAt=new Date().toISOString();
  execution.pain="";execution.difficulty="";
  const next=nextWorkoutStepIndex(execution,0);

}
function discardWorkoutExecution(ds){

let workoutTimerCompleting=false;
function workoutTimerTick(){

// Receta (ingredientes + gramos) de la comida, desde la DB, respetando override.
function mealRecipe(b,ms){
  const o=ms&&ms.ovr;
  // Una comida preparada por el coach trae sus propios ingredientes con gramos.
  if(o&&Array.isArray(o.ingredientes)&&o.ingredientes.length){
    const lines=o.ingredientes.map(x=>({name:x.nombre||x.name||"(ingrediente)",grams:+(x.gramos!=null?x.gramos:x.grams)})).filter(l=>l.grams>0);
    if(lines.length)return{dish:{name:o.name},lines,generated:true};
  }
  if(o&&o.kcal!=null&&o.dishName==null)return null;           // macros manuales: sin receta
  const dn=o&&o.dishName!=null?o.dishName:b.dishName;
  if(!dn||!DB.loaded)return null;
  const d=dishByName(dn);if(!d)return null;
  const lines=DB.dishIng.filter(x=>x.dish_id===d.id)
    .map(l=>{const i=ingById(+l.ingredient_id);return{name:i?i.name:"(ingrediente)",grams:+l.grams};})
    .filter(l=>l.grams>0);
  return lines.length?{dish:d,lines}:null;
}

// Tarjetas de estadísticas (kg, entrenos, racha)
function progressStats(){
  const outcomes=Object.values(S.days).map(day=>workoutOutcomeForState(day||{}));
  const entrenos=outcomes.filter(outcome=>outcome==="completed").length;
  const parciales=outcomes.filter(outcome=>outcome==="partial").length;
  const ws=Object.keys(WEIGHT_RANGES).map(n=>wkg(n)).filter(v=>v!=null);
  const lost=ws.length>=2?(ws[0]-ws[ws.length-1]):0;
  const lostTxt=lost>0?"-"+lost.toFixed(1):(lost<0?"+"+(-lost).toFixed(1):"0");
  return `<div class="summary" style="grid-template-columns:1fr 1fr 1fr">
    <div class="scard"><div class="n" style="color:var(--good)">${lostTxt}</div><div class="l">kg</div></div>

    <div class="scard"><div class="n" style="color:var(--terra-300)">🔥 ${streak()}</div><div class="l">días racha</div></div>
  </div>`;
}
function weightRows(){
  return Object.keys(WEIGHT_RANGES).map(n=>{
    const kg=wkg(n), bf=wbf(n);
    return `<tr><td>S${n}</td><td class="muted">${WEIGHT_RANGES[n].replace(/ .*/,'')}</td>
      <td><input type="number" step="0.1" inputmode="decimal" value="${kg!=null?kg:""}" onchange="setWeight(${n},this.value)" placeholder="kg"></td>
      <td><input type="number" step="0.1" inputmode="decimal" value="${bf!=null?bf:""}" onchange="setBodyFat(${n},this.value)" placeholder="%"></td></tr>`;
  }).join("");
}
// Resumen de composición corporal: masa grasa/magra de la última semana + cambios.
function bodyComposition(){
  const last=lastWeighedWeek(); if(last==null)return "";
  const comp=composition(last);
  // semana previa con datos para los deltas
  const prevWk=Object.keys(WEIGHT_RANGES).map(Number).filter(n=>n<last&&wkg(n)!=null).sort((a,b)=>b-a)[0];
  const dKg=prevWk!=null?(wkg(last)-wkg(prevWk)):null;
  const dBf=(prevWk!=null&&wbf(last)!=null&&wbf(prevWk)!=null)?(wbf(last)-wbf(prevWk)):null;
  const sign=v=>v>0?"+"+v.toFixed(1):v.toFixed(1);
  const cards=[];
  if(comp){
    cards.push(`<div class="scard"><div class="n">${comp.lean.toFixed(1)}</div><div class="l">masa magra kg</div></div>`);
    cards.push(`<div class="scard"><div class="n">${comp.fat.toFixed(1)}</div><div class="l">masa grasa kg</div></div>`);
  }
  if(dKg!=null) cards.push(`<div class="scard"><div class="n" style="color:${dKg<=0?'var(--good)':'var(--warn)'}">${sign(dKg)}</div><div class="l">Δ peso (sem)</div></div>`);
  if(dBf!=null) cards.push(`<div class="scard"><div class="n" style="color:${dBf<=0?'var(--good)':'var(--warn)'}">${sign(dBf)}</div><div class="l">Δ grasa %</div></div>`);
  if(!cards.length)return "";
  const cols=Math.min(cards.length,2);
  return `<div class="muted small" style="margin:0 4px 8px">Composición · semana ${last}${wbf(last)!=null?` · ${wbf(last)}% grasa`:""}</div>
    <div class="summary" style="grid-template-columns:repeat(${cols},1fr);margin-bottom:14px">${cards.join("")}</div>`;
}
// Lista de días de la semana actual (con navegación), reutiliza goDay
function weekSection(){
  const currentPrefs=planPrefsForDate(current);
  const w=weekOf(current,currentPrefs)||weekOf(current)||WEEKS[0];
  let days=[];let d=w.start;while(d<=w.end){days.push(d);d=addDays(d,1);}
  const rows=days.map(ds=>{
    const{t,target,doneMeals,totMeals}=dayTotals(ds);
    return `<div class="wk-day ${ds===todayStr()?'today':''}" onclick="goDay('${ds}')">
      <div class="wk-left">
        <div class="d">${prettyDate(ds)} <span class="dot" style="background:var(--accent)"></span></div>
        <div class="m">${doneMeals}/${totMeals} comidas · ${t.kcal}/${target.kcal} kcal</div>
      </div>
      <div class="center"><div style="font-weight:600">${target.p?Math.round(t.p/target.p*100):0}%</div><div class="muted small">proteína</div></div>
    </div>`;
  }).join("");
  return `<div class="row between" style="margin-bottom:10px">
      <button class="btn btn-sm" onclick="weekNav(-1)" ${w.num<=1?'disabled style=opacity:.3':''}>‹</button>
      <span class="muted small">${w.label==="Arranque"?"Arranque":"Semana "+w.num}</span>
      <button class="btn btn-sm" onclick="weekNav(1)" ${w.num>=resolvedPlanDuration(currentPrefs)?'disabled style=opacity:.3':''}>›</button>
    </div>
    ${rows}`;
}
function goDay(ds){current=ds;view="nutricion";render();window.scrollTo(0,0);syncDay(current);}
function weekNav(n){
  const prefs=planPrefsForDate(current);
  const calendar=planCalendarForPrefs(prefs);
  const w=weekOf(current,prefs)||weekOf(current)||calendar.weeks[0];
  const i=calendar.weeks.findIndex(week=>week.start===w.start&&week.end===w.end);
  if(i>=0){
    const next=calendar.weeks[i+n];
    if(next){current=next.start;render();window.scrollTo(0,0);}
  }
}

async function saveProfile(){
  const previous=migrateProfilePrefs((profile&&profile.prefs)||{});
  const draft={...previous};
  const diet=["vegetariano","vegano","sin_huevo","sin_lacteos","sin_gluten","omnivoro"].filter(v=>{const el=$("#pf_diet_"+v);return el&&el.checked;});
  draft.diet=diet;
  readFoodScheduleFields("pf",draft);
  readTrainingFields("pf",draft);
  const trainingError=validateTrainingProfile(draft);
  if(trainingError){toast(trainingError);return;}
  const foodError=validateFoodSchedule(draft);
  if(foodError){toast(foodError);return;}
  const preferenceError=validateFoodPreferences(draft);
  if(preferenceError){toast(preferenceError);return;}
  const planDurationWeeks=draft.planDurationWeeks;
  if(!validPlanDuration(planDurationWeeks)){toast("Elige un plan de 4 o 10 semanas");return;}
  const durationChanged=planDurationWeeks!==resolvedPlanDuration(previous);
  const planStartDate=validYmd(previous.planStartDate)?previous.planStartDate:START;
  const planEndDate=planEndFor(planStartDate,planDurationWeeks);
  const calendarChanged=durationChanged||previous.planStartDate!==planStartDate||previous.planEndDate!==planEndDate;
  const prefs={...previous,
    profileSchemaVersion:PROFILE_SCHEMA_VERSION,
    name:$("#pf_name").value.trim(),
    diet,
    mealCount:draft.mealCount,mealTimes:draft.mealTimes,
    eatingWindowStart:draft.eatingWindowStart,eatingWindowEnd:draft.eatingWindowEnd,mainMealIndex:draft.mainMealIndex,
    cookingMinutes:draft.cookingMinutes,foodBudget:draft.foodBudget,repeatPreference:draft.repeatPreference,
    preferredCuisines:checkedValues("pf_cuisine",CUISINE_LABELS),
    preferredPreparations:checkedValues("pf_preparation",PREPARATION_LABELS),
    preferredIngredients:$("#pf_preferred_ingredients").value.trim(),
    foodNotes:$("#pf_food_notes").value.trim(),
    allergies:$("#pf_allergies").value.trim(),
    dislikedIngredients:$("#pf_disliked").value.trim(),
    primarySport:draft.primarySport,
    strengthMode:draft.strengthMode,
    trainType:draft.primarySport,
    trainDays:draft.trainingDays.length,
    trainingDays:draft.trainingDays,
    trainingLocations:draft.trainingLocations,
    sessionMinutes:draft.sessionMinutes,
    equipment:draft.equipment,
    trainingExperience:draft.trainingExperience,
    trainingPriority:draft.trainingPriority,
    preferredTrainingTime:draft.preferredTrainingTime,
    injuries:draft.injuries,
    limitations:draft.limitations,
    avoidMovements:draft.avoidMovements,
    trainPlace:draft.strengthMode==="bodyweight"?"casa":"gym",
    planDurationWeeks,
    planStartDate,
    planEndDate,
  };
  prefs.avoid=[prefs.allergies,prefs.dislikedIngredients].filter(Boolean).join(", ");
  prefs.trainNote=[prefs.injuries,prefs.limitations,prefs.avoidMovements].filter(Boolean).join(". ");
  const result=await saveProfilePrefs(prefs);
  if(result&&result.error){toast("Error: "+result.error.message);return;}
  if(calendarChanged){await upsertActiveCycle();await pullCycleHistory();}
  current=clampDate(current);
  render();
  toast(durationChanged?`Plan ajustado a ${planDurationWeeks} semanas`:"Preferencias guardadas");
}
async function saveOptionalConsents(){
  const choices={
    progress_photos:$("#pf_consent_photos").checked,
  };
  const now=new Date().toISOString();
  const rows=Object.entries(choices).map(([type,accepted])=>{
    const previous=consentRecord(type);
    return {
      user_id:uid(),
      consent_type:type,
      policy_version:CONSENT_POLICY_VERSION,
      status:accepted?"accepted":"withdrawn",
      accepted_at:accepted?(previous&&previous.status==="accepted"?previous.accepted_at:now):null,
      withdrawn_at:accepted?null:now,
      source:"privacy_center",
      metadata:{legal_review_required:true},
      updated_at:now,
    };
  });
  const result=await supa.from("user_consents").upsert(rows,{onConflict:"user_id,consent_type,policy_version"});
  if(result.error){toast(privacyApiMessage(result.error));return;}
  await loadPrivacyState();
  await pullCycleHistory();
  render();toast("Permisos actualizados");
}
async function privacyRequest(method,body){
  const token=session&&session.access_token;
  if(!token)throw new Error("Vuelve a iniciar sesión.");
  const response=await fetch("/api/privacy",{
    method,
    headers:{"authorization":"Bearer "+token,...(body?{"content-type":"application/json"}:{})},
    body:body?JSON.stringify(body):undefined,
  });
  const data=await response.json().catch(()=>({}));
  if(!response.ok)throw new Error(data.error||("Error "+response.status));
  return data;
}
async function exportPersonalData(button){
  if(button){button.disabled=true;button.textContent="Preparando exportación…";}
  try{
    const data=await privacyRequest("GET");
    const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
    const url=URL.createObjectURL(blob);
    const link=document.createElement("a");
    link.href=url;link.download=`fitbros-datos-${todayStr()}.json`;
    document.body.appendChild(link);link.click();link.remove();
    setTimeout(()=>URL.revokeObjectURL(url),1000);
    toast("Exportación descargada");
  }catch(e){toast(isAdmin()?String(e.message||e):"No se pudo preparar la exportación. Intenta de nuevo.");}
  finally{if(button){button.disabled=false;button.textContent="Exportar mis datos";}}
}

async function doAuth(){
  const email=$("#au_email").value.trim();const pwd=$("#au_pwd").value;
  const out=$("#auOut");
  if(!email||!pwd){if(out)out.textContent="Pon correo y contraseña";return;}
  if(out)out.textContent="…";
  const mode=window._authMode||"in";
  const r=mode==="up"?await signUp(email,pwd):await signIn(email,pwd);
  if(r.error){if(out)out.textContent="⚠️ "+r.error.message;return;}
  if(mode==="up"&&!(r.data&&r.data.session)){if(out)out.textContent="Cuenta creada. Confirma tu correo y luego inicia sesión.";window._authMode="in";return;}
  const{data}=await supa.auth.getSession();session=(data&&data.session)||null;
  if(session)onAuth();
}
async function requestOwnPasswordReset(){
  const email=$("#au_email")&&$("#au_email").value.trim();
